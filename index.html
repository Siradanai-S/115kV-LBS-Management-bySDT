          </tbody>
        </table></div>
      </Card>
      )}

      <Card className="overflow-hidden">
        <div className="px-5 py-3 border-b border-slate-800"><h3 className="text-slate-200 font-semibold">รายการเคลื่อนไหวล่าสุด {moves.length>0&&`(${moves.length})`}</h3></div>
        <div className="overflow-x-auto"><table className="w-full text-sm whitespace-nowrap">
          <thead><tr className="text-left text-[11px] uppercase tracking-wide text-slate-500 border-b border-slate-800"><th className="px-5 py-2.5 font-medium">วันที่</th><th className="px-3 py-2.5 font-medium">รหัส</th><th className="px-3 py-2.5 font-medium">ที่ตั้ง</th><th className="px-3 py-2.5 font-medium">ประเภท/เหตุผล</th><th className="px-3 py-2.5 font-medium text-right">จำนวน</th><th className="px-3 py-2.5 font-medium">อ้างอิง/หมายเหตุ</th>{role==='developer'&&<th/>}</tr></thead>
          <tbody>
            {moves.length===0 && <tr><td colSpan="7" className="px-5 py-6 text-center text-slate-500">— ไม่มีรายการ —</td></tr>}
            {moves.map(x=>(
              <tr key={x.id} className="border-b border-slate-800/60">
                <td className="px-5 py-2.5 mono text-slate-500 text-[12px]">{String(x.created_at||'').slice(0,10)}</td>
                <td className="px-3 py-2.5 mono text-slate-300">{x.epicor_code}</td>
                <td className="px-3 py-2.5 text-slate-400 text-[12px]">{pName(x.project_id)}</td>
                <td className="px-3 py-2.5"><Pill color={x.type==='IN'?'#16a34a':'#f43f5e'}>{x.type==='IN'?'รับเข้า':'เบิกออก'}</Pill>{x.reason&&<span className="text-[10px] text-slate-500 ml-1">{x.reason}</span>}</td>
                <td className="px-3 py-2.5 text-right mono" style={{color:x.type==='IN'?'#16a34a':'#f43f5e'}}>{x.type==='IN'?'+':'-'}{x.qty}</td>
                <td className="px-3 py-2.5 text-slate-400 text-[12px]">{x.po_no?<span className="mono text-indigo-600">{x.po_no} </span>:''}{x.note||''}</td>
                {role==='developer'&&<td className="px-3 py-2.5 text-right"><button onClick={()=>{ if(confirm('ลบรายการเคลื่อนไหวนี้?')) onDeleteMovement(x.id); }} className="text-slate-500 hover:text-rose-600">{Icon.trash}</button></td>}
              </tr>
            ))}
          </tbody>
        </table></div>
      </Card>
    </div>
  );
}

/* ============================ SETTING (Developer เท่านั้น) ============================ */
// ตัวเลือกสถานะ (ใช้ในตัวแก้ไขข้อมูลของ Developer)
const BOM_PO_STATUS  = ['Awaiting PO','PO Received','Delivered'];
const BOM_DOC_STATUS = ['Draft','Sent to Purchasing'];
const CASHFLOW_STATUS = ['ปกติ','เฝ้าระวัง','วิกฤติ'];
const PO_DOC_STATUS  = ['รอออก','ออกแล้ว','กำลังส่ง','รับครบ'];
// f(): สร้าง field meta — k=คอลัมน์, l=ป้าย, t=ชนิด(text|num|date|sel|bool), o=ตัวเลือก(สำหรับ sel)
const f = (k,l,t='text',o)=>({k,l,t,o});
const DATA_ENTITIES = [
  { key:'customers', table:'customers',          label:'ลูกค้า (Sales)',     fmt:r=>r.name,
    fields:[f('name','ชื่อลูกค้า'),f('customer_type','ประเภทลูกค้า','sel',CUSTOMER_TYPE),f('work_type','ประเภทงาน','sel',WORK_TYPE),f('contact','ผู้ติดต่อ'),f('lbs_qty','จำนวน LBS','num'),f('desired_date','วันที่ต้องการ','date'),f('location','สถานที่ติดตั้ง (คั่นหลายแห่งด้วย /)'),f('term_of_payment','Term of payment'),f('scope','Scope'),f('cust_po_no','เลขที่ PO ลูกค้า'),f('contract_status','สถานะสัญญา','sel',CONTRACT_STATUS),f('note','หมายเหตุ')] },
  { key:'srs',       table:'sales_requisitions', label:'Sales Requisition',  fmt:r=>`${r.sr_no}`,
    fields:[f('sr_no','SR No.'),f('note','หมายเหตุ')] },
  { key:'projects',  table:'projects',           label:'Project Stock',      fmt:r=>`${r.project_stock_no} · ${r.name}`,
    fields:[f('project_stock_no','Stock No.'),f('job_no','Job No.'),f('bom_no','BOM No. (ฐาน)'),f('name','ชื่อโครงการ'),f('current_phase','เฟสปัจจุบัน','sel',PHASES),f('target_lbs','LBS เป้าหมาย','num'),f('total_budget','งบประมาณ','num'),f('margin','Margin %','num'),f('cash_flow_status','กระแสเงินสด','sel',CASHFLOW_STATUS),f('delivery_date','วันส่งมอบ','date'),f('do_signed','ลงนาม DO แล้ว','bool')] },
  { key:'bom',       table:'bom_items',          label:'BOM Items',          fmt:r=>`${r.epicor_code||''} · ${r.description} (ครั้ง${num(r.round)||1})`,
    fields:[f('epicor_code','Epicor Code'),f('description','รายละเอียด'),f('category','หมวด','sel',BOM_CAT),f('serial_lvb','Serial LVB (LBS)'),f('serial_om','Serial OM (LBS)'),f('round','ครั้งที่ (รอบ BOM)','num'),f('due_date','Due Date','date'),f('ium','IUM'),f('quantity','จำนวน','num'),f('currency','สกุลเงิน','sel',CURRENCY),f('unit_cost','ราคา/หน่วย','num'),f('fx_rate','FX Rate','num'),f('project_phase','Phase','sel',PROJECT_PHASES),f('po_status','สถานะ PO','sel',BOM_PO_STATUS),f('is_sent','ส่งจัดซื้อแล้ว','bool')] },
  { key:'pos',       table:'purchase_orders',    label:'Purchase Orders',    fmt:r=>`${r.po_no} · ${r.supplier||''}`,
    fields:[f('po_no','PO No.'),f('supplier','ผู้ขาย'),f('status','สถานะ','sel',PO_DOC_STATUS),f('expected_date','กำหนดรับ','date'),f('amount','มูลค่า','num'),f('notified','แจ้งกลับแล้ว','bool')] },
  { key:'team',      table:'service_team',       label:'ทีม Service',        fmt:r=>`${r.name} · ${r.role||''}`,
    fields:[f('name','ชื่อ'),f('role','ตำแหน่ง'),f('phone','โทร'),f('active','ใช้งาน','bool')] },
  { key:'plans',     table:'service_plans',      label:'แผนส่งมอบ',          fmt:r=>`#${r.id} · ${r.delivery_date||''}`,
    fields:[f('delivery_date','วันส่งมอบ','date'),f('location','สถานที่'),f('team_need','ทีมที่ต้องการ'),f('note','หมายเหตุ'),f('acked','ฝ่ายบริการรับแล้ว','bool')] },
];
const ROLE_OPTS = ['sales','project','purchasing','service','executive'];

// ตัวแก้ไขข้อมูลแบบ modal (Developer แก้ข้ามฝ่าย) — ส่งเฉพาะ field ที่เปลี่ยน
function RowEditor({en, row, onClose, onSave}){
  const [form,setForm]=useState(()=>{ const m={}; en.fields.forEach(fd=>{ m[fd.k]=row[fd.k]; }); return m; });
  const set=(k,v)=>setForm(s=>({...s,[k]:v}));
  const save=()=>{
    const patch={};
    en.fields.forEach(fd=>{ let v=form[fd.k]; if(fd.t==='num') v=num(v); if(String(v??'')!==String(row[fd.k]??'')) patch[fd.k]=v; });
    if(Object.keys(patch).length) onSave(en.key, en.table, row.id, patch);
    onClose();
  };
  return (
    <div className="fixed inset-0 z-50 grid place-items-center bg-black/60 p-4" onClick={onClose}>
      <div className="w-full max-w-lg rounded-xl border border-slate-700 bg-slate-900 fade-up max-h-[90vh] flex flex-col" onClick={e=>e.stopPropagation()}>
        <div className="px-5 py-3.5 border-b border-slate-800 flex items-center justify-between">
          <div><div className="text-slate-100 font-semibold flex items-center gap-2">{Icon.edit} แก้ไข: {en.label}</div>
            <div className="text-[11px] text-slate-500 mono truncate max-w-[22rem]">{en.fmt(row)}</div></div>
          <button onClick={onClose} className="text-slate-400 hover:text-slate-100">{Icon.x}</button>
        </div>
        <div className="overflow-y-auto p-4 grid grid-cols-1 sm:grid-cols-2 gap-3">
          {en.fields.map(fd=>(
            <div key={fd.k} className={fd.t==='bool'?'sm:col-span-2':''}>
              <Lbl>{fd.l}</Lbl>
              {fd.t==='sel' ? <Sel value={form[fd.k]??''} onChange={v=>set(fd.k,v)} options={fd.o}/>
               : fd.t==='bool' ? <label className="flex items-center gap-2 text-[13px] text-slate-300 cursor-pointer"><input type="checkbox" checked={!!form[fd.k]} onChange={e=>set(fd.k,e.target.checked)} className="accent-sky-500"/> {form[fd.k]?'ใช่':'ไม่'}</label>
               : <Inp type={fd.t==='num'?'number':fd.t==='date'?'date':'text'} value={form[fd.k]??''} onChange={v=>set(fd.k,v)}/>}
            </div>
          ))}
        </div>
        <div className="px-5 py-3 border-t border-slate-800 flex items-center justify-end gap-2">
          <button onClick={onClose} className="text-xs font-medium rounded-lg px-3 py-1.5 border border-slate-700 text-slate-300 hover:bg-slate-800">ยกเลิก</button>
          <button onClick={save} className="text-xs font-semibold rounded-lg px-4 py-1.5" style={{background:'#0ea5e9',color:'#0b0f17'}}>{Icon.check} บันทึก</button>
        </div>
      </div>
    </div>
  );
}
function Settings({state, role, onSetRole, onRevoke, onDeleteRow, onUpdateRow, onResetData}){
  if(role!=='developer') return <Empty msg="เฉพาะผู้ดูแล (Developer) เท่านั้น"/>;
  const users = state.users||[];
  const pending = users.filter(u=>!u.department && !u.is_developer);
  const [openKey,setOpenKey]=useState(null);
  const [edit,setEdit]=useState(null);   // {en, row} ที่กำลังแก้ไข
  const roleLabel = u => u.is_developer ? 'Developer' : (u.department ? DEPT[u.department]?.label||u.department : null);
  return (
    <div className="space-y-5">
      {/* A) ผู้ใช้งาน & สิทธิ์ */}
      <Card className="overflow-hidden">
        <div className="px-5 py-3.5 border-b border-slate-800 flex items-center gap-2"><span style={{color:'#0ea5e9'}}>{Icon.users}</span><h3 className="text-slate-200 font-semibold">ผู้ใช้งาน & สิทธิ์ (อนุมัติ/ยกเลิก)</h3><span className="text-[11px] text-slate-500">({users.length} บัญชี · รออนุมัติ {pending.length})</span></div>
        {pending.length>0 && <div className="px-5 py-2 bg-amber-500/10 border-b border-slate-800 text-[12px] text-amber-700 font-medium">⏳ มีผู้สมัครรออนุมัติ {pending.length} ราย — เลือกฝ่ายเพื่ออนุมัติ</div>}
        <div className="overflow-x-auto">
        <table className="w-full text-sm whitespace-nowrap">
          <thead><tr className="text-left text-[11px] uppercase tracking-wide text-slate-500 border-b border-slate-800">
            <th className="px-5 py-2.5 font-medium">อีเมล</th><th className="px-3 py-2.5 font-medium">ฝ่าย / บทบาท</th><th className="px-3 py-2.5 font-medium text-center">Developer</th><th className="px-3 py-2.5 font-medium">สมัครเมื่อ</th><th className="px-3 py-2.5 font-medium text-right">จัดการ</th>
          </tr></thead>
          <tbody>
            {users.length===0 && <tr><td colSpan="5" className="px-5 py-8 text-center text-slate-500">ยังไม่มีผู้ใช้ (โหมด LIVE จะดึงจาก Supabase)</td></tr>}
            {users.map(u => { const approved=!!u.department||u.is_developer; return (
              <tr key={u.user_id} className="border-b border-slate-800/60">
                <td className="px-5 py-3 text-slate-200">{u.email} {!approved && <Pill color="#f97316">รออนุมัติ</Pill>}</td>
                <td className="px-3 py-3 w-44">
                  <select value={u.department||''} onChange={e=>onSetRole(u.user_id, e.target.value||null, u.is_developer)} className="w-full text-xs rounded-md px-2 py-1.5 border bg-slate-900 border-slate-700 text-slate-200">
                    <option value="">— เลือกฝ่าย —</option>
                    {ROLE_OPTS.map(r=><option key={r} value={r}>{DEPT[r].label}</option>)}
                  </select>
                </td>
                <td className="px-3 py-3 text-center"><input type="checkbox" checked={u.is_developer} onChange={e=>onSetRole(u.user_id, u.department||'developer', e.target.checked)} className="accent-sky-500"/></td>
                <td className="px-3 py-3 mono text-slate-500 text-[12px]">{String(u.created_at||'').slice(0,10)}</td>
                <td className="px-3 py-3 text-right">{approved && <button onClick={()=>{ if(confirm(`ยกเลิกสิทธิ์ของ ${u.email}?`)) onRevoke(u.user_id); }} className="text-xs font-medium rounded-md px-2.5 py-1" style={{background:'#f43f5e22',color:'#f43f5e'}}>ยกเลิกสิทธิ์</button>}</td>
              </tr>
            );})}
          </tbody>
        </table>
        </div>
        <div className="px-5 py-2.5 border-t border-slate-800 text-[11px] text-slate-500">อนุมัติ = เลือกฝ่าย · เลื่อนเป็นผู้ดูแล = ติ๊ก Developer · ยกเลิกสิทธิ์ = กลับเป็น "รออนุมัติ" (ใช้งานไม่ได้จนกว่าจะกำหนดใหม่)</div>
      </Card>

      {/* B) จัดการข้อมูลทุกฝ่าย (ดูภาพรวม + ลบ) */}
      <Card className="overflow-hidden">
        <div className="px-5 py-3.5 border-b border-slate-800 flex items-center gap-2"><span style={{color:'#0ea5e9'}}>{Icon.box}</span><h3 className="text-slate-200 font-semibold">จัดการข้อมูลทุกฝ่าย (CRUD)</h3></div>
        <div className="px-5 py-2 text-[11px] text-slate-500 border-b border-slate-800">เพิ่มทำได้จากหน้าแต่ละฝ่าย · ส่วนนี้สำหรับ Developer <b className="text-sky-600">ดู / แก้ไข ✎ / ลบ</b> ข้ามฝ่ายได้ทุกตาราง</div>
        <div className="p-3 grid grid-cols-1 md:grid-cols-2 gap-2">
          {DATA_ENTITIES.map(en => { const rows=state[en.key]||[]; const isOpen=openKey===en.key; return (
            <div key={en.key} className="rounded-lg border border-slate-800">
              <button onClick={()=>setOpenKey(isOpen?null:en.key)} className="w-full px-3 py-2.5 flex items-center justify-between hover:bg-slate-800/30">
                <span className="text-[13px] text-slate-200 font-medium flex items-center gap-2"><span className="text-slate-500">{isOpen?'▼':'▶'}</span>{en.label}</span>
                <span className="text-[11px] rounded-full px-2 py-0.5" style={{background:'#0ea5e922',color:'#0ea5e9'}}>{rows.length}</span>
              </button>
              {isOpen && <div className="max-h-60 overflow-y-auto border-t border-slate-800">
                {rows.length===0 && <div className="px-3 py-3 text-[12px] text-slate-500">— ว่าง —</div>}
                {rows.map(r=>(
                  <div key={r.id} className="px-3 py-2 flex items-center justify-between gap-2 border-b border-slate-800/40">
                    <span className="text-[12px] text-slate-300 truncate">{en.fmt(r)}</span>
                    <div className="flex items-center gap-2 shrink-0">
                      <button onClick={()=>setEdit({en, row:r})} className="text-slate-500 hover:text-sky-500" title="แก้ไข">{Icon.edit}</button>
                      <button onClick={()=>{ if(confirm(`ลบ "${en.fmt(r)}" ?`)) onDeleteRow(en.key, en.table, r.id); }} className="text-slate-500 hover:text-rose-600" title="ลบ">{Icon.trash}</button>
                    </div>
                  </div>
                ))}
              </div>}
            </div>
          );})}
        </div>
      </Card>
      {/* C) Danger zone — Reset Data (เฉพาะ Developer) */}
      <Card className="overflow-hidden" style={{borderColor:'#f43f5e55'}}>
        <div className="px-5 py-3.5 border-b border-slate-800 flex items-center gap-2" style={{background:'#f43f5e0e'}}><span style={{color:'#f43f5e'}}>{Icon.trash}</span><h3 className="text-slate-200 font-semibold">Reset Data (เขตอันตราย)</h3></div>
        <div className="px-5 py-4 flex items-center justify-between flex-wrap gap-3">
          <div className="text-[12px] text-slate-400 max-w-xl leading-relaxed">{LIVE ? 'โหมด LIVE: ปุ่มนี้ถูกป้องกันไว้ — การล้างข้อมูลจริงให้รัน reset-clean.sql บน Supabase' : 'โหมด DEMO: คืนค่าข้อมูลตัวอย่างทั้งหมดกลับสู่ค่าเริ่มต้น (ลูกค้า/SR/Stock/BOM/PO/คลัง/ผู้ใช้) — ใช้ทดสอบซ้ำได้'} <b className="text-rose-600">การกระทำนี้ย้อนกลับไม่ได้</b></div>
          <button onClick={()=>{ if(confirm('ยืนยัน Reset Data — คืนค่าข้อมูลทั้งหมดเป็นค่าเริ่มต้น? การกระทำนี้ย้อนกลับไม่ได้')) onResetData(); }} className="inline-flex items-center gap-1.5 text-xs font-semibold rounded-lg px-4 py-2 shrink-0" style={{background:'#f43f5e',color:'#fff'}}>{Icon.trash} Reset Data</button>
        </div>
      </Card>
      {edit && <RowEditor en={edit.en} row={state[edit.en.key].find(x=>x.id===edit.row.id)||edit.row} onClose={()=>setEdit(null)} onSave={onUpdateRow}/>}
    </div>
  );
}

/* ============================ PENDING APPROVAL (LIVE: ยังไม่กำหนดสิทธิ์) ============================ */
function Pending({email, onSignOut}){
  return (
    <div className="h-screen grid place-items-center bg-[var(--app-bg)] grain px-4">
      <div className="w-full max-w-md rounded-2xl border border-slate-800 bg-slate-900/70 p-7 text-center fade-up">
        <div className="text-4xl mb-3">⏳</div>
        <h2 className="text-slate-100 font-semibold text-lg">รอผู้ดูแลอนุมัติสิทธิ์</h2>
        <p className="text-sm text-slate-400 mt-2 leading-relaxed">บัญชี <b className="text-slate-200">{email}</b> ยังไม่ได้รับการกำหนดบทบาท<br/>กรุณาติดต่อผู้ดูแลระบบเพื่อกำหนดสิทธิ์ฝ่ายของคุณก่อนเริ่มใช้งาน</p>
        <div className="mt-4 text-[11px] text-slate-500 leading-relaxed rounded-lg border border-slate-800 bg-slate-800/40 p-3 text-left">สำหรับผู้ดูแล — กำหนดสิทธิ์ใน Supabase SQL Editor:<br/><span className="mono text-slate-300 break-all">INSERT INTO user_roles (user_id, department) SELECT id, 'sales' FROM auth.users WHERE email='{email}';</span></div>
        <button onClick={onSignOut} className="mt-4 text-xs rounded-md px-3 py-1.5 border border-slate-700 text-slate-300 hover:bg-slate-800/60">ออกจากระบบ</button>
      </div>
    </div>
  );
}

/* ============================ APP ============================ */
function App(){
  const [state, setState] = useState({ customers:[], srs:[], projects:[], tasks:[], bom:[], pos:[], team:[], schedule:[], plans:[], handoffs:[], users:[], inventory:[], loading:true });
  const [page, setPage] = useState('dashboard');
  const [role, setRole] = useState('developer');
  const [activeId, setActiveId] = useState('all');
  const [poProject, setPoProject] = useState(null);
  const [err, setErr] = useState('');
  const [session, setSession] = useState(LIVE ? undefined : null);
  const [me, setMe] = useState(null);

  useEffect(()=>{
    if(!LIVE) return;
    sb.auth.getSession().then(({data})=>setSession(data.session));
    const { data:sub } = sb.auth.onAuthStateChange((_e,s)=>setSession(s));
    return ()=>sub.subscription.unsubscribe();
  },[]);

  useEffect(()=>{
    if(!LIVE){ (async()=>{ const d=await db.loadAll(); setState(s=>({...s, ...d, loading:false})); })(); return; }
    if(session===undefined) return;
    if(!session){ setState(s=>({...s, loading:false})); return; }
    (async()=>{
      try{
        const { data:roleRow } = await sb.from('user_roles').select('*').eq('user_id', session.user.id).maybeSingle();
        const dep = roleRow ? (roleRow.is_developer ? 'developer' : roleRow.department) : 'sales';
        setRole(dep);
        setMe({ email:session.user.email, department: roleRow?roleRow.department:null, is_developer: roleRow?!!roleRow.is_developer:false, hasRole: !!roleRow });
        const d = await db.loadAll(); setState(s=>({...s, ...d, loading:false}));
      } catch(e){ setErr(e.message||String(e)); setState(s=>({...s, loading:false})); }
    })();
  },[session]);

  const reload = async () => { try { const d=await db.loadAll(); setState(s=>({...s, ...d})); } catch(e){ setErr(e.message||String(e)); } };
  // ครอบ action ทุกตัว: เรียก db → reload → จับ error แสดงผู้ใช้ (แก้ปัญหา fail เงียบในรีวิว)
  // run(fn, optimistic?) — ถ้ามี optimistic จะอัปเดต state ทันที (UI ตอบสนองไว) แล้วค่อย reconcile ด้วย reload
  const run = (fn, optimistic) => async (...args) => {
    try { setErr(''); if(optimistic) setState(s=>optimistic(s, ...args)); const r=await fn(...args); await reload(); return r; }
    catch(e){ setErr(e.message||String(e)); await reload(); }
  };

  const handleSignOut = async () => { if(LIVE) await sb.auth.signOut(); };
  const activeProject = useMemo(()=> activeId==='all'?null:state.projects.find(p=>p.id===activeId), [activeId, state.projects]);

  /* ===== number generators (จากเลขมากสุด ไม่ใช่จำนวน) ===== */
  const year = new Date().getFullYear();
  const genSrNo    = () => `SR-${year}-${pad3(nextSeq(state.srs,'sr_no')+1)}`;
  const genStockNo = () => `STK-${year}-${pad3(nextSeq(state.projects,'project_stock_no')+1)}`;
  const genJobNo   = () => `JOB-${pad3(nextSeq(state.projects,'job_no')+1)}`;
  const genBomNo   = () => `BOM-${year}-${pad3(nextSeq(state.projects,'bom_no')+1)}`;
  const genPoNo    = () => `PO-${year}-${pad4(Math.max(1000, nextSeq(state.pos,'po_no'))+1)}`;
  const genWdNo    = () => `WD-${year}-${pad3(nextSeq(state.plans,'wd_no')+1)}`;
  const genDefaults = () => ({ stockNo:genStockNo(), jobNo:genJobNo(), bomNo:genBomNo() });   // ค่าตั้งต้นให้ฟอร์มสร้าง Stock

  const handleTask = run(async (taskId, status) => { await db.updateTask(taskId,{status, updated_by:DEPT[role].en}); },
    (s, taskId, status) => ({...s, tasks:s.tasks.map(t=>t.id===taskId?{...t,status}:t)}));
  const handleAddTask = run(async (projectId, dep, title, detail) => {
    const sib=state.tasks.filter(x=>x.project_id===projectId && x.department===dep);
    const sort=sib.length?Math.max(...sib.map(x=>x.sort_order))+1:0;
    await db.addTask({ project_id:projectId, department:dep, task_title:title, task_detail:detail, sort_order:sort, status:'Pending', updated_by:DEPT[role].en });
  });

  /* Sales */
  const handleAddCustomer = run(async (row) => { await db.addCustomer(row); });
  const handleUpdateCustomer = run(async (id, patch) => { await db.updateCustomer(id, patch); });
  const handleCreateSR = run(async (customerIds) => { await db.createSR(customerIds, genSrNo()); });
  const handleUpdateSR = run(async (id, patch) => { await db.updateSR(id, patch); },
    (s, id, patch) => ({...s, srs:s.srs.map(x=>x.id===id?{...x,...patch}:x)}));

  /* Project */
  const handleCreateStock = run(async (srIds, custom) => {
    const custs=(state.customers||[]).filter(c=>srIds.includes(c.sr_id));
    const name    = (custom && custom.name)    || (custs[0] ? (custs[0].location || custs[0].name) : 'Project Stock');
    const stockNo = (custom && custom.stockNo) || genStockNo();
    const jobNo   = (custom && custom.jobNo)   || genJobNo();
    const bomNo   = (custom && custom.bomNo)   || genBomNo();
    const target = (custom && custom.target_lbs!=null) ? custom.target_lbs : custs.reduce((s,c)=>s+num(c.lbs_qty),0);
    if(state.projects.some(p=>p.project_stock_no===stockNo)) throw new Error(`Project Stock No. "${stockNo}" มีอยู่แล้ว — กรุณาใช้เลขอื่น`);
    const r=await db.createStock(srIds, stockNo, jobNo, bomNo, name, target);
    await reload();
    if(r) { setActiveId(r.id); setPage('project-stocks'); }
  });
  const handleAddBom = run(async (row) => { await db.addBom(row); });
  const handleUpdateBom = run(async (id, patch) => { await db.updateBom(id, patch); },
    (s, id, patch) => ({...s, bom:s.bom.map(b=>b.id===id?{...b,...patch}:b)}));
  const handleDeleteBom = run(async (id) => { await db.deleteBom(id); });
  const handleSendBom = run(async (projectId, roundN) => { await db.sendBom(projectId, roundN); });
  const handleUpdateProject = run(async (id, patch) => { await db.updateProject(id, patch); },
    (s, id, patch) => ({...s, projects:s.projects.map(p=>p.id===id?{...p,...patch}:p)}));

  /* Purchasing */
  const handleCreatePO = run(async (projectId, row, lines) => {
    if(state.pos.some(o=>o.po_no===row.po_no)) throw new Error(`เลขที่ PO "${row.po_no}" มีอยู่แล้ว — กรุณาใช้เลขอื่น`);
    await db.createPO(projectId, row, lines);
  });
  const handleUpdatePO = run(async (id, patch) => { await db.updatePO(id, patch); });

  /* Service */
  const handleAddMember = run(async (row) => { await db.addMember(row); });
  const handleRemoveMember = run(async (id) => { await db.removeMember(id); });
  const handleAddSchedule = run(async (row) => { await db.addSchedule(row); });
  const handleRemoveSchedule = run(async (id) => { await db.removeSchedule(id); });
  const handleSignDO = run(async (projectId) => { await db.signDO(projectId); });
  // 1) บันทึกใบเบิก (ร่าง) — ยังไม่ตัดสต็อก ยังไม่ส่ง Service
  const handleSaveSlip = run(async (projectId, payload) => {
    const wd = genWdNo();
    const picked = (payload.lines||[]).filter(l=>num(l.qty)>0);
    await db.addPlan({ project_id:projectId, wd_no:wd, lines:picked.map(l=>({bom_id:l.bom_id, qty:num(l.qty)})), plan_start:payload.plan_start||null, plan_end:payload.plan_end||null, delivery_date:payload.plan_end||payload.plan_start||null, location:payload.location||'', note:payload.note||'', team_need:'', team_ids:[], sent:false, acked:false });
  });
  // 2) ส่งมอบ Service — ตัดสต็อกโครงการ (OUT 'ติดตั้งงาน') ตามรายการในใบเบิก แล้วตั้ง sent
  const handleSendSlip = run(async (planId) => {
    const pl=(state.plans||[]).find(x=>x.id===planId); if(!pl || pl.sent) return;
    for(const l of (pl.lines||[])){ const b=state.bom.find(x=>x.id===l.bom_id); const onh=invOnhand(state, pl.project_id, b?.epicor_code); if(b && num(l.qty)>onh){ throw new Error(`${b.epicor_code} คงเหลือในคลังโครงการ ${onh} — เบิก ${l.qty} ไม่ได้ (โอนเข้าโครงการเพิ่มก่อน)`); } }
    const rows=(pl.lines||[]).map(l=>{ const b=state.bom.find(x=>x.id===l.bom_id)||{}; return { epicor_code:b.epicor_code, description:b.description, project_id:pl.project_id, type:'OUT', reason:'ติดตั้งงาน', qty:num(l.qty), note:'ใบเบิก '+(pl.wd_no||''), by:DEPT[role].en }; }).filter(r=>num(r.qty)>0);
    if(rows.length) await db.addMovements(rows);
    await db.updatePlan(planId, { sent:true });
  });
  const handleDeleteSlip = run(async (planId) => { await db.deletePlan(planId); });
  // Service กดรับงาน + จัดทีม → ack + ลงคิวปฏิทินให้ทีมที่เลือกตามช่วงแผน
  const handleAckPlan = run(async (id, teamIds) => {
    await db.ackPlan(id, teamIds||[]);
    const pl=(state.plans||[]).find(x=>x.id===id);
    if(pl && (teamIds||[]).length && pl.plan_start && pl.plan_end){
      for(const mid of (teamIds||[])){ await db.addSchedule({ project_id:pl.project_id, member_id:mid, start_date:pl.plan_start, end_date:pl.plan_end, note:'ตามใบเบิก '+(pl.wd_no||'') }); }
    }
  });

  /* Admin (Setting) */
  const handleSetRole = run(async (uid, department, is_developer) => { await db.setUserRole(uid, department, is_developer); },
    (s, uid, department, is_developer) => ({...s, users:s.users.map(u=>u.user_id===uid?{...u,department,is_developer}:u)}));
  const handleRevoke = run(async (uid) => { await db.revokeUser(uid); },
    (s, uid) => ({...s, users:s.users.map(u=>u.user_id===uid?{...u,department:null,is_developer:false}:u)}));
  const handleDeleteRow = run(async (demoKey, table, id) => { await db.deleteRow(demoKey, table, id); });
  const handleUpdateRow = run(async (demoKey, table, id, patch) => { await db.updateRow(demoKey, table, id, patch); },
    (s, demoKey, table, id, patch) => ({...s, [demoKey]: s[demoKey].map(x=>x.id===id?{...x,...patch}:x)}));
  const handleResetData = run(async () => { await db.resetData(); setActiveId('all'); setPage('dashboard'); });

  /* Inventory (#3) */
  const handleAddMovement = run(async (row) => { await db.addMovement({...row, by:DEPT[role].en}); });
  const handleReceivePO = run(async (rows, deliveredIds) => { await db.addMovements(rows.map(r=>({...r, by:DEPT[role].en}))); await db.markBomDelivered(deliveredIds||[]); });
  const handleTransfer = run(async (code, desc, toProject, qty, note) => { await db.addMovements([
    { epicor_code:code, description:desc, project_id:null, type:'OUT', reason:'โอนเข้าโครงการ', qty, note:note||('โอนเข้า '+(state.projects.find(p=>p.id===toProject)?.project_stock_no||'')), by:DEPT[role].en },
    { epicor_code:code, description:desc, project_id:toProject, type:'IN', reason:'รับโอน', qty, note:'รับโอนจากคลังกลาง', by:DEPT[role].en },
  ]); });
  const handleDeleteMovement = run(async (id) => { await db.deleteMovement(id); });

  /* Linkage */
  const handleHandoff = run(async (project) => { const g=phaseGate(project,state); if(!g.ok) return; const nxt=nextPhase(project.current_phase); if(!nxt) return; await db.handoff(project.id, project.current_phase, nxt, role); });
  const handleReject = run(async (project, note) => { const prev=prevPhase(project.current_phase); if(!prev) return; await db.reject(project.id, project.current_phase, prev, role, note); });
  const handleAck = run(async (projectId) => { await db.ackPhase(projectId); });
  const goProject = (id) => { setActiveId(id); setPage('workflow'); };

  if (LIVE && session===undefined) return <div className="h-screen grid place-items-center text-slate-500">กำลังตรวจสอบสิทธิ์…</div>;
  if (LIVE && !session) return <Login/>;
  if (state.loading) return <div className="h-screen grid place-items-center text-slate-500">กำลังโหลดข้อมูล…</div>;
  if (LIVE && me && !me.hasRole) return <Pending email={me.email} onSignOut={handleSignOut}/>;   // ยังไม่กำหนดสิทธิ์ → รอผู้ดูแลอนุมัติ
  const poProj = poProject ? state.projects.find(p=>p.id===poProject) : null;

  return (
    <div className="h-screen flex bg-[var(--app-bg)] text-slate-200">
      <Sidebar page={page} onNav={p=>setPage(p)} state={state} isDev={role==='developer'}/>
      <div className="flex-1 flex flex-col min-w-0">
        <TopBar state={state} onNav={setPage} role={role} onRole={setRole} page={page} me={me} onSignOut={handleSignOut}/>
        {err && <div className="px-6 py-2 bg-rose-500/15 border-b border-rose-500/30 text-rose-700 text-xs flex items-center justify-between"><span>⚠ {err}</span><button onClick={()=>setErr('')} className="text-rose-600 hover:text-rose-800">✕</button></div>}
        {PAGE_DEP[page] && !canDept(role, PAGE_DEP[page]) && (
          <div className="px-6 py-2 text-[12px] flex items-center gap-2" style={{background:DEPT[PAGE_DEP[page]].c+'14', color:DEPT[PAGE_DEP[page]].c}}>👁 โหมดดูอย่างเดียว — คุณคือ <b>{DEPT[role].label}</b> · ข้อมูลของ <b>{DEPT[PAGE_DEP[page]].label}</b> แก้ไขไม่ได้</div>
        )}
        <main className="flex-1 overflow-y-auto p-6">
          {page==='dashboard'  && <Dashboard state={state} onNav={setPage} onSelectProject={goProject} onOpenPO={setPoProject}/>}
          {page==='sales'      && <SalesPipeline state={state} role={role} onAddCustomer={handleAddCustomer} onUpdateCustomer={handleUpdateCustomer} onCreateSR={handleCreateSR} onUpdateSR={handleUpdateSR} onTask={handleTask}/>}
          {page==='sales-sr'   && <SalesSR state={state} role={role} onUpdateCustomer={handleUpdateCustomer}/>}
          {page==='project'    && <ProjectDept state={state} role={role} onCreateStock={handleCreateStock} genDefaults={genDefaults} onGoStocks={()=>setPage('project-stocks')}/>}
          {page==='project-stocks' && <ProjectStocks state={state} role={role} onAddBom={handleAddBom} onUpdateBom={handleUpdateBom} onDeleteBom={handleDeleteBom} onSendBom={handleSendBom} onUpdateProject={handleUpdateProject} onOpenWorkflow={(id)=>{setActiveId(id);setPage('workflow');}}/>}
          {page==='project-handover' && <ProjectHandover state={state} role={role} onSaveSlip={handleSaveSlip} onSendSlip={handleSendSlip} onDeleteSlip={handleDeleteSlip}/>}
          {page==='purchasing' && <Procurement state={state} role={role} onUpdateBom={handleUpdateBom} onCreatePO={handleCreatePO} onOpenPO={setPoProject} genPoNo={genPoNo}/>}
          {page==='purchasing-done' && <PurchasingDone state={state}/>}
          {page==='service'    && <FieldService state={state} role={role} onTask={handleTask} onAddTask={handleAddTask} onAddMember={handleAddMember} onRemoveMember={handleRemoveMember} onAddSchedule={handleAddSchedule} onRemoveSchedule={handleRemoveSchedule} onSignDO={handleSignDO} onAckPlan={handleAckPlan}/>}
          {page==='workflow'   && <WorkflowBoard state={state} project={activeProject} role={role} onTask={handleTask} onAddTask={handleAddTask} onHandoff={handleHandoff} onReject={handleReject} onAck={handleAck} onPickStock={(id)=>setActiveId(id)}/>}
          {page==='inventory'  && <Inventory state={state} role={role} onAddMovement={handleAddMovement} onReceivePO={handleReceivePO} onTransfer={handleTransfer} onDeleteMovement={handleDeleteMovement}/>}
          {page==='settings'   && role==='developer' && <Settings state={state} role={role} onSetRole={handleSetRole} onRevoke={handleRevoke} onDeleteRow={handleDeleteRow} onUpdateRow={handleUpdateRow} onResetData={handleResetData}/>}
        </main>
      </div>
      {poProj && <PoModal project={poProj} pos={state.pos} onClose={()=>setPoProject(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
