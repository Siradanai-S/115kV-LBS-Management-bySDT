            <div className="flex items-center gap-2"><span style={{color:DEPT.project.c}}>📥</span><h3 className="text-slate-200 font-semibold">Sales Requisition ที่ฝ่ายขายส่งมา — เลือกหลายใบเพื่อสร้าง 1 Project Stock</h3><span className="text-[11px] text-slate-500">({inbox.length} ใบ)</span></div>
            {canEdit && <button onClick={openCreate} disabled={!sel.length} className="inline-flex items-center gap-1.5 text-xs font-semibold rounded-lg px-3 py-1.5" style={sel.length?{background:DEPT.project.c,color:'#0b0f17'}:{background:'#e2e8f0',color:'#94a3b8',cursor:'not-allowed'}}>{Icon.plus} สร้าง Project Stock ({sel.length})</button>}
          </div>
          <div className="p-3 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
            {inbox.map(sr => { const custs=srCusts(sr); const lbs=custs.reduce((s,c)=>s+num(c.lbs_qty),0); const selected=sel.includes(sr.id); const dd=custs.map(c=>c.desired_date).filter(Boolean).sort()[0]; return (
              <div key={sr.id} className="rounded-lg border p-3 space-y-2" style={selected?{borderColor:DEPT.project.c,background:DEPT.project.c+'12'}:{borderColor:'#cbd5e1aa',background:'#f8fafc'}}>
                <div className="flex items-start gap-2">
                  {canEdit && <input type="checkbox" checked={selected} onChange={()=>toggle(sr.id)} className="mt-1 accent-amber-500"/>}
                  <div className="flex-1"><div className="text-[13px] text-slate-200 font-medium mono">{sr.sr_no}</div><div className="text-[11px] text-slate-500">{custs.length} ลูกค้า · ทำสัญญาแล้ว {custs.filter(c=>c.contract_status==='ทำสัญญาแล้ว').length}/{custs.length}</div></div>
                  <Pill color="#f97316">LBS {lbs}</Pill>
                </div>
                <div className="space-y-1.5 border-t border-slate-700/40 pt-2">
                  {custs.map(c => (
                    <div key={c.id} className="leading-tight">
                      <div className="flex items-center gap-1.5"><span className="text-[12px] text-slate-200">{c.name}</span><Pill color={ctypeColor(c.customer_type)}>{c.customer_type}</Pill><Pill color="#f97316">LBS {c.lbs_qty}</Pill></div>
                      <div className="text-[10px] text-slate-500 mt-0.5">{c.work_type} · {c.location||'—'} · {c.contact||'—'}{c.desired_date?' · ต้องการ '+c.desired_date:''}{c.scope?' · '+c.scope:''}</div>
                    </div>
                  ))}
                  {custs.length===0 && <div className="text-[11px] text-slate-500">—</div>}
                </div>
                {dd && <div className="text-[10px] text-slate-500">เร็วสุดต้องการ {dd}</div>}
              </div>
            );})}
          </div>
        </Card>
      )}

      {/* Popup สร้าง Stock — ตั้งชื่อ/เลขเอกสาร + ถามจำนวน LBS เป้าหมาย */}
      {mk && canEdit && (
        <div className="fixed inset-0 z-50 grid place-items-center bg-black/60 p-4" onClick={()=>setMk(null)}>
          <div className="w-full max-w-lg rounded-xl border border-slate-700 bg-slate-900 fade-up" onClick={e=>e.stopPropagation()}>
            <div className="px-5 py-3.5 border-b border-slate-800 flex items-center justify-between">
              <div className="text-slate-100 font-semibold flex items-center gap-2">{Icon.layers} สร้าง Project Stock</div>
              <button onClick={()=>setMk(null)} className="text-slate-400 hover:text-slate-100">{Icon.x}</button>
            </div>
            <div className="p-5 space-y-3">
              <div className="text-[12px] text-slate-400">รวม {sel.length} SR · {selCusts.length} ลูกค้า · ยอดลูกค้าต้องการรวม {selCusts.reduce((s,c)=>s+num(c.lbs_qty),0)} LBS</div>
              <div><Lbl>ชื่อโครงการ (Project Stock Name)</Lbl><Inp value={mk.name} onChange={v=>setMk({...mk,name:v})} placeholder="เช่น งานปรับปรุงสถานีไฟฟ้าภาคตะวันออก"/></div>
              <div className="rounded-lg border border-amber-500/40 bg-amber-500/10 p-3">
                <Lbl>จำนวน LBS เป้าหมายที่จะสั่งผลิต (ใช้ตรวจสอบกับ BOM)</Lbl>
                <input type="number" value={mk.target_lbs} onChange={e=>setMk({...mk,target_lbs:num(e.target.value)})} className="w-full bg-slate-900 border border-amber-500/50 rounded-lg text-lg font-bold text-amber-700 px-3 py-2 focus:outline-none"/>
              </div>
              <div className="grid grid-cols-3 gap-3">
                <div><Lbl>Project Stock No.</Lbl><Inp value={mk.stockNo} onChange={v=>setMk({...mk,stockNo:v})}/></div>
                <div><Lbl>Job No.</Lbl><Inp value={mk.jobNo} onChange={v=>setMk({...mk,jobNo:v})}/></div>
                <div><Lbl>BOM No.</Lbl><Inp value={mk.bomNo} onChange={v=>setMk({...mk,bomNo:v})}/></div>
              </div>
            </div>
            <div className="px-5 py-3 border-t border-slate-800 flex justify-end gap-2">
              <button onClick={()=>setMk(null)} className="text-xs px-3 py-1.5 rounded-lg border border-slate-700 text-slate-300">ยกเลิก</button>
              <button onClick={confirmCreate} disabled={!mk.stockNo.trim()} className="text-xs px-4 py-1.5 rounded-lg font-semibold" style={mk.stockNo.trim()?{background:DEPT.project.c,color:'#0b0f17'}:{background:'#e2e8f0',color:'#94a3b8'}}>ยืนยันสร้าง Stock</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
const BOM_BLANK = { epicor_code:'', description:'', category:'LBS', serial_lvb:'', serial_om:'', due_date:'', ium:'EA', quantity:1, currency:'THB', unit_cost:0, fx_rate:36.5, project_phase:'Phase 1' };
function ProjectBom({state, project, canEdit, onAddBom, onUpdateBom, onDeleteBom, onSendBom, onUpdateProject}){
  const items = state.bom.filter(b=>b.project_id===project.id);
  const matValue = items.reduce((s,b)=>s+lineTHB(b),0);
  const reqLBS = requestedLBS(state, project.id);
  const targetVal = targetLBS(state, project);
  const curLBS = bomLBS(state, project.id);
  const lbsOK = curLBS===targetVal;
  const [extra, setExtra] = useState([]);   // รอบ BOM ใหม่ที่เพิ่งกด "ครั้งใหม่" (ยังไม่มีรายการ)
  const rounds = [...new Set([...projBomRounds(state, project.id), ...extra])].sort((a,b)=>a-b);
  const custs = stockCustomers(state, project.id);
  return (
    <div className="space-y-4">
      {/* Budget & Flow */}
      <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
        <Card className="p-5 lg:col-span-2">
          <h3 className="text-slate-200 font-semibold mb-4 flex items-center gap-2">{Icon.layers} Project Budget & Flow</h3>
          {canEdit && <div className="mb-4"><Lbl>ชื่อโครงการ (แก้ไขได้)</Lbl><EditText value={project.name} onCommit={v=>onUpdateProject(project.id,{name:v.trim()||project.name})}/></div>}
          <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
            <div><Lbl>งบประมาณรวม (฿)</Lbl>{canEdit ? <Inp type="number" value={project.total_budget} onChange={v=>onUpdateProject(project.id,{total_budget:num(v)})}/> : <div className="text-lg font-semibold" style={{color:'#3b82f6'}}>{baht(project.total_budget)}</div>}</div>
            <div><Lbl>กำไร Margin (%)</Lbl>{canEdit ? <Inp type="number" value={project.margin} onChange={v=>onUpdateProject(project.id,{margin:num(v)})}/> : <div className="text-lg font-semibold" style={{color:'#16a34a'}}>{project.margin}%</div>}</div>
            <Field label="กำไรเป็นเงิน" value={baht(project.total_budget*project.margin/100)} color="#8b5cf6"/>
            <div><Lbl>กระแสเงินสด</Lbl>{canEdit ? <Sel value={project.cash_flow_status} onChange={v=>onUpdateProject(project.id,{cash_flow_status:v})} options={['ปกติ','เฝ้าระวัง','วิกฤติ']}/> : <div className="text-lg font-semibold" style={{color:project.cash_flow_status==='ปกติ'?'#16a34a':'#f97316'}}>{project.cash_flow_status}</div>}</div>
          </div>
          <div className="mt-4 pt-4 border-t border-slate-800 grid grid-cols-2 sm:grid-cols-4 gap-4">
            <Field label="Project Stock No." value={project.project_stock_no} mono/><Field label="Job No." value={project.job_no||'—'} mono/>
            <Field label="BOM No." value={project.bom_no} mono/><Field label="มูลค่าวัสดุ BOM (฿)" value={baht(matValue)} color="#f97316"/>
          </div>
        </Card>
        {/* LBS reconcile — เทียบ BOM กับเป้าหมาย Stock */}
        <Card className="p-5" style={{borderColor:lbsOK?'#16a34a55':'#f43f5e55'}}>
          <h3 className="text-slate-200 font-semibold mb-3">ตรวจสอบจำนวน LBS</h3>
          <div className="grid grid-cols-2 gap-3 text-center items-end">
            <div><div className="text-[11px] text-slate-500">เป้าหมาย Stock</div>{canEdit ? <EditText type="number" value={targetVal} onCommit={v=>onUpdateProject(project.id,{target_lbs:num(v)})} className="w-full text-center bg-slate-900 border border-indigo-500/50 rounded-lg text-2xl font-bold text-indigo-600 px-2 py-1 focus:outline-none"/> : <div className="text-3xl font-bold" style={{color:'#3b82f6'}}>{targetVal}</div>}</div>
            <div><div className="text-[11px] text-slate-500">ใน BOM</div><div className="text-3xl font-bold" style={{color:'#f97316'}}>{curLBS}</div></div>
          </div>
          <div className="mt-3 text-center text-sm font-medium rounded-lg py-2" style={lbsOK?{background:'#16a34a18',color:'#16a34a'}:{background:'#f43f5e18',color:'#f43f5e'}}>
            {lbsOK ? '✓ จำนวนตรงเป้าหมาย' : (curLBS<targetVal ? `⚠ ขาดอีก ${targetVal-curLBS} ชุด` : `⚠ เกิน ${curLBS-targetVal} ชุด`)}
          </div>
          <div className="text-[10px] text-slate-500 mt-2 leading-relaxed border-t border-slate-800 pt-2">ยอดลูกค้าต้องการรวม {reqLBS} LBS · ลูกค้า: {custs.map(c=>c.name).join(', ')||'—'}</div>
        </Card>
      </div>

      {/* Material List (BOM) — สร้างได้หลายครั้ง/รอบต่อ Stock */}
      <div className="flex items-center justify-between flex-wrap gap-2">
        <h3 className="text-slate-200 font-semibold flex items-center gap-2">{Icon.box} Material List (BOM) <span className="text-[11px] text-slate-500 font-normal">{rounds.length} ครั้ง · มูลค่ารวม {baht(matValue)}</span></h3>
        {canEdit && <button onClick={()=>setExtra(e=>[...e, Math.max(0,...rounds)+1])} className="inline-flex items-center gap-1.5 text-xs font-semibold rounded-lg px-3 py-1.5" style={{background:'#f97316',color:'#0b0f17'}}>{Icon.plus} เพิ่ม Material List (BOM) ครั้งใหม่</button>}
      </div>
      {rounds.map(n => <BomRoundCard key={n} state={state} project={project} n={n} canEdit={canEdit} onAddBom={onAddBom} onUpdateBom={onUpdateBom} onDeleteBom={onDeleteBom} onSendBom={onSendBom}/>)}
      {!canEdit && <p className="text-[11px] text-slate-500">ดูอย่างเดียว — การจัดการ BOM/ส่งจัดซื้อ สงวนให้ฝ่ายโครงการ และ Developer</p>}
    </div>
  );
}

// การ์ด BOM หนึ่ง "ครั้ง" (round) — ชื่อ BOM-yyyy-000 (ครั้งN) · ส่งจัดซื้อแยกรายครั้ง
function BomRoundCard({state, project, n, canEdit, onAddBom, onUpdateBom, onDeleteBom, onSendBom}){
  const items = roundItems(state, project.id, n);
  const matValue = items.reduce((s,b)=>s+lineTHB(b),0);
  const sent = roundIsSent(state, project.id, n);
  const name = roundName(project, n);
  const [form, setForm] = useState(BOM_BLANK);
  const [open, setOpen] = useState(false);
  const editable = canEdit && !sent;
  return (
    <Card className="overflow-hidden">
      <div className="px-5 py-3.5 border-b border-slate-800 flex items-center justify-between flex-wrap gap-2" style={{background:sent?'#16a34a0e':'#f973160a'}}>
        <h3 className="text-slate-200 font-semibold flex items-center gap-2">{Icon.box} {name} <Pill color={sent?'#16a34a':'#64748b'}>{sent?'ส่งจัดซื้อแล้ว':'ร่าง'}</Pill><span className="text-[11px] text-slate-500 font-normal">{items.length} รายการ · {baht(matValue)}</span></h3>
        <div className="flex items-center gap-2">
          {items.length>0 && <button onClick={()=>exportXLSX(`${name}.xlsx`, `ครั้ง${n}`, [['Epicor Code','Description','Category','Due Date','IUM','Qty','Currency','Cost/unit','FX','Total THB','Project Phase','PO Status'], ...items.map(b=>[b.epicor_code,b.description,b.category,b.due_date,b.ium,b.quantity,b.currency,b.unit_cost,b.fx_rate,Math.round(lineTHB(b)),b.project_phase,b.po_status])])} className="inline-flex items-center gap-1.5 text-xs font-medium rounded-lg px-3 py-1.5" style={{background:'#16a34a22',color:'#16a34a'}}>⬇ Excel</button>}
          {editable && items.length>0 && <button onClick={()=>{ if(confirm(`ส่ง ${name} (${items.length} รายการ) ให้จัดซื้อ?`)) onSendBom(project.id, n); }} className="inline-flex items-center gap-1.5 text-xs font-semibold rounded-lg px-3 py-1.5" style={{background:'#16a34a',color:'#0b0f17'}}>{Icon.send} ส่ง BOM (ครั้ง{n}) ให้จัดซื้อ</button>}
          {editable && <button onClick={()=>setOpen(o=>!o)} className="inline-flex items-center gap-1.5 text-xs font-medium rounded-lg px-3 py-1.5" style={{background:'#f9731622',color:'#f97316'}}>{Icon.plus} เพิ่มรายการ</button>}
        </div>
      </div>
      {open && editable && (
        <div className="px-5 py-4 bg-slate-800/30 border-b border-slate-800 grid grid-cols-2 md:grid-cols-6 gap-3 items-end">
          <div><Lbl>Epicor Code</Lbl><Inp value={form.epicor_code} onChange={v=>setForm({...form,epicor_code:v})}/></div>
          <div className="col-span-2"><Lbl>Description</Lbl><Inp value={form.description} onChange={v=>setForm({...form,description:v})}/></div>
          <div><Lbl>Category</Lbl><Sel value={form.category} onChange={v=>setForm({...form,category:v})} options={BOM_CAT}/></div>
          {form.category==='LBS' && <div><Lbl>Serial LVB</Lbl><Inp value={form.serial_lvb} onChange={v=>setForm({...form,serial_lvb:v})} placeholder="S/N LVB"/></div>}
          {form.category==='LBS' && <div><Lbl>Serial OM</Lbl><Inp value={form.serial_om} onChange={v=>setForm({...form,serial_om:v})} placeholder="S/N OM"/></div>}
          <div><Lbl>Due Date</Lbl><Inp type="date" value={form.due_date} onChange={v=>setForm({...form,due_date:v})}/></div>
          <div><Lbl>IUM</Lbl><Inp value={form.ium} onChange={v=>setForm({...form,ium:v})}/></div>
          <div><Lbl>Qty</Lbl><Inp type="number" value={form.quantity} onChange={v=>setForm({...form,quantity:num(v)})}/></div>
          <div><Lbl>Currency</Lbl><Sel value={form.currency} onChange={v=>setForm({...form,currency:v})} options={CURRENCY}/></div>
          <div><Lbl>Cost/unit</Lbl><Inp type="number" value={form.unit_cost} onChange={v=>setForm({...form,unit_cost:num(v)})}/></div>
          {form.currency==='USD' && <div><Lbl>FX (฿/USD)</Lbl><Inp type="number" value={form.fx_rate} onChange={v=>setForm({...form,fx_rate:num(v)})}/></div>}
          <div><Lbl>Project Phase</Lbl><Inp value={form.project_phase} onChange={v=>setForm({...form,project_phase:v})} placeholder="เช่น Phase 1 / งวดที่ 1"/></div>
          <div className="col-span-2 md:col-span-6 flex justify-end gap-2">
            <button onClick={()=>setOpen(false)} className="text-xs px-3 py-1.5 rounded-lg border border-slate-700 text-slate-300">ยกเลิก</button>
            <button onClick={()=>{ if(!form.description)return; onAddBom({project_id:project.id, round:n, is_sent:false, ...form, fx_rate:form.currency==='USD'?(num(form.fx_rate)||1):1, po_status:'Awaiting PO'}); setForm(BOM_BLANK); setOpen(false); }} className="text-xs px-3 py-1.5 rounded-lg font-medium" style={{background:'#f97316',color:'#0b0f17'}}>บันทึกเข้า ครั้ง{n}</button>
          </div>
        </div>
      )}
      <div className="overflow-x-auto">
      <table className="w-full text-sm whitespace-nowrap">
        <thead><tr className="text-left text-[11px] uppercase tracking-wide text-slate-500 border-b border-slate-800">
          <th className="px-4 py-2.5 font-medium">Epicor Code</th><th className="px-3 py-2.5 font-medium">Description</th><th className="px-3 py-2.5 font-medium">Cat</th>
          <th className="px-3 py-2.5 font-medium">Due Date</th><th className="px-3 py-2.5 font-medium">IUM</th><th className="px-3 py-2.5 font-medium text-right">Qty</th>
          <th className="px-3 py-2.5 font-medium text-right">Cost/unit</th><th className="px-3 py-2.5 font-medium text-right">Total (฿)</th>
          <th className="px-3 py-2.5 font-medium">Phase</th><th className="px-3 py-2.5 font-medium">PO</th>{editable && <th className="px-3 py-2.5"/>}
        </tr></thead>
        <tbody>
          {items.length===0 && <tr><td colSpan="11" className="px-5 py-8 text-center text-slate-500">ยังไม่มีรายการใน {name} — กด “เพิ่มรายการ”</td></tr>}
          {items.map(b => (
            <tr key={b.id} className="border-b border-slate-800/60">
              <td className="px-4 py-3 mono text-slate-300">{b.epicor_code||'—'}</td>
              <td className="px-3 py-3 text-slate-200">{b.description}{b.category==='LBS'&&(b.serial_lvb||b.serial_om)?<div className="text-[10px] text-slate-500 mono">{b.serial_lvb?`S/N LVB: ${b.serial_lvb}`:''}{b.serial_lvb&&b.serial_om?' · ':''}{b.serial_om?`S/N OM: ${b.serial_om}`:''}</div>:''}</td>
              <td className="px-3 py-3"><Pill color={b.category==='LBS'?'#f97316':'#64748b'}>{b.category}</Pill></td>
              <td className="px-3 py-3 mono text-slate-400">{b.due_date||'—'}</td>
              <td className="px-3 py-3 text-slate-400">{b.ium}</td>
              <td className="px-3 py-3 text-right mono text-slate-300">{b.quantity}</td>
              <td className="px-3 py-3 text-right mono text-slate-400">{b.currency==='USD'?'$':'฿'}{num(b.unit_cost).toLocaleString()}{b.currency==='USD'?<span className="text-[10px] text-slate-600"> @{b.fx_rate}</span>:''}</td>
              <td className="px-3 py-3 text-right mono text-slate-200">{baht(lineTHB(b))}</td>
              <td className="px-3 py-3 text-slate-400 text-[12px]">{editable ? <EditText value={b.project_phase||''} onCommit={v=>onUpdateBom(b.id,{project_phase:v})} className="w-28 bg-slate-900 border border-slate-700 rounded px-1.5 py-1 text-[12px] text-slate-200 focus:outline-none focus:border-amber-500/60"/> : (b.project_phase||'—')}</td>
              <td className="px-3 py-3"><Pill color={poColor(b.po_status)}>{b.po_status}</Pill></td>
              {editable && <td className="px-3 py-3 text-right"><button onClick={()=>onDeleteBom(b.id)} className="text-slate-500 hover:text-rose-600">{Icon.trash}</button></td>}
            </tr>
          ))}
        </tbody>
        {items.length>0 && <tfoot><tr className="border-t border-slate-700"><td colSpan="7" className="px-4 py-3 text-right text-slate-400 text-xs">รวม ครั้ง{n} (฿)</td><td className="px-3 py-3 text-right font-bold text-slate-100 mono">{baht(matValue)}</td><td colSpan="3"/></tr></tfoot>}
      </table>
      </div>
      {sent && canEdit && <p className="px-5 py-2.5 text-[11px] text-emerald-700/80 border-t border-slate-800">ครั้งนี้ส่งให้จัดซื้อแล้ว — แก้ไขรายการไม่ได้ (ฝ่ายจัดซื้อจะอัปเดตสถานะ PO กลับมา)</p>}
    </Card>
  );
}

// Audit timeline — ประวัติส่งงาน/ตีกลับ/รับงาน ของ Stock (จาก handoff_log)
const HOFF_ACT = { create:{t:'สร้าง Stock',c:'#3b82f6'}, forward:{t:'ส่งงานต่อ',c:'#16a34a'}, reject:{t:'ตีกลับ',c:'#f43f5e'}, ack:{t:'รับงาน',c:'#0ea5e9'} };
function HandoffTimeline({list}){
  const items=[...list].sort((a,b)=>String(a.created_at||'').localeCompare(String(b.created_at||''))||a.id-b.id);
  if(items.length===0) return <div className="text-[12px] text-slate-500 py-1">ยังไม่มีประวัติ</div>;
  return (
    <div className="relative pl-5 space-y-2.5">
      <div className="absolute left-[6px] top-1 bottom-1 w-px bg-slate-700"/>
      {items.map(h=>{ const a=HOFF_ACT[h.action]||{t:h.action,c:'#64748b'}; return (
        <div key={h.id} className="relative">
          <span className="absolute -left-[14px] top-1 w-3 h-3 rounded-full ring-2 ring-slate-900" style={{background:a.c}}/>
          <div className="text-[12px] text-slate-200"><b style={{color:a.c}}>{a.t}</b> · {PHASE_LABEL[h.from_phase]||h.from_phase} → {PHASE_LABEL[h.to_phase]||h.to_phase} <span className="text-slate-500">· โดย {DEPT[h.by_dept]?.label||h.by_dept||'—'}</span></div>
          <div className="text-[10px] text-slate-500">{String(h.created_at||'').slice(0,10)}{h.note?' · 📝 '+h.note:''}</div>
        </div>
      );})}
    </div>
  );
}
// แท็บกิ่งย่อย: Stock No. — กล่องข้อมูลรายโครงการ (พับได้, เริ่มต้นซ่อน) + ส่งแผนส่งมอบให้ Service
function ProjectStocks({state, role, onAddBom, onUpdateBom, onDeleteBom, onSendBom, onUpdateProject, onOpenWorkflow}){
  const canEdit = role==='developer' || role==='project';
  const [open,setOpen]=useState({});
  const [q,setQ]=useState('');
  const toggle = id => setOpen(o=>({...o,[id]:!o[id]}));
  if(state.projects.length===0) return <Empty msg="ยังไม่มี Project Stock — สร้างจากแท็บหลักของฝ่ายโครงการ"/>;
  const list = state.projects.filter(p=> !q || (p.project_stock_no+' '+p.name+' '+PHASE_LABEL[p.current_phase]).toLowerCase().includes(q.toLowerCase()));
  const exportAll = () => exportXLSX('project-stocks.xlsx', 'Project Stocks', [['Stock No.','Job No.','BOM No.','ชื่อโครงการ','เฟส','LBS เป้าหมาย','LBS ใน BOM','งบประมาณ','Margin %','ลูกค้า'],
    ...state.projects.map(p=>[p.project_stock_no,p.job_no,p.bom_no,p.name,PHASE_LABEL[p.current_phase],targetLBS(state,p),bomLBS(state,p.id),p.total_budget,p.margin,stockCustomers(state,p.id).map(c=>c.name).join('; ')])]);
  return (
    <div className="space-y-3">
      <div className="flex items-center justify-between gap-2 flex-wrap">
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="🔍 ค้นหา Stock No. / ชื่อโครงการ / เฟส" className="w-80 max-w-full bg-slate-900 border border-slate-700 rounded-lg text-sm text-slate-100 px-3 py-1.5 focus:outline-none focus:border-amber-500/60"/>
        <button onClick={exportAll} className="inline-flex items-center gap-1.5 text-xs font-medium rounded-lg px-3 py-1.5" style={{background:'#16a34a22',color:'#16a34a'}}>⬇ สรุปทั้งหมด (Excel)</button>
      </div>
      {list.length===0 && <Empty msg="ไม่พบ Stock ที่ตรงกับคำค้นหา"/>}
      {list.map(p => {
        const isOpen=!!open[p.id]; const pr=projProgress(state.tasks,p.id); const plans=(state.plans||[]).filter(x=>x.project_id===p.id);
        return (
          <Card key={p.id} className="overflow-hidden">
            <div className="px-5 py-3.5 flex items-center justify-between flex-wrap gap-2 cursor-pointer hover:bg-slate-800/20" onClick={()=>toggle(p.id)}>
              <div className="flex items-center gap-2"><span className="text-slate-500">{isOpen?'▼':'▶'}</span><span className="mono text-slate-200 font-semibold">{p.project_stock_no}</span><Pill color={DEPT[p.current_phase]?.c||'#64748b'}>{PHASE_LABEL[p.current_phase]}</Pill><Pill color={bomStatusColor(bomStatusOf(state,p))}>{p.bom_no}{projBomRounds(state,p.id).length>1?` ·${projBomRounds(state,p.id).length} ครั้ง`:''}</Pill><span className="text-[12px] text-slate-400">{p.name}</span></div>
              <div className="flex items-center gap-2" onClick={e=>e.stopPropagation()}>
                <span className="text-[11px] text-slate-500">{pr}% · {stockCustomers(state,p.id).length} ลูกค้า</span>
                <button onClick={()=>onOpenWorkflow(p.id)} className="text-xs font-medium rounded-md px-2.5 py-1" style={{background:'#0ea5e922',color:'#0ea5e9'}}>Workflow →</button>
              </div>
            </div>
            {plans.length>0 && <div className="px-5 py-2 border-t border-slate-800 flex flex-wrap gap-2">{plans.map(pl=><span key={pl.id} className="text-[11px] rounded-full px-2.5 py-1" style={pl.acked?{background:'#16a34a22',color:'#16a34a'}:{background:'#f9731622',color:'#f97316'}}>📋 {pl.wd_no||'แผนส่ง'} · {pl.acked?'Service รับแล้ว':'รอ Service รับ'}</span>)}</div>}
            {isOpen && <div className="border-t border-slate-800 p-4 space-y-4">
              <ProjectBom state={state} project={p} canEdit={canEdit} onAddBom={onAddBom} onUpdateBom={onUpdateBom} onDeleteBom={onDeleteBom} onSendBom={onSendBom} onUpdateProject={onUpdateProject}/>
              <Card className="p-4"><h3 className="text-slate-200 font-semibold mb-3 flex items-center gap-2">📜 ประวัติการส่งงาน (Audit Timeline)</h3><HandoffTimeline list={(state.handoffs||[]).filter(h=>h.project_id===p.id)}/></Card>
            </div>}
          </Card>
        );
      })}
    </div>
  );
}

/* ============================ PURCHASING DEPARTMENT ============================ */
const PO_FORM_BLANK = { po_no:'', supplier:'', expected_date:'', status:'ออกแล้ว', pdf_name:null, pdf_url:null, qtys:{} };
const posCovering = (state, bomId) => (state.pos||[]).filter(o=>(o.lines||[]).some(l=>l.bom_id===bomId));
function Procurement({state, role, onUpdateBom, onCreatePO, onOpenPO, genPoNo}){
  const canEdit = role==='developer' || role==='purchasing';
  const sentProjects = state.projects.filter(p=> state.bom.some(b=>b.project_id===p.id && b.is_sent));   // เฉพาะ Stock ที่ส่ง BOM (ครั้งใด ๆ) มาแล้ว
  const [expanded,setExpanded]=useState({});            // การ์ดที่กางอยู่ (เริ่มต้นซ่อนทั้งหมด)
  const [poForm,setPoForm]=useState(PO_FORM_BLANK); const [poOpen,setPoOpen]=useState(null);
  const poCount = pid => state.pos.filter(o=>o.project_id===pid).length;
  const toggleCard = id => setExpanded(e=>({...e,[id]:!e[id]}));
  const startPO = (pid) => { setExpanded(e=>({...e,[pid]:true})); setPoForm({...PO_FORM_BLANK, qtys:{}, po_no:genPoNo()}); setPoOpen(pid); };
  const onPdf = (file) => { if(!file) return; const reader=new FileReader(); reader.onload=()=>setPoForm(f=>({...f, pdf_name:file.name, pdf_url:reader.result})); reader.readAsDataURL(file); };
  const toggleQty = (id, remaining) => setPoForm(f=>{ const q={...f.qtys}; if(q[id]!=null) delete q[id]; else q[id]=remaining; return {...f,qtys:q}; });
  const setQty = (id, v, remaining) => setPoForm(f=>({...f, qtys:{...f.qtys, [id]: Math.max(1, Math.min(remaining, num(v)))}}));
  const [q,setQ]=useState('');
  const list = sentProjects.filter(p=> !q || (p.bom_no+' '+p.project_stock_no+' '+p.name).toLowerCase().includes(q.toLowerCase()));
  return (
    <div className="space-y-4">
      <input value={q} onChange={e=>setQ(e.target.value)} placeholder="🔍 ค้นหา BOM No. / Stock / โครงการ" className="w-80 max-w-full bg-slate-900 border border-slate-700 rounded-lg text-sm text-slate-100 px-3 py-1.5 focus:outline-none focus:border-amber-500/60"/>
      {sentProjects.length===0 && <Empty msg="ยังไม่มี BOM ที่ฝ่ายโครงการส่งเข้ามา"/>}
      {list.map(p => {
        const items = state.bom.filter(b=>b.project_id===p.id && b.is_sent);   // เฉพาะรายการที่ส่งจัดซื้อแล้ว (รอบที่ส่งแล้ว)
        const delivered = items.filter(b=>b.po_status==='Delivered').length;
        const fullyOrdered = items.filter(b=>bomRemaining(state,b)<=0).length;
        const available = items.filter(b=>bomRemaining(state,b)>0);   // ยังลงใบ PO ไม่ครบจำนวน
        const isExp = !!expanded[p.id];
        const formOpen = poOpen===p.id && canEdit;
        const lines = Object.entries(poForm.qtys).map(([id,qty])=>({bom_id:Number(id), qty:num(qty)})).filter(l=>l.qty>0);
        const selTHB = formOpen ? lines.reduce((s,l)=>{ const b=items.find(x=>x.id===l.bom_id); return s + (b? num(l.qty)*num(b.unit_cost)*(b.currency==='USD'?(num(b.fx_rate)||1):1) : 0); },0) : 0;
        return (
          <Card key={p.id} className="overflow-hidden">
            {/* หัวการ์ด — คลิกเพื่อกาง/ยุบ */}
            <div className="px-5 py-3.5 border-b border-slate-800 flex items-center justify-between flex-wrap gap-2 cursor-pointer hover:bg-slate-800/20" onClick={()=>toggleCard(p.id)}>
              <div><h3 className="text-slate-200 font-semibold flex items-center gap-2"><span className="text-slate-500">{isExp?'▼':'▶'}</span>{Icon.cart} {p.bom_no} <span className="text-[11px] text-slate-500 mono">{p.project_stock_no} · {p.name}</span></h3>
                <div className="text-[11px] text-slate-500 mt-0.5 ml-5">ของเข้าแล้ว {delivered}/{items.length} · ลงใบ PO ครบ {fullyOrdered}/{items.length} · {poCount(p.id)} PO · กำหนดส่ง {p.delivery_date||'—'}</div></div>
              <div className="flex items-center gap-2" onClick={e=>e.stopPropagation()}>
                {poCount(p.id)>0 && <button onClick={()=>onOpenPO(p.id)} className="inline-flex items-center gap-1 text-xs font-medium rounded-md px-2.5 py-1.5" style={{background:'#3b82f622',color:'#2563eb'}}>{poCount(p.id)} PO →</button>}
                {canEdit && <button onClick={()=>startPO(p.id)} disabled={available.length===0} title={available.length?'':'ทุกรายการลงใบ PO ครบจำนวนแล้ว'} className="inline-flex items-center gap-1.5 text-xs font-medium rounded-lg px-3 py-1.5" style={available.length?{background:'#f43f5e22',color:'#f43f5e'}:{background:'#e2e8f0',color:'#94a3b8',cursor:'not-allowed'}}>{Icon.plus} ออก PO</button>}
              </div>
            </div>

            {isExp && (<>
              {/* ฟอร์มออก PO — เลือกรายการ + ระบุจำนวนต่อรายการ (แยกบางส่วนได้) */}
              {formOpen && (
                <div className="px-5 py-4 bg-slate-800/30 border-b border-slate-800 space-y-3">
                  <div className="text-[12px] text-slate-300 font-medium">เลือกรายการ BOM เข้าใบสั่งซื้อ + ระบุจำนวน <span className="text-slate-500">(ใส่จำนวนได้ไม่เกินที่เหลือ — ลงครบแล้วจะถูกตัดออก)</span></div>
                  <div className="space-y-1.5">
                    {available.length===0 && <div className="text-[12px] text-slate-500">— ทุกรายการลงใบ PO ครบจำนวนแล้ว —</div>}
                    {available.map(b=>{ const rem=bomRemaining(state,b); const on=poForm.qtys[b.id]!=null; return (
                      <div key={b.id} className="flex items-center gap-2 rounded-lg border p-2" style={on?{borderColor:'#f43f5e',background:'#f43f5e12'}:{borderColor:'#cbd5e1aa'}}>
                        <input type="checkbox" checked={on} onChange={()=>toggleQty(b.id, rem)} className="accent-rose-500"/>
                        <span className="flex-1 text-[12px] text-slate-200"><Pill color={b.category==='LBS'?'#f97316':'#64748b'}>{b.category}</Pill> {b.epicor_code} · {b.description} <span className="text-[10px] text-slate-500">(ครั้ง{roundOf(b)})</span></span>
                        <span className="text-[10px] text-slate-500">เหลือ {rem}/{b.quantity} {b.ium}</span>
                        {on && <input type="number" value={poForm.qtys[b.id]} min="1" max={rem} onChange={e=>setQty(b.id, e.target.value, rem)} className="w-16 bg-slate-900 border border-rose-500/50 rounded px-2 py-1 text-xs text-rose-800 text-center focus:outline-none"/>}
                      </div>
                    );})}
                  </div>
                  <div className="grid grid-cols-2 md:grid-cols-5 gap-3 items-end pt-1">
                    <div><Lbl>เลขที่ PO</Lbl><Inp value={poForm.po_no} onChange={v=>setPoForm({...poForm,po_no:v})}/></div>
                    <div className="col-span-2"><Lbl>ผู้ขาย (Supplier)</Lbl><Inp value={poForm.supplier} onChange={v=>setPoForm({...poForm,supplier:v})}/></div>
                    <div><Lbl>กำหนดรับ</Lbl><Inp type="date" value={poForm.expected_date} onChange={v=>setPoForm({...poForm,expected_date:v})}/></div>
                    <div><Lbl>สถานะ</Lbl><Sel value={poForm.status} onChange={v=>setPoForm({...poForm,status:v})} options={['รอออก','ออกแล้ว','กำลังส่ง','รับครบ']}/></div>
                    <div className="col-span-2"><Lbl>แนบไฟล์ PDF</Lbl><input type="file" accept="application/pdf" onChange={e=>onPdf(e.target.files[0])} className="w-full text-[11px] text-slate-400 file:mr-2 file:rounded file:border-0 file:bg-slate-700 file:text-slate-200 file:px-2 file:py-1"/>{poForm.pdf_name && <span className="text-[10px] text-emerald-600">✓ {poForm.pdf_name}</span>}</div>
                    <div><Lbl>มูลค่ารวม (฿)</Lbl><div className="text-sm font-bold mono py-1.5" style={{color:'#f97316'}}>{baht(selTHB)}</div></div>
                    <div className="col-span-2 flex items-end justify-end gap-2">
                      <button onClick={()=>setPoOpen(null)} className="text-xs px-3 py-1.5 rounded-lg border border-slate-700 text-slate-300">ยกเลิก</button>
                      <button onClick={()=>{ if(!lines.length||!poForm.po_no.trim())return; onCreatePO(p.id, { po_no:poForm.po_no.trim(), supplier:poForm.supplier, expected_date:poForm.expected_date||null, status:poForm.status, amount:selTHB, pdf_name:poForm.pdf_name, pdf_url:poForm.pdf_url }, lines); setPoOpen(null); }} disabled={!lines.length||!poForm.po_no.trim()} className="text-xs px-3 py-1.5 rounded-lg font-medium" style={(lines.length&&poForm.po_no.trim())?{background:'#f43f5e',color:'#0b0f17'}:{background:'#e2e8f0',color:'#94a3b8'}}>บันทึก PO ({lines.length})</button>
                    </div>
                  </div>
                </div>
              )}
              {/* ตารางรายการ BOM ครบทุกคอลัมน์ + สถานะ PO (แจ้งกลับ Project) */}
              <div className="overflow-x-auto">
              <table className="w-full text-sm whitespace-nowrap">
                <thead><tr className="text-left text-[11px] uppercase tracking-wide text-slate-500 border-b border-slate-800">
                  <th className="px-4 py-2.5 font-medium">Epicor Code</th><th className="px-3 py-2.5 font-medium">Description</th><th className="px-3 py-2.5 font-medium">Cat</th>
                  <th className="px-3 py-2.5 font-medium">Due</th><th className="px-3 py-2.5 font-medium">IUM</th><th className="px-3 py-2.5 font-medium text-right">Qty</th>
                  <th className="px-3 py-2.5 font-medium text-right">Cost/unit</th><th className="px-3 py-2.5 font-medium text-right">Total(฿)</th><th className="px-3 py-2.5 font-medium">Phase</th>
                  <th className="px-3 py-2.5 font-medium">สถานะ PO (แจ้งกลับ Project)</th>
                </tr></thead>
                <tbody>
                  {items.map(b => { const covers=posCovering(state,b.id); const rem=bomRemaining(state,b); return (
                    <tr key={b.id} className="border-b border-slate-800/60">
                      <td className="px-4 py-3 mono text-slate-300">{b.epicor_code||'—'}</td>
                      <td className="px-3 py-3 text-slate-200">{b.description} <span className="text-[10px] text-slate-500">(ครั้ง{roundOf(b)})</span></td>
                      <td className="px-3 py-3"><Pill color={b.category==='LBS'?'#f97316':'#64748b'}>{b.category}</Pill></td>
                      <td className="px-3 py-3 mono text-slate-400">{b.due_date||'—'}</td>
                      <td className="px-3 py-3 text-slate-400">{b.ium}</td>
                      <td className="px-3 py-3 text-right mono text-slate-300">{b.quantity}{rem>0&&rem<b.quantity?<span className="text-[10px] text-rose-600"> (เหลือ {rem})</span>:''}</td>
                      <td className="px-3 py-3 text-right mono text-slate-400">{b.currency==='USD'?'$':'฿'}{num(b.unit_cost).toLocaleString()}{b.currency==='USD'?<span className="text-[10px] text-slate-600"> @{b.fx_rate}</span>:''}</td>
                      <td className="px-3 py-3 text-right mono text-slate-200">{baht(lineTHB(b))}</td>
                      <td className="px-3 py-3 text-slate-400 text-[12px]">{b.project_phase}</td>
                      <td className="px-3 py-3">
                        <div className="flex flex-col gap-1 items-start">
                          {canEdit ? <select value={b.po_status} onChange={e=>onUpdateBom(b.id,{po_status:e.target.value})} className="text-xs rounded-md px-2 py-1.5 border bg-slate-900" style={{borderColor:poColor(b.po_status)+'66',color:poColor(b.po_status)}}><option className="bg-slate-800 text-slate-100">Awaiting PO</option><option className="bg-slate-800 text-slate-100">PO Received</option><option className="bg-slate-800 text-slate-100">Delivered</option></select> : <Pill color={poColor(b.po_status)}>{b.po_status}</Pill>}
                          {covers.length>0 ? covers.map(po=>{ const ln=(po.lines||[]).find(l=>l.bom_id===b.id); return <span key={po.id} className="text-[10px] text-indigo-600 flex items-center gap-1.5 mono">{po.po_no} ×{ln?ln.qty:''}{po.pdf_url && <button onClick={()=>window.open(po.pdf_url,'_blank')} className="text-sky-600 hover:underline">📎</button>}</span>; }) : <span className="text-[10px] text-slate-600">ยังไม่ลงใบ PO</span>}
                        </div>
                      </td>
                    </tr>
                  );})}
                </tbody>
              </table>
              </div>
            </>)}
          </Card>
        );
      })}
      {!canEdit && sentProjects.length>0 && <p className="text-[11px] text-slate-500">อัปเดตสถานะ PO / ออก PO ได้เฉพาะฝ่ายจัดซื้อ และ Developer (จำลองสิทธิ์ RLS)</p>}
    </div>
  );
}
// แท็บกิ่งย่อย: BOM Delivered completed — รวมรายการที่ส่งมอบครบทุก PO
function PurchasingDone({state}){
  const rows = state.bom.filter(b=>b.po_status==='Delivered').map(b=>({ b, p:state.projects.find(x=>x.id===b.project_id), pos:posCovering(state,b.id) }));
  const totalTHB = rows.reduce((s,r)=>s+lineTHB(r.b),0);
  return (
    <Card className="overflow-hidden">
      <div className="px-5 py-3.5 border-b border-slate-800 flex items-center gap-2"><span style={{color:'#16a34a'}}>{Icon.check}</span><h3 className="text-slate-200 font-semibold">BOM Delivered completed</h3><span className="text-[11px] text-slate-500">({rows.length} รายการ · {baht(totalTHB)})</span></div>
      <div className="overflow-x-auto">
      <table className="w-full text-sm whitespace-nowrap">
        <thead><tr className="text-left text-[11px] uppercase tracking-wide text-slate-500 border-b border-slate-800">
          <th className="px-5 py-2.5 font-medium">Stock / BOM No.</th><th className="px-3 py-2.5 font-medium">Epicor Code</th><th className="px-3 py-2.5 font-medium">Description</th>
          <th className="px-3 py-2.5 font-medium">Cat</th><th className="px-3 py-2.5 font-medium text-right">Qty</th><th className="px-3 py-2.5 font-medium text-right">Total(฿)</th><th className="px-3 py-2.5 font-medium">PO</th>
        </tr></thead>
        <tbody>
          {rows.length===0 && <tr><td colSpan="7" className="px-5 py-8 text-center text-slate-500">ยังไม่มีรายการที่ Delivered</td></tr>}
          {rows.map(({b,p,pos}) => (
            <tr key={b.id} className="border-b border-slate-800/60">
              <td className="px-5 py-3 mono text-slate-300">{p?.project_stock_no}<div className="text-[10px] text-slate-500">{p?.bom_no} (ครั้ง{roundOf(b)})</div></td>
              <td className="px-3 py-3 mono text-slate-300">{b.epicor_code||'—'}</td>
              <td className="px-3 py-3 text-slate-200">{b.description}</td>
              <td className="px-3 py-3"><Pill color={b.category==='LBS'?'#f97316':'#64748b'}>{b.category}</Pill></td>
              <td className="px-3 py-3 text-right mono text-slate-300">{b.quantity} {b.ium}</td>
              <td className="px-3 py-3 text-right mono text-slate-200">{baht(lineTHB(b))}</td>
              <td className="px-3 py-3">{pos.map(po=><span key={po.id} className="text-[10px] text-indigo-600 mono flex items-center gap-1">{po.po_no}{po.pdf_url&&<button onClick={()=>window.open(po.pdf_url,'_blank')} className="text-sky-600">📎</button>}</span>)}</td>
            </tr>
          ))}
        </tbody>
      </table>
      </div>
    </Card>
  );
}

/* ============================ SERVICE DEPARTMENT ============================ */
// เบิกวัสดุตามงานติดตั้ง (ดึงจาก BOM) — ตัดสต็อกระดับโครงการ (OUT reason 'ติดตั้งงาน')
// ใบเบิกติดตั้ง (สร้างที่ฝ่ายโครงการ) — เลือกรายการ BOM + จำนวน + แผนดำเนินการ เริ่ม–สิ้นสุด → ตัดสต็อกโครงการ + ส่งให้ Service
function HandoverSlip({project, state, onClose, onSubmit}){
  const lines = useMemo(()=> (state.bom||[]).filter(b=>b.project_id===project.id).map(b=>{
    const code=b.epicor_code, need=num(b.quantity);
    const installed=Math.min(need, installedQty(state, project.id, code));
    const onhand=invOnhand(state, project.id, code);
    const remaining=Math.max(0, need-installed);
    return { id:b.id, code, desc:b.description, need, installed, onhand, remaining, cat:b.category };
  }), [state, project.id]);
  const [qty, setQty] = useState(()=>{ const m={}; lines.forEach(l=>{ m[l.id]=Math.min(l.remaining, l.onhand); }); return m; });
  const [ps,setPs]=useState(project.delivery_date||''); const [pe,setPe]=useState(project.delivery_date||'');
  const [note,setNote]=useState(''); const [location,setLocation]=useState(stockCustomers(state,project.id).map(c=>c.location).filter(Boolean).join(' / '));
  const setQ = (id, v, cap) => setQty(m=>({...m, [id]:Math.max(0, Math.min(cap, Math.floor(num(v))))}));
  const totalDraw = lines.reduce((s,l)=>s+num(qty[l.id]),0);
  const submit = () => {
    const picked=lines.filter(l=>num(qty[l.id])>0).map(l=>({ bom_id:l.id, code:l.code, desc:l.desc, qty:num(qty[l.id]) }));
    if(!picked.length){ onClose(); return; }
    onSubmit(project.id, { lines:picked, plan_start:ps||null, plan_end:pe||null, location, note }); onClose();
  };
  return (
    <div className="fixed inset-0 z-50 grid place-items-center bg-black/60 p-4" onClick={onClose}>
      <div className="w-full max-w-3xl rounded-xl border border-slate-700 bg-slate-900 fade-up max-h-[90vh] flex flex-col" onClick={e=>e.stopPropagation()}>
        <div className="px-5 py-3.5 border-b border-slate-800 flex items-center justify-between">
          <div><div className="text-slate-100 font-semibold flex items-center gap-2">📝 สร้างใบเบิกติดตั้ง + แผนส่งมอบ</div>
            <div className="text-[11px] text-slate-500 mono">{project.project_stock_no} · Job {project.job_no}</div></div>
          <button onClick={onClose} className="text-slate-400 hover:text-slate-100">{Icon.x}</button>
        </div>
        <div className="overflow-y-auto">
          <div className="px-5 py-3 grid grid-cols-2 md:grid-cols-4 gap-3 border-b border-slate-800 bg-slate-800/20">
            <div><Lbl>แผนเริ่ม (start)</Lbl><Inp type="date" value={ps} onChange={setPs}/></div>
            <div><Lbl>แผนสิ้นสุด (end)</Lbl><Inp type="date" value={pe} onChange={setPe}/></div>
            <div className="col-span-2"><Lbl>สถานที่ส่งมอบ/ติดตั้ง</Lbl><Inp value={location} onChange={setLocation}/></div>
            <div className="col-span-2 md:col-span-4"><Lbl>หมายเหตุแผนงาน</Lbl><Inp value={note} onChange={setNote} placeholder="รายละเอียดงานติดตั้ง / เงื่อนไข"/></div>
          </div>
          <table className="w-full text-sm">
            <thead><tr className="text-left text-[11px] uppercase tracking-wide text-slate-500 border-b border-slate-800">
              <th className="px-5 py-2.5 font-medium">Epicor Code</th><th className="px-3 py-2.5 font-medium">รายการ</th>
              <th className="px-3 py-2.5 font-medium text-right">BOM</th><th className="px-3 py-2.5 font-medium text-right">เบิกแล้ว</th>
              <th className="px-3 py-2.5 font-medium text-right">คงเหลือคลัง</th><th className="px-3 py-2.5 font-medium text-right w-24">เบิกครั้งนี้</th>
            </tr></thead>
            <tbody>
              {lines.length===0 && <tr><td colSpan="6" className="px-5 py-8 text-center text-slate-500">โครงการนี้ยังไม่มีรายการ BOM</td></tr>}
              {lines.map(l=>{ const cap=l.onhand; const full=l.installed>=l.need && l.need>0; return (
                <tr key={l.id} className="border-b border-slate-800/60">
                  <td className="px-5 py-2.5 mono text-slate-300">{l.code} {l.cat==='LBS'&&<Pill color="#3b82f6">LBS</Pill>}</td>
                  <td className="px-3 py-2.5 text-slate-300">{l.desc}</td>
                  <td className="px-3 py-2.5 text-right mono text-slate-300">{l.need}</td>
                  <td className="px-3 py-2.5 text-right mono">{full ? <span className="text-emerald-500">✓ {l.installed}</span> : <span className="text-slate-400">{l.installed}</span>}</td>
                  <td className="px-3 py-2.5 text-right mono" style={{color:l.onhand>0?'#cbd5e1':'#f43f5e'}}>{l.onhand}</td>
                  <td className="px-3 py-2.5 text-right">
                    <input type="number" min="0" max={cap} value={qty[l.id]} disabled={cap<=0}
                      onChange={e=>setQ(l.id, e.target.value, cap)}
                      className="w-20 text-right bg-slate-900 border border-slate-700 rounded-md text-sm text-slate-100 px-2 py-1 focus:outline-none focus:border-amber-500/60 disabled:opacity-40"/>
                  </td>
                </tr>
              );})}
            </tbody>
          </table>
          <p className="px-5 py-2 text-[11px] text-slate-500">บันทึกเป็น <b>ร่างใบเบิก</b> ก่อน (ยังไม่ตัดสต็อก/ยังไม่ส่ง) — กด “ส่งมอบ Service” ทีหลังจึงจะตัดสต็อกโครงการ + แจ้งฝ่ายบริการ · สิทธิ์การเบิกอยู่ที่ฝ่ายโครงการ</p>
        </div>
        <div className="px-5 py-3 border-t border-slate-800 flex items-center justify-between">
          <span className="text-[12px] text-slate-400">รวมเบิก <b className="text-slate-100">{totalDraw}</b> ชิ้น</span>
          <div className="flex gap-2">
            <button onClick={onClose} className="text-xs font-medium rounded-lg px-3 py-1.5 border border-slate-700 text-slate-300 hover:bg-slate-800">ยกเลิก</button>
            <button onClick={submit} disabled={totalDraw<=0} className="text-xs font-semibold rounded-lg px-4 py-1.5 disabled:opacity-40" style={{background:DEPT.project.c,color:'#0b0f17'}}>💾 บันทึกใบเบิก (ร่าง)</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// แท็บกิ่งย่อย Project: เตรียมส่งมอบ Service — ออกใบเบิกติดตั้ง (ผูก BOM/Job No.) + ส่งแผน
function ProjectHandover({state, role, onSaveSlip, onSendSlip, onDeleteSlip}){
  const canEdit = role==='developer' || role==='project';
  const [slipFor,setSlipFor]=useState(null);
  const list = state.projects.filter(p=> state.bom.some(b=>b.project_id===p.id));
  if(!list.length) return <Empty msg="ยังไม่มีโครงการที่มี BOM — สร้าง BOM ในแท็บ Stock No. ก่อน"/>;
  return (
    <div className="space-y-3">
      <div className="text-[11px] text-slate-500 leading-relaxed">ฝ่ายโครงการออก <b>ใบเบิกติดตั้ง</b> (ผูก BOM + Job No. อัตโนมัติ) แยก 2 ขั้น: <b>1) บันทึกใบเบิก (ร่าง)</b> — ยังไม่ตัดสต็อก · <b>2) ส่งมอบ Service</b> — ตัดสต็อกโครงการ + แจ้งฝ่ายบริการ (สิทธิ์เบิกอยู่ที่ฝ่ายโครงการ)</div>
      {list.map(p=>{
        const plans=(state.plans||[]).filter(x=>x.project_id===p.id); const ins=installSummary(state,p.id);
        return (
          <Card key={p.id} className="overflow-hidden">
            <div className="px-5 py-3.5 flex items-center justify-between flex-wrap gap-2">
              <div className="flex items-center gap-2 flex-wrap"><span className="mono text-slate-200 font-semibold">{p.project_stock_no}</span><Pill color={DEPT[p.current_phase]?.c||'#64748b'}>{PHASE_LABEL[p.current_phase]}</Pill><span className="text-[12px] text-slate-400">{p.name}</span><span className="text-[11px] text-slate-500 mono">Job {p.job_no||'—'}</span></div>
              {canEdit && <button onClick={()=>setSlipFor(p)} className="inline-flex items-center gap-1.5 text-xs font-semibold rounded-lg px-3 py-1.5" style={{background:DEPT.project.c,color:'#0b0f17'}}>{Icon.plus} บันทึกใบเบิก</button>}
            </div>
            <div className="px-5 pb-2 text-[11px] text-slate-500">เบิกติดตั้งแล้ว {ins.done}/{ins.need} ชิ้น · {ins.full}/{ins.lines} รายการครบ</div>
            {plans.length>0 && <div className="px-5 py-2 border-t border-slate-800 space-y-1.5">
              {plans.map(pl=>{ const st = pl.acked?{t:'✓ Service รับแล้ว',c:'#16a34a'}:pl.sent?{t:'ส่งแล้ว · รอ Service รับ',c:'#f97316'}:{t:'ร่าง (ยังไม่ส่ง)',c:'#64748b'}; return (
                <div key={pl.id} className="flex items-center justify-between text-[11px] gap-2 flex-wrap">
                  <span className="mono text-slate-300">📋 {pl.wd_no||'แผน'} · {(pl.lines||[]).length} รายการ · แผน {pl.plan_start||pl.delivery_date||'—'}{pl.plan_end?` → ${pl.plan_end}`:''}</span>
                  <div className="flex items-center gap-1.5 shrink-0">
                    <span className="rounded-full px-2 py-0.5" style={{background:st.c+'22',color:st.c}}>{st.t}</span>
                    {canEdit && !pl.sent && <button onClick={()=>{ if(confirm(`ส่งใบเบิก ${pl.wd_no} ให้ Service? — จะตัดสต็อกโครงการตามรายการ`)) onSendSlip(pl.id); }} className="rounded-md px-2 py-0.5 font-semibold" style={{background:DEPT.service.c,color:'#0b0f17'}}>{Icon.send} ส่งมอบ Service</button>}
                    {canEdit && !pl.sent && <button onClick={()=>{ if(confirm(`ลบร่างใบเบิก ${pl.wd_no}?`)) onDeleteSlip(pl.id); }} className="text-slate-500 hover:text-rose-600" title="ลบร่าง">{Icon.trash}</button>}
                  </div>
                </div>
              );})}
            </div>}
          </Card>
        );
      })}
      {slipFor && <HandoverSlip project={slipFor} state={state} onClose={()=>setSlipFor(null)} onSubmit={onSaveSlip}/>}
    </div>
  );
}

function FieldService({state, role, onTask, onAddTask, onAddMember, onRemoveMember, onAddSchedule, onRemoveSchedule, onSignDO, onAckPlan}){
  const canEdit = role==='developer' || role==='service';
  const ready = state.projects.filter(p => (p.current_phase==='service' || p.current_phase==='closed') && p.delivery_date);
  const inboxPlans = (state.plans||[]).filter(pl=>pl.sent && !pl.acked);
  const projOf = pid => state.projects.find(p=>p.id===pid);
  const members = (state.team||[]).filter(m=>m.active);
  const [pick,setPick]=useState({});   // planId -> [memberId]
  const togglePick = (plid, mid) => setPick(s=>{ const cur=s[plid]||[]; return {...s,[plid]: cur.includes(mid)?cur.filter(x=>x!==mid):[...cur,mid]}; });
  const planOf = pid => (state.plans||[]).filter(x=>x.project_id===pid);
  return (
    <div className="space-y-5">
      {/* Inbox: ใบเบิก + แผนส่งมอบใหม่ — เลือก Job/ทีมที่ว่าง แล้วกดรับงาน · ปริ้นใบเบิกไปตรวจที่ WH */}
      {inboxPlans.length>0 && (
        <Card className="overflow-hidden" style={{borderColor:DEPT.service.c+'66'}}>
          <div className="px-5 py-3 border-b border-slate-800 flex items-center gap-2" style={{background:DEPT.service.c+'12'}}>
            <span style={{color:DEPT.service.c}}>📥</span><h3 className="text-slate-200 font-semibold">แผนส่งมอบใหม่จากฝ่ายโครงการ — เลือก Job/ทีม แล้วกดรับงาน</h3><span className="text-[11px] text-slate-500">({inboxPlans.length})</span>
          </div>
          <div className="p-3 grid grid-cols-1 lg:grid-cols-2 gap-3">
            {inboxPlans.map(pl=>{ const p=projOf(pl.project_id); const d=daysUntil(pl.plan_end||pl.delivery_date); const sel=pick[pl.id]||[]; return (
              <div key={pl.id} className="rounded-lg border p-3" style={{borderColor:DEPT.service.c+'44',background:DEPT.service.c+'0e'}}>
                <div className="flex items-start justify-between gap-2">
                  <div><div className="text-[13px] text-slate-100 font-medium">{p?.name||'—'}</div><div className="text-[11px] text-slate-500 mono">{p?.project_stock_no} · Job {p?.job_no} · ใบเบิก {pl.wd_no||'—'}</div></div>
                  {d!==null && <span className="text-[10px] font-bold px-2 py-0.5 rounded-full shrink-0" style={{background:d<=15?'#f43f5e':DEPT.service.c,color:'#0b0f17'}}>ส่งใน {d} วัน</span>}
                </div>
                <div className="text-[11px] text-slate-400 mt-2 leading-relaxed border-t border-slate-700/40 pt-2">📅 แผน {pl.plan_start||'—'} → {pl.plan_end||pl.delivery_date||'—'}<br/>📍 {pl.location||'—'} · 📦 {(pl.lines||[]).length} รายการ{pl.note?<><br/>📝 {pl.note}</>:''}</div>
                {/* รายการในใบเบิก */}
                {(pl.lines||[]).length>0 && <div className="mt-2 text-[11px] text-slate-400 bg-slate-900/50 rounded-md p-2 space-y-0.5">{(pl.lines||[]).map((l,i)=>{ const b=(state.bom||[]).find(x=>x.id===l.bom_id)||{}; return <div key={i} className="flex justify-between"><span className="mono">{b.epicor_code||'—'} · {b.description||''}</span><span className="mono">×{l.qty}</span></div>; })}</div>}
                {canEdit && <>
                  {/* เลือกทีมงานที่ว่าง */}
                  <div className="mt-2"><div className="text-[10px] text-slate-500 mb-1">เลือกทีมงาน (ที่ไม่ติดคิวช่วงนี้)</div>
                    <div className="flex flex-wrap gap-1.5">
                      {members.map(m=>{ const busy=memberBusy(state,m.id,pl.plan_start,pl.plan_end); const on=sel.includes(m.id); return (
                        <button key={m.id} onClick={()=>togglePick(pl.id,m.id)} title={busy?'ติดคิวงานช่วงนี้':''} className="text-[10px] rounded-full px-2 py-0.5 border" style={on?{background:DEPT.service.c,color:'#0b0f17',borderColor:DEPT.service.c}:busy?{borderColor:'#f43f5e55',color:'#f43f5e'}:{borderColor:'#64748b66',color:'#94a3b8'}}>{on?'✓ ':''}{m.name}{busy?' ⚠':''}</button>
                      );})}
                      {members.length===0 && <span className="text-[10px] text-slate-500">ยังไม่มีสมาชิกทีม</span>}
                    </div>
                  </div>
                  <div className="mt-2 flex gap-2">
                    <button onClick={()=>printWithdrawal(pl,p,state)} className="flex-1 text-xs font-semibold rounded-md px-3 py-1.5 border inline-flex items-center justify-center gap-1.5" style={{borderColor:'#0ea5e966',color:'#0ea5e9'}}>🖨️ ปริ้นใบเบิก (ตรวจที่ WH)</button>
                    <button onClick={()=>onAckPlan(pl.id, sel)} disabled={!sel.length} className="flex-1 text-xs font-semibold rounded-md px-3 py-1.5 disabled:opacity-40" style={{background:DEPT.service.c,color:'#0b0f17'}}>✓ รับงาน + จัดทีม ({sel.length})</button>

          const tasks = state.tasks.filter(t=>t.project_id===p.id && t.department==='service').sort((a,b)=>a.sort_order-b.sort_order);
          const d = daysUntil(p.delivery_date); const ackedPlans=planOf(p.id).filter(pl=>pl.acked);
          return (
            <Card key={p.id} className="p-5">
              <div className="flex items-start justify-between"><div><div className="text-slate-100 font-semibold">{p.name}</div><div className="text-[11px] text-slate-500 mono">{p.project_stock_no} · {p.job_no}</div></div>{d!==null && p.current_phase!=='closed' && <span className="text-xs font-bold px-2.5 py-1 rounded-full" style={{background:d<=15?'#f43f5e':'#16a34a',color:'#0b0f17'}}>ส่งใน {d} วัน</span>}{p.current_phase==='closed' && <Pill color="#16a34a">ปิดงานแล้ว</Pill>}</div>
              <div className="mt-4 space-y-2">

                  <div key={t.id} className="flex items-center gap-3 rounded-lg bg-slate-800/40 p-2.5"><span style={{color:taskColor(t.status)}}>{t.status==='Completed'?Icon.check:Icon.clock}</span><span className="flex-1 text-[13px] text-slate-200">{t.task_title}</span>{canEdit ? <select value={t.status} onChange={e=>onTask(t.id,e.target.value)} className="text-xs rounded-md px-2 py-1 border bg-slate-900" style={{borderColor:taskColor(t.status)+'66',color:taskColor(t.status)}}>{TASK_STATUS.map(s=><option key={s} value={s} className="bg-slate-800 text-slate-100">{TASK_TH[s]}</option>)}</select> : <Pill color={taskColor(t.status)}>{TASK_TH[t.status]}</Pill>}</div>
                ))}
                {canEdit && <AddTask color={DEPT.service.c} onAdd={(title,detail)=>onAddTask(p.id,'service',title,detail)}/>}
              </div>
              {(() => { const ins=installSummary(state,p.id); return (
                <div className="mt-3 pt-3 border-t border-slate-800 space-y-2.5">
                  {ins.lines>0 && (
                    <div>
                      <div className="flex items-center justify-between text-[11px] mb-1"><span className="text-slate-400">เบิกวัสดุติดตั้งตาม BOM (ออกใบเบิกที่ฝ่ายโครงการ)</span><span className="mono" style={{color:ins.complete?'#16a34a':'#94a3b8'}}>{ins.done}/{ins.need} ชิ้น · {ins.full}/{ins.lines} รายการครบ</span></div>
                      <div className="h-1.5 rounded-full bg-slate-800"><div className="h-full rounded-full transition-all" style={{width:(ins.need?Math.round(ins.done/ins.need*100):0)+'%',background:ins.complete?'#16a34a':DEPT.service.c}}/></div>
                    </div>
                  )}
                  {canEdit && (
                    <div className="flex items-center justify-between gap-2">
                      {ackedPlans.length>0 ? <button onClick={()=>printWithdrawal(ackedPlans[0],p,state)} className="text-xs font-semibold rounded-md px-3 py-1.5 inline-flex items-center gap-1.5 border" style={{borderColor:'#0ea5e966',color:'#0ea5e9'}}>🖨️ ปริ้นใบเบิก</button> : <span className="text-[11px] text-slate-500">ยังไม่มีใบเบิกที่รับ</span>}
                      <button onClick={()=>onSignDO(p.id)} disabled={p.do_signed} title={ins.lines>0 && !ins.complete ? 'ยังเบิกติดตั้งไม่ครบตาม BOM' : ''} className="text-xs font-semibold rounded-md px-3 py-1.5 inline-flex items-center gap-1.5" style={p.do_signed?{background:'#e2e8f0',color:'#94a3b8'}:{background:DEPT.service.c,color:'#0b0f17'}}>{Icon.doc} {p.do_signed?'ลงนาม DO แล้ว':'ส่งมอบ & ลงนาม DO'}</button>
                    </div>
                  )}
                </div>
              );})()}
            </Card>
          );
        })}
      </div>
      <ServiceTeam state={state} canEdit={canEdit} onAddMember={onAddMember} onRemoveMember={onRemoveMember} onAddSchedule={onAddSchedule} onRemoveSchedule={onRemoveSchedule}/>
    </div>
  );
}
const MEMBER_BLANK = { name:'', role:'Technician', phone:'' };
const WD_TH = ['อา','จ','อ','พ','พฤ','ศ','ส'];
function ServiceTeam({state, canEdit, onAddMember, onRemoveMember, onAddSchedule, onRemoveSchedule}){
  const [ym,setYm]=useState(curYM());
  const [view,setView]=useState('calendar');                 // calendar | roster
  const [dayView,setDayView]=useState(null);                 // วันที่ (YYYY-MM-DD) ที่กดดู Event
  const [mf,setMf]=useState(MEMBER_BLANK); const [mOpen,setMOpen]=useState(false);
  const [sf,setSf]=useState({ member_id:'', project_id:'', start_date:'', end_date:'', note:'' }); const [sOpen,setSOpen]=useState(false);
  const [y,m] = ym.split('-').map(Number);
  const daysInMonth = new Date(y, m, 0).getDate();
  const firstWeekday = new Date(y, m-1, 1).getDay();          // 0=อา
  const days = Array.from({length:daysInMonth},(_,i)=>i+1);
  const cells = [...Array(firstWeekday).fill(null), ...days]; // ช่องว่างนำหน้า + วันจริง
  const todayStr = new Date().toISOString().slice(0,10);
  const shiftMonth = delta => { const d=new Date(y, m-1+delta, 1); setYm(d.toISOString().slice(0,7)); };
  const projColor = pid => { const idx=state.projects.findIndex(p=>p.id===pid); return ['#f97316','#3b82f6','#16a34a','#f43f5e','#8b5cf6','#0ea5e9'][idx%6]; };
  const projOf = pid => state.projects.find(p=>p.id===pid);

          </div>

      )}

      {/* รายการมอบหมายเดือนนี้ */}
      {monthSchedules.length>0 && (
        <div className="px-5 py-3 border-t border-slate-800 flex flex-wrap gap-2">

              {canEdit && <button onClick={()=>onRemoveSchedule(s.id)} className="hover:text-rose-700">✕</button>}

/* ============================ LOGIN (LIVE only) ============================ */
function Login(){
  const [mode,setMode]=useState('signin');
  const [email,setEmail]=useState(''); const [pw,setPw]=useState('');
  const [msg,setMsg]=useState(''); const [busy,setBusy]=useState(false);
  const submit = async () => {
    setBusy(true); setMsg('');
    try {
      if(mode==='signin'){ const {error}=await sb.auth.signInWithPassword({email,password:pw}); if(error) throw error; }
      else { const {error}=await sb.auth.signUp({email,password:pw}); if(error) throw error; setMsg('สมัครสำเร็จ — หากเปิด Email Confirmation ให้ยืนยันอีเมลก่อน จากนั้นเข้าสู่ระบบ'); setMode('signin'); }
    } catch(e){ setMsg(e.message||'เกิดข้อผิดพลาด'); } finally { setBusy(false); }
  };
  return (
    <div className="h-screen grid place-items-center bg-[var(--app-bg)] text-slate-200 grain px-4">
      <div className="w-full max-w-sm rounded-2xl border border-slate-800 bg-slate-900/70 p-7 fade-up">
        <div className="mb-5"><Brand/></div>
        <h2 className="text-slate-100 font-semibold mb-4">{mode==='signin'?'เข้าสู่ระบบ':'สมัครสมาชิก'}</h2>
        <div className="space-y-3">
          <div><Lbl>อีเมล</Lbl><Inp value={email} onChange={setEmail} type="email"/></div>
          <div><Lbl>รหัสผ่าน</Lbl><Inp value={pw} onChange={setPw} type="password"/></div>
        </div>
        {msg && <div className="mt-3 text-[12px] text-amber-600 leading-relaxed">{msg}</div>}
        <button onClick={submit} disabled={busy||!email||!pw} className="mt-4 w-full rounded-lg py-2 text-sm font-semibold" style={ busy||!email||!pw ? {background:'#e2e8f0',color:'#94a3b8'} : {background:'#f97316',color:'#0b0f17'} }>{busy?'กำลังดำเนินการ…':(mode==='signin'?'เข้าสู่ระบบ':'สมัครสมาชิก')}</button>
        <button onClick={()=>{setMode(mode==='signin'?'signup':'signin');setMsg('');}} className="mt-3 w-full text-[12px] text-slate-400 hover:text-slate-200">{mode==='signin'?'ยังไม่มีบัญชี? สมัครสมาชิก':'มีบัญชีแล้ว? เข้าสู่ระบบ'}</button>
        <p className="mt-4 text-[10px] text-slate-600 leading-relaxed text-center">สมัครครั้งแรกแล้วให้ผู้ดูแลกำหนดสิทธิ์ในตาราง <span className="mono">user_roles</span> (ดู README)</p>
      </div>
    </div>
  );
}

/* ============================ INVENTORY (คลังสินค้าจริง #3) ============================ */
const MANUAL_BLANK = { type:'IN', location:'', reason:'คืนผู้ขาย', toProject:'', epicor_code:'', description:'', qty:1, note:'' };
// เบิกเพื่อ "ติดตั้งงาน" ออกใบเบิกที่ฝ่ายโครงการ (เตรียมส่งมอบ Service) · "โอนเข้าโครงการ" ใช้ปุ่มโอน — ไม่ซ้ำซ้อนที่บันทึกเอง
const OUT_REASONS = ['คืนผู้ขาย','ชำรุด/ตัดทิ้ง'];
const INV_EDIT_ROLES = ['developer','purchasing','project','service'];
function Inventory({state, role, onAddMovement, onReceivePO, onTransfer, onDeleteMovement}){
  const canEdit = INV_EDIT_ROLES.includes(role);
  const [view,setView]=useState('central');   // central = คลังกลาง (project_id null) · stock = ต่อ Project Stock
  const [pid,setPid]=useState('');
  const [q,setQ]=useState(''); const [mode,setMode]=useState(null);   // null | 'manual' | 'recv'
  const [f,setF]=useState(MANUAL_BLANK);
  const [recvPO,setRecvPO]=useState(''); const [recvQ,setRecvQ]=useState({});
  const codes=invCodes(state);
  const balLoc = view==='central' ? null : (pid?Number(pid):null);
  const showStockPrompt = view==='stock' && !pid;
  const balance = invBalance(state, balLoc).filter(r=>!q||(r.code+' '+(r.desc||'')).toLowerCase().includes(q.toLowerCase()));
  const moves = (state.inventory||[]).filter(x=> view==='central' ? x.project_id==null : (balLoc && x.project_id===balLoc)).slice().reverse().slice(0,50);
  const pName = id => state.projects.find(p=>p.id===id)?.project_stock_no || (id?('#'+id):'คลังกลาง');
  const totalOnhand = balance.reduce((s,r)=>s+r.onhand,0);
  // PO ที่ยังมีของค้างรับ
  const outstandingPOs = state.pos.filter(po=>(po.lines||[]).some(l=>{ const b=state.bom.find(x=>x.id===l.bom_id); return b && (num(l.qty)-poReceivedQty(state,po.po_no,b.epicor_code))>0; }));
  const recvPoObj = state.pos.find(o=>o.id===Number(recvPO));
  const exp = () => exportXLSX(`inventory-${view}.xlsx`, 'Inventory', [['Epicor Code','Description','รับเข้า','เบิกออก','คงเหลือ'], ...balance.map(r=>[r.code,r.desc,r.inQ,r.outQ,r.onhand])]);
  const TabBtn = ({id,label}) => <button onClick={()=>setView(id)} className="text-xs font-medium rounded-lg px-3 py-1.5 transition" style={view===id?{background:'#0ea5e922',color:'#0ea5e9'}:{color:'#64748b'}}>{label}</button>;

  const submitManual = () => {
    const code=f.epicor_code.trim(), qty=num(f.qty); if(!code||qty<=0) return;
    const desc=f.description||codes[code]||'';
    if(f.type==='IN'){ onAddMovement({ epicor_code:code, description:desc, project_id:f.location===''?null:Number(f.location), type:'IN', reason:'รับเข้าทั่วไป', qty, note:f.note }); }
    else if(f.reason==='โอนเข้าโครงการ'){
      if(!f.toProject){ alert('เลือกโครงการปลายทาง'); return; }
      const onh=invOnhand(state,null,code); if(onh<qty){ alert(`คลังกลางมี ${code} เหลือ ${onh} — โอน ${qty} ไม่ได้`); return; }
      onTransfer(code, desc, Number(f.toProject), qty, f.note);
    } else {
      const loc=f.location===''?null:Number(f.location);
      const onh=invOnhand(state,loc,code); if(onh<qty){ alert(`${code} ที่ ${pName(loc)} เหลือ ${onh} — เบิก ${qty} ไม่ได้`); return; }
      onAddMovement({ epicor_code:code, description:desc, project_id:loc, type:'OUT', reason:f.reason, qty, note:f.note });
    }
    setF(MANUAL_BLANK); setMode(null);
  };
  const confirmRecv = () => {
    if(!recvPoObj) return; const rows=[]; const delivered=[];
    (recvPoObj.lines||[]).forEach(l=>{ const b=state.bom.find(x=>x.id===l.bom_id); if(!b) return; const recv=num(recvQ[l.bom_id]); if(recv>0){ rows.push({ epicor_code:b.epicor_code, description:b.description, project_id:null, type:'IN', reason:'รับตาม PO', po_no:recvPoObj.po_no, qty:recv, note:'รับเข้าคลังกลาง' }); if(poReceivedQty(state,recvPoObj.po_no,b.epicor_code)+recv >= num(l.qty)) delivered.push(b.id); } });
    if(rows.length) onReceivePO(rows, delivered);
    setMode(null); setRecvPO(''); setRecvQ({});
  };

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between gap-2 flex-wrap">
        <div className="flex items-center gap-0.5 rounded-lg border border-slate-700 p-0.5"><TabBtn id="central" label="คลังกลาง"/><TabBtn id="stock" label="ตาม Project Stock"/></div>
        <div className="flex items-center gap-2 flex-wrap">
          {view==='stock' && <select value={pid} onChange={e=>setPid(e.target.value)} className="bg-slate-900 border border-slate-700 rounded-lg text-sm text-slate-100 px-2.5 py-1.5"><option value="">— เลือก Stock —</option>{state.projects.map(p=><option key={p.id} value={p.id}>{p.project_stock_no} · {p.name}</option>)}</select>}
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="🔍 ค้นหารหัส/ชื่อวัสดุ" className="w-52 bg-slate-900 border border-slate-700 rounded-lg text-sm text-slate-100 px-3 py-1.5 focus:outline-none focus:border-amber-500/60"/>

          {canEdit && <button onClick={()=>{ setRecvPO(''); setRecvQ({}); setMode(mode==='recv'?null:'recv'); }} className="inline-flex items-center gap-1.5 text-xs font-semibold rounded-lg px-3 py-1.5" style={{background:'#16a34a',color:'#0b0f17'}}>📥 รับตาม PO</button>}
          {canEdit && <button onClick={()=>{ setF(MANUAL_BLANK); setMode(mode==='manual'?null:'manual'); }} className="inline-flex items-center gap-1.5 text-xs font-semibold rounded-lg px-3 py-1.5" style={{background:'#0ea5e9',color:'#0b0f17'}}>✏️ บันทึกเอง (เบิก/โอน/รับ)</button>}

        <Card className="p-4 space-y-3" style={{borderColor:'#16a34a55'}}>

            <select value={recvPO} onChange={e=>{ setRecvPO(e.target.value); setRecvQ({}); }} className="bg-slate-900 border border-slate-700 rounded-lg text-sm text-slate-100 px-2.5 py-1.5"><option value="">— เลือก PO ที่มีของค้างรับ —</option>{outstandingPOs.map(o=>{ const p=state.projects.find(x=>x.id===o.project_id); return <option key={o.id} value={o.id}>{o.po_no} · {p?.project_stock_no} · {o.supplier}</option>; })}</select>

              <tbody>{(recvPoObj.lines||[]).map(l=>{ const b=state.bom.find(x=>x.id===l.bom_id); if(!b) return null; const rec=poReceivedQty(state,recvPoObj.po_no,b.epicor_code); const rem=num(l.qty)-rec; return (
                <tr key={l.bom_id} className="border-b border-slate-800/50"><td className="px-2 py-2 mono text-slate-300">{b.epicor_code}</td><td className="px-2 py-2 text-slate-200">{b.description}</td><td className="px-2 py-2 text-right mono text-slate-400">{l.qty}</td><td className="px-2 py-2 text-right mono text-slate-400">{rec}</td><td className="px-2 py-2 text-right mono" style={{color:rem>0?'#f59e0b':'#16a34a'}}>{rem}</td>

          {f.type==='OUT' && <p className="text-[11px] text-slate-500 mt-2">⚠ ระบบบล็อกการเบิกเกินยอดคงเหลือ ณ ที่ตั้งนั้น · <b>เบิกเพื่อติดตั้งงาน</b> ออกใบเบิกที่ <b>ฝ่ายโครงการ</b> (เตรียมส่งมอบ Service — ผูก BOM/Job No. + ตัดสต็อกอัตโนมัติ) · <b>โอนเข้าโครงการ</b> ใช้ปุ่ม “โอนกลาง→โครงการ” · คลังกลางทำหน้าที่รับเข้าตาม PO + โอนข้าม Stock</p>}
        </Card>
      )}

      {showStockPrompt ? <Empty msg="เลือก Project Stock เพื่อดูยอดคงเหลือของโครงการนั้น"/> : (
      <Card className="overflow-hidden">
        <div className="px-5 py-3 border-b border-slate-800 flex items-center justify-between"><h3 className="text-slate-200 font-semibold flex items-center gap-2">{Icon.box} ยอดคงเหลือ · {view==='central'?'คลังกลาง':pName(balLoc)}</h3><span className="text-[11px] text-slate-500">{balance.length} รายการ · คงเหลือรวม {totalOnhand} หน่วย</span></div>
        <div className="overflow-x-auto"><table className="w-full text-sm">
          <thead><tr className="text-left text-[11px] uppercase tracking-wide text-slate-500 border-b border-slate-800"><th className="px-5 py-2.5 font-medium">Epicor Code</th><th className="px-3 py-2.5 font-medium">Description</th><th className="px-3 py-2.5 font-medium text-right">รับเข้า</th><th className="px-3 py-2.5 font-medium text-right">เบิกออก</th><th className="px-3 py-2.5 font-medium text-right">คงเหลือ</th></tr></thead>
          <tbody>
            {balance.length===0 && <tr><td colSpan="5" className="px-5 py-8 text-center text-slate-500">ยังไม่มีข้อมูลสต็อก</td></tr>}
            {balance.map(r=>(
              <tr key={r.code} className="border-b border-slate-800/60">
                <td className="px-5 py-3 mono text-slate-300">{r.code}</td><td className="px-3 py-3 text-slate-200">{r.desc}</td>
                <td className="px-3 py-3 text-right mono" style={{color:'#16a34a'}}>+{r.inQ}</td><td className="px-3 py-3 text-right mono" style={{color:'#f43f5e'}}>-{r.outQ}</td>
                <td className="px-3 py-3 text-right mono font-bold" style={{color:r.onhand<0?'#f43f5e':'#0f172a'}}>{r.onhand}</td>
              </tr>
