/* ============================ APP ============================ */
function App(){
  const [state, setState] = useState({ customers:[], srs:[], projects:[], tasks:[], bom:[], pos:[], team:[], schedule:[], plans:[], handoffs:[], users:[], inventory:[], notifSettings:{...NOTIF_DEFAULT}, loading:true });
  const [notifLog, setNotifLog] = useState([]);   // log การส่งแจ้งเตือน (เฉพาะ session)
  const [page, setPage] = useState('dashboard');
  const [role, setRole] = useState('developer');
  const [activeId, setActiveId] = useState('all');
  const [poProject, setPoProject] = useState(null);
  const [err, setErr] = useState('');
  const [session, setSession] = useState(LIVE ? undefined : null);
  const [me, setMe] = useState(null);

  useEffect(()=>{
    if(!LIVE) return;
    sb.auth.getSession().then(({data})=>setSession(data.session));
    const { data:sub } = sb.auth.onAuthStateChange((_e,s)=>setSession(s));
    return ()=>sub.subscription.unsubscribe();
  },[]);

  useEffect(()=>{
    if(!LIVE){ (async()=>{ const d=await db.loadAll(); setState(s=>({...s, ...d, loading:false})); })(); return; }
    if(session===undefined) return;
    if(!session){ setState(s=>({...s, loading:false})); return; }
    (async()=>{
      try{
        const { data:roleRow } = await sb.from('user_roles').select('*').eq('user_id', session.user.id).maybeSingle();
        const dep = roleRow ? (roleRow.is_developer ? 'developer' : roleRow.department) : 'sales';
        setRole(dep);
        setMe({ email:session.user.email, department: roleRow?roleRow.department:null, is_developer: roleRow?!!roleRow.is_developer:false, hasRole: !!roleRow });
        const d = await db.loadAll(); setState(s=>({...s, ...d, loading:false}));
      } catch(e){ setErr(e.message||String(e)); setState(s=>({...s, loading:false})); }
    })();
  },[session]);

  const reload = async () => { try { const d=await db.loadAll(); setState(s=>({...s, ...d})); } catch(e){ setErr(e.message||String(e)); } };
  // ครอบ action ทุกตัว: เรียก db → reload → จับ error แสดงผู้ใช้ (แก้ปัญหา fail เงียบในรีวิว)
  // run(fn, optimistic?) — ถ้ามี optimistic จะอัปเดต state ทันที (UI ตอบสนองไว) แล้วค่อย reconcile ด้วย reload
  const run = (fn, optimistic) => async (...args) => {
    try { setErr(''); if(optimistic) setState(s=>optimistic(s, ...args)); const r=await fn(...args); await reload(); return r; }
    catch(e){ setErr(e.message||String(e)); await reload(); }
  };

  // ===== แจ้งเตือน (LINE/Email ผ่าน Edge Function) — ยิงแบบ fire-and-forget + เก็บ log ในแอป =====
  const notify = (event, subject, message, force) => {
    const cfg = state.notifSettings || {};
    if(!force && !cfg['ev_'+event]) return;                       // เหตุการณ์นี้ปิดอยู่
    const id = ++notifSeq;
    const entry = { id, event, subject, message, at:new Date().toLocaleString('th-TH',{hour12:false}), status:'กำลังส่ง…' };
    setNotifLog(l=>[entry, ...l].slice(0,40));
    const fin = status => setNotifLog(l=>l.map(x=>x.id===id?{...x,status}:x));
    const line  = { enabled:!!cfg.line_enabled,  token:cfg.line_token||'', to:String(cfg.line_to||'').split(/[\s,]+/).filter(Boolean) };
    const email = { enabled:!!cfg.email_enabled, to:String(cfg.email_to||'').split(/[\s,]+/).filter(Boolean) };
    if(!line.enabled && !email.enabled){ fin('ข้าม (ไม่ได้เปิดช่องใด)'); return; }
    if(!cfg.function_url){ fin('จำลอง (ยังไม่ตั้ง Endpoint)'); return; }
    fetch(cfg.function_url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ event, subject, message, line, email }) })
      .then(r=> fin(r.ok ? 'ส่งแล้ว ✓' : ('ผิดพลาด HTTP '+r.status)))
      .catch(e=> fin('error: '+(e.message||e)));
  };
  const handleSaveNotif = run(async (patch) => { await db.saveNotifSettings(patch); },
    (s, patch) => ({...s, notifSettings:{...s.notifSettings, ...patch}}));
  const handleTestNotif = () => notify('test', '🔔 ทดสอบการแจ้งเตือน', 'ข้อความทดสอบจากระบบ 115 kV Load Break Switch · '+new Date().toLocaleString('th-TH',{hour12:false}), true);
  const handleRefreshAll = async () => { setErr(''); await reload(); };

  const handleSignOut = async () => { if(LIVE) await sb.auth.signOut(); };
  const activeProject = useMemo(()=> activeId==='all'?null:state.projects.find(p=>p.id===activeId), [activeId, state.projects]);

  /* ===== number generators (จากเลขมากสุด ไม่ใช่จำนวน) ===== */
  const year = new Date().getFullYear();
  const genSrNo    = () => `SR-${year}-${pad3(nextSeq(state.srs,'sr_no')+1)}`;
  const genStockNo = () => `STK-${year}-${pad3(nextSeq(state.projects,'project_stock_no')+1)}`;
  const genJobNo   = () => `JOB-${pad3(nextSeq(state.projects,'job_no')+1)}`;
  const genBomNo   = () => `BOM-${year}-${pad3(nextSeq(state.projects,'bom_no')+1)}`;
  const genPoNo    = () => `PO-${year}-${pad4(Math.max(1000, nextSeq(state.pos,'po_no'))+1)}`;
  const genWdNo    = () => `WD-${year}-${pad3(nextSeq(state.plans,'wd_no')+1)}`;
  const genDefaults = () => ({ stockNo:genStockNo(), jobNo:genJobNo(), bomNo:genBomNo() });   // ค่าตั้งต้นให้ฟอร์มสร้าง Stock

  const handleTask = run(async (taskId, status) => { await db.updateTask(taskId,{status, updated_by:DEPT[role].en}); },
    (s, taskId, status) => ({...s, tasks:s.tasks.map(t=>t.id===taskId?{...t,status}:t)}));
  const handleAddTask = run(async (projectId, dep, title, detail) => {
    const sib=state.tasks.filter(x=>x.project_id===projectId && x.department===dep);
    const sort=sib.length?Math.max(...sib.map(x=>x.sort_order))+1:0;
    await db.addTask({ project_id:projectId, department:dep, task_title:title, task_detail:detail, sort_order:sort, status:'Pending', updated_by:DEPT[role].en });
  });

  /* Sales */
  const handleAddCustomer = run(async (row) => { await db.addCustomer(row); });
  const handleUpdateCustomer = run(async (id, patch) => { await db.updateCustomer(id, patch); });
  const handleCreateSR = run(async (customerIds) => {
    const custs=(state.customers||[]).filter(c=>customerIds.includes(c.id));
    const r = await db.createSR(customerIds, genSrNo());
    notify('sr', '🆕 SR ใหม่ รอฝ่ายโครงการสร้าง Stock', `${r?.sr_no||''}\nลูกค้า: ${custs.map(c=>c.name).join(', ')||'-'}\nLBS รวม: ${custs.reduce((s,c)=>s+num(c.lbs_qty),0)}`);
  });
  const handleUpdateSR = run(async (id, patch) => { await db.updateSR(id, patch); },
    (s, id, patch) => ({...s, srs:s.srs.map(x=>x.id===id?{...x,...patch}:x)}));

  /* Project */
  const handleCreateStock = run(async (srIds, custom) => {
    const custs=(state.customers||[]).filter(c=>srIds.includes(c.sr_id));
    const name    = (custom && custom.name)    || (custs[0] ? (custs[0].location || custs[0].name) : 'Project Stock');
    const stockNo = (custom && custom.stockNo) || genStockNo();
    const jobNo   = (custom && custom.jobNo)   || genJobNo();
    const bomNo   = (custom && custom.bomNo)   || genBomNo();
    const target = (custom && custom.target_lbs!=null) ? custom.target_lbs : custs.reduce((s,c)=>s+num(c.lbs_qty),0);
    if(state.projects.some(p=>p.project_stock_no===stockNo)) throw new Error(`Project Stock No. "${stockNo}" มีอยู่แล้ว — กรุณาใช้เลขอื่น`);
    const r=await db.createStock(srIds, stockNo, jobNo, bomNo, name, target);
    notify('stock', '📦 สร้าง Project Stock ใหม่', `${stockNo} (Job ${jobNo})\n${name}\nLBS เป้าหมาย: ${target}`);
    await reload();
    if(r) { setActiveId(r.id); setPage('project-stocks'); }
  });
  const handleAddBom = run(async (row) => { await db.addBom(row); });
  const handleUpdateBom = run(async (id, patch) => { await db.updateBom(id, patch);
    if(patch.po_status==='Delivered'){ const b=state.bom.find(x=>x.id===id); const p=b&&state.projects.find(pp=>pp.id===b.project_id);
      // รับเข้า Project Stock อัตโนมัติ (เต็มจำนวน BOM) — กันรับซ้ำด้วย note marker BOM#id
      if(b){ const already=(state.inventory||[]).some(m=>m.type==='IN' && m.project_id===b.project_id && (m.note||'').includes('BOM#'+b.id)); if(!already){ await db.addMovement({ epicor_code:b.epicor_code, description:b.description, project_id:b.project_id, type:'IN', reason:'รับตาม PO', po_no:(posCovering(state,b.id)[0]||{}).po_no||null, qty:num(b.quantity), note:'รับอัตโนมัติเมื่อ Delivered · BOM#'+b.id, by:DEPT[role].en }); } }
      notify('po', '📦 ของเข้าครบ (Delivered) → รับเข้าคลังโครงการอัตโนมัติ', `${b?.epicor_code||''} · ${b?.description||''}\nStock ${p?.project_stock_no||''} · ${p?.bom_no||''} (ครั้ง${b?roundOf(b):1}) · ${num(b?.quantity)} ${b?.ium||''}`); }
  }, (s, id, patch) => ({...s, bom:s.bom.map(b=>b.id===id?{...b,...patch}:b)}));
  const handleDeleteBom = run(async (id) => { await db.deleteBom(id); });
  const handleSendBom = run(async (projectId, roundN) => {
    await db.sendBom(projectId, roundN);
    const p=state.projects.find(x=>x.id===projectId);
    const items = roundN==null ? state.bom.filter(b=>b.project_id===projectId) : roundItems(state, projectId, num(roundN));
    notify('bom', '🛒 ส่ง BOM ให้ฝ่ายจัดซื้อ', `${p?.bom_no||''}${roundN?` (ครั้ง${roundN})`:''}\nStock: ${p?.project_stock_no||''} · ${p?.name||''}\n${items.length} รายการ`);
  });
  const handleUpdateProject = run(async (id, patch) => { await db.updateProject(id, patch); },
    (s, id, patch) => ({...s, projects:s.projects.map(p=>p.id===id?{...p,...patch}:p)}));

  /* Purchasing */
  const handleCreatePO = run(async (projectId, row, lines) => {
    if(state.pos.some(o=>o.po_no===row.po_no)) throw new Error(`เลขที่ PO "${row.po_no}" มีอยู่แล้ว — กรุณาใช้เลขอื่น`);
    await db.createPO(projectId, row, lines);
    const p=state.projects.find(x=>x.id===projectId);
    notify('po', '🧾 ออก PO ใหม่', `PO ${row.po_no}\nStock ${p?.project_stock_no||''} · ${p?.bom_no||''}\n${(lines||[]).length} รายการ · ${baht(row.amount)}`);
  });
  const handleUpdatePO = run(async (id, patch) => { await db.updatePO(id, patch); });

  /* Service */
  const handleAddMember = run(async (row) => { await db.addMember(row); });
  const handleRemoveMember = run(async (id) => { await db.removeMember(id); });
  const handleAddSchedule = run(async (row) => { await db.addSchedule(row); });
  const handleRemoveSchedule = run(async (id) => { await db.removeSchedule(id); });
  // ปิดงานบริการ (mark service task เสร็จตามขั้น) — idx 0=รับงาน 1=จัดทีม 2=ส่งมอบ
  const completeSvcTask = async (planId, idx) => {
    const pl=(state.plans||[]).find(x=>x.id===planId); if(!pl) return;
    const t=state.tasks.filter(x=>x.project_id===pl.project_id && x.department==='service').sort((a,b)=>a.sort_order-b.sort_order)[idx];
    if(t && t.status!=='Completed') await db.updateTask(t.id, { status:'Completed', updated_by:DEPT[role].en });
  };
  // เบิกสินค้าอ้าง SR-No. — แยกต่อลูกค้า: ตัดสต็อกโครงการ (OUT 'ติดตั้งงาน') + สร้างใบเบิก 1 ใบ/ลูกค้า รอส่งมอบ Service
  const handleWithdrawSR = run(async (projectId, payload) => {
    const allocs=(payload.allocations||[]).map(a=>({...a, lines:(a.lines||[]).filter(l=>num(l.qty)>0)})).filter(a=>a.lines.length);
    if(!allocs.length) return;
    // ตรวจยอดรวมทุกลูกค้าต่อรายการ ไม่เกินคงเหลือ
    const totals={}; allocs.forEach(a=>a.lines.forEach(l=>{ totals[l.bom_id]=(totals[l.bom_id]||0)+num(l.qty); }));
    for(const [bid,q] of Object.entries(totals)){ const b=state.bom.find(x=>x.id===Number(bid)); const onh=invOnhand(state, projectId, b?.epicor_code); if(b && q>onh){ throw new Error(`${b.epicor_code} คงเหลือในคลังโครงการ ${onh} — เบิกรวม ${q} ไม่ได้`); } }
    const wd = genWdNo();
    for(let i=0;i<allocs.length;i++){ const a=allocs[i]; const wdNo = allocs.length>1 ? `${wd}-${i+1}` : wd;
      const rows=a.lines.map(l=>{ const b=state.bom.find(x=>x.id===l.bom_id)||{}; return { epicor_code:b.epicor_code, description:b.description, project_id:projectId, type:'OUT', reason:'ติดตั้งงาน', qty:num(l.qty), note:`ใบเบิก ${wdNo} · ${a.cust_name||''}`, by:DEPT[role].en }; });
      await db.addMovements(rows);
      await db.addPlan({ project_id:projectId, sr_id:payload.sr_id||null, cust_id:a.cust_id||null, wd_no:wdNo, lines:a.lines.map(l=>({bom_id:l.bom_id, qty:num(l.qty)})), plan_start:payload.plan_start||null, plan_end:payload.plan_end||null, delivery_date:payload.plan_end||payload.plan_start||null, location:a.location||'', note:payload.note||'', team_need:'', team_ids:[], sent:true, acked:false });
    }
    const p=state.projects.find(x=>x.id===projectId); const srNo=(state.srs.find(s=>s.id===payload.sr_id)||{}).sr_no||'';
    notify('handover', '🔧 เบิกสินค้า + รอส่งมอบ Service', `${wd}${srNo?` · ${srNo}`:''}\nStock ${p?.project_stock_no||''} (Job ${p?.job_no||''})\nกำหนดส่ง ${payload.plan_start||'-'} → ${payload.plan_end||'-'}\n${allocs.length} ลูกค้า · ${Object.values(totals).reduce((s,q)=>s+q,0)} ชิ้น`);
  });
  /* Service flow — 3 ขั้น กดแล้วเลื่อนอัตโนมัติ */
  // ขั้น 1: รับงาน (รับใบเบิก+แผน+D/O+Handover)
  const handleSvcReceive = run(async (planId) => { await db.ackPlan(planId); await completeSvcTask(planId, 0); });
  // ขั้น 2: จัดทีม 1-2 คน + actual Start/End + เช็กลิสต์ → ลงคิวปฏิทินตามเวลาจริง
  const handleSvcAssign = run(async (planId, teamIds, aStart, aEnd, checklist) => {
    await db.updatePlan(planId, { team_ids:teamIds, actual_start:aStart||null, actual_end:aEnd||null, checklist:checklist||{} });
    const pl=(state.plans||[]).find(x=>x.id===planId);
    if(pl){ for(const mid of (teamIds||[])){ await db.addSchedule({ project_id:pl.project_id, member_id:mid, start_date:aStart||pl.plan_start, end_date:aEnd||pl.plan_end, note:'ปฏิบัติงานจริง '+(pl.wd_no||'') }); } }
    await completeSvcTask(planId, 1);
  });
  // ขั้น 3: ส่งมอบ + ลูกค้าเซ็นรับ + แนบไฟล์ → ลงนาม DO + ปิดงานบริการ
  const handleSvcDeliver = run(async (planId, projectId, info) => {
    info=info||{};
    await db.updatePlan(planId, { delivered:true, received_by:info.received_by||null, received_date:info.received_date||null, proof_name:(info.proof&&info.proof.name)||null, proof_url:(info.proof&&info.proof.url)||null });
    await db.signDO(projectId);
    await completeSvcTask(planId, 2);
    const p=state.projects.find(x=>x.id===projectId); const pl=(state.plans||[]).find(x=>x.id===planId);
    notify('do', '✅ ลงนาม DO (ส่งมอบเสร็จ)', `${p?.project_stock_no||''} (Job ${p?.job_no||''})\n${p?.name||''}\nผู้รับมอบ: ${info.received_by||'-'} (${info.received_date||'-'})`);
  });
  // (optional) ออกใบรับประกัน
  const handleSvcWarranty = run(async (planId, payload) => {
    await db.updatePlan(planId, { warranty_no:payload.warranty_no||null, warranty_until:payload.warranty_until||null });
    const pl=(state.plans||[]).find(x=>x.id===planId); const p=pl&&state.projects.find(x=>x.id===pl.project_id);
    notify('warranty', '🛡️ ออกใบรับประกัน', `${payload.warranty_no||''}\n${p?.project_stock_no||''} (Job ${p?.job_no||''})\nรับประกันถึง ${payload.warranty_until||'-'}`);
  });

  /* Admin (Setting) */
  const handleSetRole = run(async (uid, department, is_developer) => { await db.setUserRole(uid, department, is_developer); },
    (s, uid, department, is_developer) => ({...s, users:s.users.map(u=>u.user_id===uid?{...u,department,is_developer}:u)}));
  const handleRevoke = run(async (uid) => { await db.revokeUser(uid); },
    (s, uid) => ({...s, users:s.users.map(u=>u.user_id===uid?{...u,department:null,is_developer:false}:u)}));
  const handleDeleteRow = run(async (demoKey, table, id) => { await db.deleteRow(demoKey, table, id); });
  const handleUpdateRow = run(async (demoKey, table, id, patch) => { await db.updateRow(demoKey, table, id, patch); },
    (s, demoKey, table, id, patch) => ({...s, [demoKey]: s[demoKey].map(x=>x.id===id?{...x,...patch}:x)}));
  const handleResetData = run(async () => { await db.resetData(); setActiveId('all'); setPage('dashboard'); });


  /* Linkage */
  const handleHandoff = run(async (project) => { const g=phaseDataGate(project,state); if(!g.ok) throw new Error(g.reason); const nxt=nextPhase(project.current_phase); if(!nxt) return; await db.completeAndHandoff(project.id, project.current_phase, nxt, role); });
  const handleReject = run(async (project, note) => { const prev=prevPhase(project.current_phase); if(!prev) return; await db.reject(project.id, project.current_phase, prev, role, note); });
  const handleAck = run(async (projectId) => { await db.ackPhase(projectId); });
  const goProject = (id) => { setActiveId(id); setPage('workflow'); };

  if (LIVE && session===undefined) return <div className="h-screen grid place-items-center text-slate-500">กำลังตรวจสอบสิทธิ์…</div>;
  if (LIVE && !session) return <Login/>;
  if (state.loading) return <div className="h-screen grid place-items-center text-slate-500">กำลังโหลดข้อมูล…</div>;
  if (LIVE && me && !me.hasRole) return <Pending email={me.email} onSignOut={handleSignOut}/>;   // ยังไม่กำหนดสิทธิ์ → รอผู้ดูแลอนุมัติ
  const poProj = poProject ? state.projects.find(p=>p.id===poProject) : null;

  return (
    <div className="h-screen flex bg-[var(--app-bg)] text-slate-200">
      <Sidebar page={page} onNav={p=>setPage(p)} state={state} isDev={role==='developer'}/>
      <div className="flex-1 flex flex-col min-w-0">
        <TopBar state={state} onNav={setPage} role={role} onRole={setRole} page={page} me={me} onSignOut={handleSignOut} onRefreshAll={handleRefreshAll}/>
        {err && <div className="px-6 py-2 bg-rose-500/15 border-b border-rose-500/30 text-rose-700 text-xs flex items-center justify-between"><span>⚠ {err}</span><button onClick={()=>setErr('')} className="text-rose-600 hover:text-rose-800">✕</button></div>}
        {PAGE_DEP[page] && !canDept(role, PAGE_DEP[page]) && (
          <div className="px-6 py-2 text-[12px] flex items-center gap-2" style={{background:DEPT[PAGE_DEP[page]].c+'14', color:DEPT[PAGE_DEP[page]].c}}>👁 โหมดดูอย่างเดียว — คุณคือ <b>{DEPT[role].label}</b> · ข้อมูลของ <b>{DEPT[PAGE_DEP[page]].label}</b> แก้ไขไม่ได้</div>
        )}
        <main className="flex-1 overflow-y-auto p-6">
          {page==='dashboard'  && <Dashboard state={state} onNav={setPage} onSelectProject={goProject} onOpenPO={setPoProject}/>}
          {page==='sales'      && <SalesPipeline state={state} role={role} onAddCustomer={handleAddCustomer} onUpdateCustomer={handleUpdateCustomer} onCreateSR={handleCreateSR} onUpdateSR={handleUpdateSR} onTask={handleTask}/>}
          {page==='sales-sr'   && <SalesSR state={state} role={role} onUpdateCustomer={handleUpdateCustomer}/>}
          {page==='project'    && <ProjectDept state={state} role={role} onCreateStock={handleCreateStock} genDefaults={genDefaults} onGoStocks={()=>setPage('project-stocks')}/>}
          {page==='project-stocks' && <ProjectStocks state={state} role={role} onAddBom={handleAddBom} onUpdateBom={handleUpdateBom} onDeleteBom={handleDeleteBom} onSendBom={handleSendBom} onUpdateProject={handleUpdateProject} onHandoff={handleHandoff} onReject={handleReject} onAck={handleAck}/>}
          {page==='project-inventory' && <ProjectInventory state={state} role={role} onWithdraw={handleWithdrawSR}/>}
          {page==='purchasing' && <Procurement state={state} role={role} onUpdateBom={handleUpdateBom} onCreatePO={handleCreatePO} onOpenPO={setPoProject} genPoNo={genPoNo}/>}
          {page==='purchasing-done' && <PurchasingDone state={state}/>}
          {page==='service'    && <FieldService state={state} role={role} onAddMember={handleAddMember} onRemoveMember={handleRemoveMember} onAddSchedule={handleAddSchedule} onRemoveSchedule={handleRemoveSchedule} onReceive={handleSvcReceive} onAssign={handleSvcAssign} onDeliver={handleSvcDeliver} onWarranty={handleSvcWarranty} onClose={handleHandoff}/>}
          {page==='workflow'   && <WorkflowBoard state={state} project={activeProject} role={role} onTask={handleTask} onAddTask={handleAddTask} onHandoff={handleHandoff} onReject={handleReject} onAck={handleAck} onPickStock={(id)=>setActiveId(id)}/>}
          {page==='settings'   && role==='developer' && <Settings state={state} role={role} onSetRole={handleSetRole} onRevoke={handleRevoke} onDeleteRow={handleDeleteRow} onUpdateRow={handleUpdateRow} onResetData={handleResetData} notifLog={notifLog} onSaveNotif={handleSaveNotif} onTestNotif={handleTestNotif}/>}
        </main>
      </div>
      {poProj && <PoModal project={poProj} pos={state.pos} onClose={()=>setPoProject(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
