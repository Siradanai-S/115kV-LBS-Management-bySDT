//   ต้องสร้าง bucket ชื่อ "po-pdfs" (public) ใน Supabase ก่อน
async function uploadPdfIfNeeded(poNo, pdfUrl){
  if(!LIVE || !pdfUrl || !String(pdfUrl).startsWith('data:')) return pdfUrl || null;
  const blob = await (await fetch(pdfUrl)).blob();
  const path = `po/${poNo}-${Date.now()}.pdf`;
  const { error } = await sb.storage.from('po-pdfs').upload(path, blob, { contentType:'application/pdf', upsert:true });
  if(error) throw error;
  return sb.storage.from('po-pdfs').getPublicUrl(path).data.publicUrl;
}

function downloadCSV(filename, rows){
  const esc=v=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"';
  const csv=rows.map(r=>r.map(esc).join(',')).join('\r\n');
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'})); a.download=filename; a.click(); URL.revokeObjectURL(a.href);
}
// ส่งออก Excel จริง (.xlsx) ด้วย SheetJS — rows = array ของ array (แถวแรก = หัวคอลัมน์)
function exportXLSX(filename, sheetName, rows){
  if(typeof XLSX==='undefined'){ downloadCSV(filename.replace(/\.xlsx$/,'.csv'), rows); return; }   // fallback ถ้า CDN ไม่โหลด
  const ws=XLSX.utils.aoa_to_sheet(rows); const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, (sheetName||'Sheet1').slice(0,31)); XLSX.writeFile(wb, filename);
}

let demo = null;
const db = {
  async loadAll(){
    if (!LIVE){ if(!demo) demo = seedDemo(); return JSON.parse(JSON.stringify(demo)); }
    const [customers,srs,projects,tasks,bom,pos,team,schedule,plans,handoffs] = await Promise.all([
      sb.from('customers').select('*').order('id').then(ok),
      sb.from('sales_requisitions').select('*').order('id').then(ok),
      sb.from('projects').select('*').order('id').then(ok),
      sb.from('department_tasks').select('*').order('sort_order').then(ok),
      sb.from('bom_items').select('*').order('id').then(ok),
      sb.from('purchase_orders').select('*').order('po_no').then(ok),
      sb.from('service_team').select('*').order('id').then(ok),
      sb.from('service_schedule').select('*').order('id').then(ok),
      sb.from('service_plans').select('*').order('id').then(ok),
      sb.from('handoff_log').select('*').order('id').then(ok),
    ]);
    const inventory = await sb.from('inventory_moves').select('*').order('id').then(ok);
    let users=[]; try { users = (await sb.rpc('admin_list_users')).data || []; } catch(e){ users=[]; }   // เฉพาะ developer จะได้ข้อมูล
    return { customers:customers||[], srs:srs||[], projects:projects||[], tasks:tasks||[], bom:bom||[], pos:pos||[], team:team||[], schedule:schedule||[], plans:plans||[], handoffs:handoffs||[], inventory:inventory||[], users };
  },

  /* ---- งาน (tasks) ---- */
  async updateTask(id, patch){ if(!LIVE){ Object.assign(demo.tasks.find(x=>x.id===id),patch,{updated_at:new Date().toISOString()}); return; } ok(await sb.from('department_tasks').update({...patch, updated_at:new Date().toISOString()}).eq('id',id)); },
  async addTask(row){ if(!LIVE){ const r={id:nid(),status:'Pending',updated_at:new Date().toISOString(),...row}; demo.tasks.push(r); return r; } return ok(await sb.from('department_tasks').insert(row).select().single()); },

  /* ---- ลูกค้า (Sales) ---- */
  async addCustomer(row){
    if(!LIVE){
      const r={ id:nid(), sr_id:null, note:'', cust_po_no:'', contract_status:'รอ PO/สัญญา', term_of_payment:'', ...row };
      demo.customers.push(r);
      TASK_TEMPLATE.sales.forEach(([title,detail],ti) =>
        demo.tasks.push({ id:nid(), customer_id:r.id, project_id:null, department:'sales', task_title:title, task_detail:detail, sort_order:ti, status:'Pending', updated_by:'system', updated_at:new Date().toISOString() }));
      return r;
    }
    return ok(await sb.from('customers').insert(row).select().single());
  },
  async updateCustomer(id, patch){ if(!LIVE){ Object.assign(demo.customers.find(x=>x.id===id),patch); return; } ok(await sb.from('customers').update(patch).eq('id',id)); },

  /* ---- รวบรวมลูกค้าเป็น Sales Requisition แล้วส่งฝ่ายโครงการ ---- */
  async createSR(customerIds, srNo, note){
    if(!LIVE){
      const r={ id:nid(), sr_no:srNo, cust_po_no:'', contract_status:'รอ PO/สัญญา', note:note||'', stock_id:null, created_at:new Date().toISOString() };
      demo.srs.push(r);
      customerIds.forEach(cid=>{ const c=demo.customers.find(x=>x.id===cid); if(c) c.sr_id=r.id; });
      // ปิดงานฝ่ายขายข้อ "รวบรวมส่ง" ให้ลูกค้าที่อยู่ใน SR
      customerIds.forEach(cid=> demo.tasks.filter(t=>t.customer_id===cid && t.department==='sales' && t.sort_order<=1).forEach(t=>t.status='Completed'));
      demo.handoffs.push({ id:nid(), sr_id:r.id, from_phase:'sales', to_phase:'project', action:'forward', by_dept:'sales', created_at:new Date().toISOString() });
      return r;
    }
    const sr = ok(await sb.from('sales_requisitions').insert({ sr_no:srNo, note:note||'' }).select().single());
    ok(await sb.from('customers').update({ sr_id:sr.id }).in('id', customerIds));
    return sr;
  },
  async updateSR(id, patch){ if(!LIVE){ Object.assign(demo.srs.find(x=>x.id===id),patch); return; } ok(await sb.from('sales_requisitions').update(patch).eq('id',id)); },

  /* ---- สร้าง Project Stock จากหลาย SR (Project) ---- */
  async createStock(srIds, stockNo, jobNo, bomNo, name, targetLbs){
    if(!LIVE){
      const r={ id:nid(), project_stock_no:stockNo, job_no:jobNo, bom_no:bomNo, bom_status:'Draft', name, current_phase:'project', phase_acked:false, target_lbs:num(targetLbs), total_budget:0, margin:0, cash_flow_status:'ปกติ', delivery_date:null, do_signed:false, updated_at:new Date().toISOString() };
      // วันส่งมอบ = วันที่ต้องการเร็วสุดของลูกค้าใน SR ที่รวมเข้ามา
      const custs = demo.customers.filter(c=> srIds.includes(c.sr_id) && c.desired_date);
      if(custs.length) r.delivery_date = custs.map(c=>c.desired_date).sort()[0];
      demo.projects.push(r);
      srIds.forEach(sid=>{ const s=demo.srs.find(x=>x.id===sid); if(s) s.stock_id=r.id; });
      PHASE_STEPS.forEach(dep => TASK_TEMPLATE[dep].forEach(([title,detail],ti) =>
        demo.tasks.push({ id:nid(), customer_id:null, project_id:r.id, department:dep, task_title:title, task_detail:detail, sort_order:ti, status:'Pending', updated_by:'system', updated_at:new Date().toISOString() })));
      demo.handoffs.push({ id:nid(), project_id:r.id, from_phase:'sales', to_phase:'project', action:'create', by_dept:'project', created_at:new Date().toISOString() });
      return r;
    }
    const newId = ok(await sb.rpc('create_stock_multi', { sr_ids:srIds, p_stock_no:stockNo, p_job_no:jobNo, p_bom_no:bomNo, p_name:name, p_target_lbs:num(targetLbs) }));
    return { id:newId };
  },
  async updateProject(id, patch){ if(!LIVE){ Object.assign(demo.projects.find(x=>x.id===id),patch,{updated_at:new Date().toISOString()}); return; } ok(await sb.from('projects').update(patch).eq('id',id)); },

  /* ---- BOM ---- */
  async addBom(row){ if(!LIVE){ const r={id:nid(),po_status:'Awaiting PO',round:1,is_sent:false,...row}; demo.bom.push(r); return r; } return ok(await sb.from('bom_items').insert(row).select().single()); },
  async updateBom(id, patch){ if(!LIVE){ Object.assign(demo.bom.find(x=>x.id===id),patch); return; } ok(await sb.from('bom_items').update(patch).eq('id',id)); },
  async deleteBom(id){ if(!LIVE){ demo.bom = demo.bom.filter(x=>x.id!==id); return; } ok(await sb.from('bom_items').delete().eq('id',id)); },
  // ส่ง BOM ให้จัดซื้อ "รายครั้ง" (round) — ตั้ง is_sent ของรายการในรอบนั้น + sync bom_status (อ้างอิงรวม)
  async sendBom(projectId, roundN){
    const n = roundN==null ? null : num(roundN);
    if(!LIVE){
      demo.bom.filter(b=>b.project_id===projectId && (n==null || (num(b.round)||1)===n)).forEach(b=>b.is_sent=true);
      const items=demo.bom.filter(b=>b.project_id===projectId);
      Object.assign(demo.projects.find(p=>p.id===projectId),{bom_status: items.length>0 && items.every(b=>b.is_sent) ? 'Sent to Purchasing':'Draft'});
      return;
    }
    let qy = sb.from('bom_items').update({is_sent:true}).eq('project_id',projectId);
    if(n!=null) qy = qy.eq('round', n);
    ok(await qy);
  },

  /* ---- PO (Purchasing) — ดึงรายการ BOM เข้าใบ PO (แยกจำนวนต่อรายการได้) + ลดรายการอัตโนมัติ ---- */
  async createPO(projectId, row, lines){
    // lines = [{bom_id, qty}]
    if(!LIVE){
      const r={ id:nid(), project_id:projectId, notified:true, lines:lines.map(l=>({...l})), ...row };
      demo.pos.push(r);
      lines.forEach(l=>{ const b=demo.bom.find(x=>x.id===l.bom_id); if(b){ const ordered=demo.pos.reduce((s,o)=>s+(o.lines||[]).filter(x=>x.bom_id===b.id).reduce((a,x)=>a+num(x.qty),0),0); if(ordered>=num(b.quantity) && b.po_status==='Awaiting PO') b.po_status='PO Received'; } });
      return r;
    }
    const pdf_url = await uploadPdfIfNeeded(row.po_no, row.pdf_url);   // #2 อัปโหลดไฟล์ขึ้น Storage ก่อน
    const po = ok(await sb.from('purchase_orders').insert({ project_id:projectId, lines, ...row, pdf_url }).select().single());
    // LIVE: ตั้ง po_status เป็น PO Received ให้รายการที่ลงใบ (รายละเอียด partial เก็บใน lines/jsonb)
    ok(await sb.from('bom_items').update({ po_status:'PO Received' }).in('id', lines.map(l=>l.bom_id)).eq('po_status','Awaiting PO'));
    return po;
  },
  async updatePO(id, patch){ if(!LIVE){ Object.assign(demo.pos.find(x=>x.id===id),patch); return; } ok(await sb.from('purchase_orders').update(patch).eq('id',id)); },

  /* ---- ทีม Service ---- */
  async addMember(row){ if(!LIVE){ const r={id:nid(),active:true,...row}; demo.team.push(r); return r; } return ok(await sb.from('service_team').insert(row).select().single()); },
  async removeMember(id){ if(!LIVE){ demo.team = demo.team.filter(x=>x.id!==id); demo.schedule = demo.schedule.filter(s=>s.member_id!==id); return; } ok(await sb.from('service_team').delete().eq('id',id)); },
  async addSchedule(row){ if(!LIVE){ const r={id:nid(),...row}; demo.schedule.push(r); return r; } return ok(await sb.from('service_schedule').insert(row).select().single()); },
  async removeSchedule(id){ if(!LIVE){ demo.schedule = demo.schedule.filter(x=>x.id!==id); return; } ok(await sb.from('service_schedule').delete().eq('id',id)); },
  async signDO(projectId){ if(!LIVE){ Object.assign(demo.projects.find(p=>p.id===projectId),{do_signed:true}); return; } ok(await sb.from('projects').update({do_signed:true}).eq('id',projectId)); },

  /* ---- ใบแผนส่งมอบ (Project → Service) ---- */
  async addPlan(row){ if(!LIVE){ const r={id:nid(),sent:false,acked:false,created_at:new Date().toISOString(),...row}; demo.plans.push(r); return r; } return ok(await sb.from('service_plans').insert(row).select().single()); },
  async updatePlan(id, patch){ if(!LIVE){ Object.assign(demo.plans.find(x=>x.id===id),patch); return; } ok(await sb.from('service_plans').update(patch).eq('id',id)); },
  async deletePlan(id){ if(!LIVE){ demo.plans=demo.plans.filter(x=>x.id!==id); return; } ok(await sb.from('service_plans').delete().eq('id',id)); },
  async ackPlan(id, teamIds){ const patch={acked:true}; if(teamIds!=null) patch.team_ids=teamIds; if(!LIVE){ Object.assign(demo.plans.find(x=>x.id===id),patch); return; } ok(await sb.from('service_plans').update(patch).eq('id',id)); },

  /* ---- Admin (Setting) — จัดการสิทธิ์ผู้ใช้ + ลบข้อมูลทุกฝ่าย ---- */
  async setUserRole(uid, department, is_developer){ if(!LIVE){ const u=demo.users.find(x=>x.user_id===uid); if(u){ u.department=department; u.is_developer=!!is_developer; } return; } ok(await sb.rpc('admin_set_role', { p_uid:uid, p_dept:department, p_dev:!!is_developer })); },
  async revokeUser(uid){ if(!LIVE){ const u=demo.users.find(x=>x.user_id===uid); if(u){ u.department=null; u.is_developer=false; } return; } ok(await sb.rpc('admin_revoke', { p_uid:uid })); },
  async deleteRow(demoKey, table, id){ if(!LIVE){ demo[demoKey]=demo[demoKey].filter(x=>x.id!==id); return; } ok(await sb.from(table).delete().eq('id',id)); },
  // แก้ไขข้อมูลข้ามฝ่าย (เฉพาะ Developer ในแท็บ Setting) — generic update ทุกตาราง
  async updateRow(demoKey, table, id, patch){ if(!LIVE){ const r=demo[demoKey].find(x=>x.id===id); if(r) Object.assign(r, patch); return; } ok(await sb.from(table).update(patch).eq('id',id)); },
  // Reset Data (เฉพาะ Developer) — DEMO: คืนค่าข้อมูลตัวอย่างใหม่ · LIVE: ป้องกันไว้ ให้ใช้ reset-clean.sql แทน
  async resetData(){ if(!LIVE){ demo = seedDemo(); return; } throw new Error('Reset Data ใช้ได้เฉพาะโหมด DEMO — สำหรับ LIVE ให้รัน reset-clean.sql บน Supabase'); },

  /* ---- คลังสินค้าจริง (Inventory) ---- */
  async addMovement(row){ if(!LIVE){ const r={id:nid(),created_at:new Date().toISOString(),...row}; demo.inventory.push(r); return r; } return ok(await sb.from('inventory_moves').insert(row).select().single()); },
  async addMovements(rows){ if(!LIVE){ rows.forEach(row=>demo.inventory.push({id:nid(),created_at:new Date().toISOString(),...row})); return; } ok(await sb.from('inventory_moves').insert(rows)); },
  async deleteMovement(id){ if(!LIVE){ demo.inventory=demo.inventory.filter(x=>x.id!==id); return; } ok(await sb.from('inventory_moves').delete().eq('id',id)); },
  async markBomDelivered(ids){ if(!ids.length) return; if(!LIVE){ ids.forEach(id=>{ const b=demo.bom.find(x=>x.id===id); if(b) b.po_status='Delivered'; }); return; } ok(await sb.from('bom_items').update({po_status:'Delivered'}).in('id',ids)); },

  /* ---- Linkage (ส่งงาน/ตีกลับ/รับงาน) ---- */
  async handoff(projectId, fromPhase, toPhase, byDept){
    if(!LIVE){ Object.assign(demo.projects.find(p=>p.id===projectId), { current_phase:toPhase, phase_acked:false, updated_at:new Date().toISOString() });
      demo.handoffs.push({ id:nid(), project_id:projectId, from_phase:fromPhase, to_phase:toPhase, action:'forward', by_dept:byDept, created_at:new Date().toISOString() }); return; }
    ok(await sb.rpc('handoff_project', { p_id:projectId }));
  },
  async reject(projectId, fromPhase, toPhase, byDept, note){
    if(!LIVE){ Object.assign(demo.projects.find(p=>p.id===projectId), { current_phase:toPhase, phase_acked:false, updated_at:new Date().toISOString() });
      demo.handoffs.push({ id:nid(), project_id:projectId, from_phase:fromPhase, to_phase:toPhase, action:'reject', by_dept:byDept, note, created_at:new Date().toISOString() }); return; }
    ok(await sb.rpc('reject_project', { p_id:projectId, p_note:note }));
  },
  async ackPhase(projectId){ if(!LIVE){ Object.assign(demo.projects.find(p=>p.id===projectId), { phase_acked:true }); return; } ok(await sb.rpc('ack_phase', { p_id:projectId })); },
};

function projProgress(tasks, pid){ const t=tasks.filter(x=>x.project_id===pid); return t.length?Math.round(t.filter(x=>x.status==='Completed').length/t.length*100):0; }

/* ===== Linkage: phase flow + gate ===== */
const nextPhase = p => { const i=PHASES.indexOf(p); return (i>=0 && i<3) ? PHASES[i+1] : null; };
const prevPhase = p => { const i=PHASES.indexOf(p); return (i>0 && i<=3) ? PHASES[i-1] : null; };
const phaseDeptDone = (state, pid, dep) => { const t=state.tasks.filter(x=>x.project_id===pid && x.department===dep); return t.length>0 && t.every(x=>x.status==='Completed'); };
// ลูกค้าทั้งหมดที่อยู่ใน Stock นี้ (ผ่าน SR) + จำนวน LBS ที่ต้องการรวม
function stockCustomers(state, pid){ const srIds=state.srs.filter(s=>s.stock_id===pid).map(s=>s.id); return (state.customers||[]).filter(c=>srIds.includes(c.sr_id)); }
function requestedLBS(state, pid){ return stockCustomers(state,pid).reduce((s,c)=>s+num(c.lbs_qty),0); }   // ยอดที่ลูกค้าต้องการ (อ้างอิง)
function bomLBS(state, pid){ return state.bom.filter(b=>b.project_id===pid && b.category==='LBS').reduce((s,b)=>s+num(b.quantity),0); }
function targetLBS(state, p){ return p.target_lbs!=null ? num(p.target_lbs) : requestedLBS(state, p.id); }    // เป้าหมาย LBS ของ Stock (จาก popup ตอนสร้าง)
// PO เป็น line items — รองรับแยกจำนวนบางส่วน
function poOrderedQty(state, bomId){ let q=0; (state.pos||[]).forEach(o=>(o.lines||[]).forEach(l=>{ if(l.bom_id===bomId) q+=num(l.qty); })); return q; }
function bomRemaining(state, b){ return num(b.quantity) - poOrderedQty(state, b.id); }                          // จำนวนที่ยังไม่ลงใบ PO
// คลังสินค้า: รายการรหัสวัสดุ + ยอดคงเหลือ (รับเข้า-เบิกออก) · projectId=null = สต็อกกลางรวมทุกโครงการ
function invCodes(state){ const m={}; (state.bom||[]).forEach(b=>{ if(b.epicor_code) m[b.epicor_code]=b.description; }); (state.inventory||[]).forEach(x=>{ if(x.epicor_code && !m[x.epicor_code]) m[x.epicor_code]=x.description; }); return m; }
// loc: null = คลังกลาง · number = โครงการ · 'ALL' = รวมทั้งบริษัท
function invBalance(state, loc){
  const rows={};
  (state.inventory||[]).filter(x=> loc==='ALL' || x.project_id===loc).forEach(x=>{
    const r = rows[x.epicor_code] || (rows[x.epicor_code]={ code:x.epicor_code, desc:x.description, inQ:0, outQ:0 });
    if(x.type==='IN') r.inQ+=num(x.qty); else r.outQ+=num(x.qty);
    if(x.description) r.desc=x.description;
  });
  return Object.values(rows).map(r=>({...r, onhand:r.inQ-r.outQ})).sort((a,b)=>String(a.code).localeCompare(String(b.code)));
}
const invOnhand = (state, loc, code) => { const r=invBalance(state, loc).find(x=>x.code===code); return r?r.onhand:0; };   // ยอดคงเหลือ ณ ที่ตั้ง
// จำนวนที่รับเข้าแล้วของ PO+รหัส (ไว้คำนวณค้างรับ)
const poReceivedQty = (state, poNo, code) => (state.inventory||[]).filter(x=>x.po_no===poNo && x.epicor_code===code && x.type==='IN').reduce((s,x)=>s+num(x.qty),0);
// จำนวนที่เบิกติดตั้งไปแล้วของรหัสในโครงการ (เบิกตามงานติดตั้ง = OUT reason 'ติดตั้งงาน')
const installedQty = (state, pid, code) => (state.inventory||[]).filter(x=>x.project_id===pid && x.epicor_code===code && x.type==='OUT' && x.reason==='ติดตั้งงาน').reduce((s,x)=>s+num(x.qty),0);
// สรุปความคืบหน้าการเบิกติดตั้งตาม BOM ของโครงการ: {need,done,lines,complete}
function installSummary(state, pid){
  const items=(state.bom||[]).filter(b=>b.project_id===pid);
  let need=0, done=0, full=0;
  items.forEach(b=>{ const q=num(b.quantity), ins=Math.min(q,installedQty(state,pid,b.epicor_code)); need+=q; done+=ins; if(ins>=q && q>0) full++; });
  return { need, done, lines:items.length, full, complete: items.length>0 && full===items.length };
}
// ช่างไม่ว่าง = มีคิวงานทับช่วง [start,end] อยู่แล้ว
const memberBusy = (state, mid, start, end) => !!(start && end) && (state.schedule||[]).some(s=> s.member_id===mid && !(String(s.end_date)<start || String(s.start_date)>end));

/* ===== BOM rounds (สร้าง Material List หลายครั้งต่อ Stock) ===== */
const roundOf = b => num(b.round)||1;
const roundName = (p, n) => `${p.bom_no} (ครั้ง${n})`;
function projBomRounds(state, pid){ const ns=[...new Set(state.bom.filter(b=>b.project_id===pid).map(roundOf))]; return ns.length?ns.sort((a,b)=>a-b):[1]; }
function roundItems(state, pid, n){ return state.bom.filter(b=>b.project_id===pid && roundOf(b)===n); }
function roundIsSent(state, pid, n){ const it=roundItems(state,pid,n); return it.length>0 && it.every(b=>b.is_sent); }
// ส่ง BOM ครบทุกครั้งหรือยัง (ทุกรายการ is_sent) — ใช้แทน bom_status เดิมใน gate/แสดงผล
function bomSent(state, p){ const it=state.bom.filter(b=>b.project_id===p.id); return it.length>0 && it.every(b=>b.is_sent); }
const bomStatusOf = (state,p) => bomSent(state,p) ? 'Sent to Purchasing' : 'Draft';

function phaseGate(project, state){
  const pid=project.id, ph=project.current_phase;
  if(ph==='closed') return { ok:false, reason:'โครงการปิดงานแล้ว' };
  if(!phaseDeptDone(state, pid, ph)) return { ok:false, reason:'งานในเฟสนี้ยังไม่ครบทุกข้อ' };
  if(ph==='project'){
    if(!project.job_no) return { ok:false, reason:'ยังไม่มี Job No.' };
    const items=state.bom.filter(b=>b.project_id===pid);
    if(items.length===0) return { ok:false, reason:'ยังไม่มีรายการ BOM' };
    if(!bomSent(state, project)) return { ok:false, reason:'ยังส่ง BOM ให้จัดซื้อไม่ครบทุกครั้ง (ครั้ง/รอบ)' };
    if(bomLBS(state,pid)!==targetLBS(state,project)) return { ok:false, reason:`จำนวน LBS ใน BOM (${bomLBS(state,pid)}) ไม่ตรงกับเป้าหมาย Stock (${targetLBS(state,project)})` };
  }
  if(ph==='purchasing'){
    const items=state.bom.filter(b=>b.project_id===pid);
    if(items.length>0 && !items.every(b=>b.po_status==='Delivered')) return { ok:false, reason:'ของยังเข้าไม่ครบ (ต้อง Delivered ทุกรายการ)' };
  }
  if(ph==='service'){
    if(!project.do_signed) return { ok:false, reason:'ยังไม่ได้ลงนาม DO' };
  }
  return { ok:true, reason:'' };
}
// งานเข้าใหม่ของแต่ละฝ่าย
const stockIncoming = (state, dep) => state.projects.filter(p=>p.current_phase===dep && !p.phase_acked).length;
const srInbox = state => state.srs.filter(s=>!s.stock_id).length;        // SR รอสร้าง Stock
const custToGather = state => (state.customers||[]).filter(c=>!c.sr_id).length;  // ลูกค้ารอรวบรวม
const pendingPlans = state => (state.plans||[]).filter(p=>p.sent && !p.acked).length;
const incomingCount = (state, dep) => {
  if(dep==='sales') return custToGather(state);
  if(dep==='project') return stockIncoming(state,'project') + srInbox(state);
  if(dep==='service') return stockIncoming(state,'service') + pendingPlans(state);
  return stockIncoming(state, dep);
};

function buildNotifs(state, role){
  const list=[];
  state.projects.filter(p=>p.current_phase!=='closed').forEach(p=>{ const d=daysUntil(p.delivery_date); if(d!==null&&d<=15) list.push({k:'due'+p.id, icon:'⏰', color:'#f43f5e', text:`${p.project_stock_no} ใกล้ครบกำหนดส่งมอบ (${d} วัน)`, page:'project-stocks'}); });
  (state.handoffs||[]).filter(h=>h.action==='reject').slice(-6).reverse().forEach(h=>{ const p=state.projects.find(x=>x.id===h.project_id); list.push({k:'rej'+h.id, icon:'↩️', color:'#f43f5e', text:`ตีกลับ: ${p?.project_stock_no||''} → ${PHASE_LABEL[h.to_phase]}${h.note?' · '+h.note:''}`, page:'project-stocks'}); });
  if(role!=='executive'){ const dep = role==='developer'?null:role;
    state.projects.filter(p=>p.current_phase!=='closed' && !p.phase_acked && (dep?p.current_phase===dep:true)).forEach(p=>list.push({k:'in'+p.id, icon:'📥', color:DEPT[p.current_phase]?.c||'#0ea5e9', text:`งานเข้าใหม่ (${PHASE_LABEL[p.current_phase]}): ${p.project_stock_no}`, page:'workflow'}));
  }
  if(role==='project'||role==='developer') state.srs.filter(s=>!s.stock_id).forEach(s=>list.push({k:'sr'+s.id, icon:'📋', color:DEPT.project.c, text:`SR รอสร้าง Stock: ${s.sr_no}`, page:'project'}));
  if(role==='service'||role==='developer') (state.plans||[]).filter(pl=>pl.sent && !pl.acked).forEach(pl=>{ const p=state.projects.find(x=>x.id===pl.project_id); list.push({k:'pl'+pl.id, icon:'📦', color:DEPT.service.c, text:`แผนส่งมอบใหม่รอรับ: ${p?.project_stock_no||''}`, page:'service'}); });
  return list;
}

/* ============================ DASHBOARD CHARTS (SVG, theme-aware) ============================ */
// น้ำหนักความคืบหน้าตามเฟส (ใช้คำนวณมูลค่างานที่ทำได้สะสมจาก handoff_log)
const PHASE_WEIGHT = { sales:0, project:0.25, purchasing:0.5, service:0.75, closed:1 };
const ymOf  = d => d ? String(d).slice(0,7) : null;
const pad2y = n => String(n).padStart(2,'0');
function ymAdd(ym, n){ const [y,m]=ym.split('-').map(Number); const idx=(y*12+(m-1))+n; return Math.floor(idx/12)+'-'+pad2y((idx%12)+1); }
function monthsBetween(a, b){ const [ay,am]=a.split('-').map(Number); const [by,bm]=b.split('-').map(Number); return (by*12+bm)-(ay*12+am); }
function ymList(from, to){ const out=[]; let cur=from, guard=0; while(cur<=to && guard++<120){ out.push(cur); cur=ymAdd(cur,1); } return out; }
const ymLabel = ym => { const m=Number(ym.split('-')[1]); return MONTHS_TH[m-1]||ym; };

// S-curve: แผนสะสม (ramp ตามกำหนดส่ง) vs ทำได้สะสม (มูลค่า×น้ำหนักเฟสจาก handoff) — เป็น % ของงบรวม
function scurveData(state){
  const projects = state.projects||[];
  const total = projects.reduce((s,p)=>s+num(p.total_budget),0);
  if(!projects.length || total<=0) return null;
  const evByProj = {};
  (state.handoffs||[]).forEach(h=>{ (evByProj[h.project_id]=evByProj[h.project_id]||[]).push(h); });
  Object.values(evByProj).forEach(a=>a.sort((x,y)=>String(x.created_at).localeCompare(String(y.created_at))));
  const allYm=[];
  projects.forEach(p=>{ if(p.delivery_date) allYm.push(ymOf(p.delivery_date)); });
  (state.handoffs||[]).forEach(h=>{ if(h.created_at) allYm.push(ymOf(h.created_at)); });
  if(!allYm.length) return null;
  const from=allYm.reduce((a,b)=>a<b?a:b), to=allYm.reduce((a,b)=>a>b?a:b);
  const cur=curYM();
  return ymList(from, to).map(ym=>{
    let planned=0, actual=0;
    projects.forEach(p=>{
      const b=num(p.total_budget), evs=evByProj[p.id]||[];
      const startYm = evs.length ? ymOf(evs[0].created_at) : (p.delivery_date?ymOf(p.delivery_date):from);
      const endYm   = p.delivery_date ? ymOf(p.delivery_date) : startYm;
      let frac = ym>=endYm ? 1 : ym<startYm ? 0 : monthsBetween(startYm,ym)/(monthsBetween(startYm,endYm)||1);
      planned += b*frac;
      let w=0; evs.forEach(e=>{ if(ymOf(e.created_at)<=ym && PHASE_WEIGHT[e.to_phase]!=null) w=PHASE_WEIGHT[e.to_phase]; });
      actual += b*w;
    });
    return { ym, planned: planned/total*100, actual: ym<=cur ? actual/total*100 : null };
  });
}

function SCurveChart({state}){
  const data = scurveData(state);
  const W=540, H=250, padL=34, padR=14, padT=14, padB=30;
  if(!data || data.length<2) return <div className="grid place-items-center py-16 text-slate-500 text-sm">ข้อมูลยังไม่พอสร้างกราฟ S-curve</div>;
  const n=data.length, plotW=W-padL-padR, plotH=H-padT-padB;
  const x = i => padL + (n===1?plotW/2:i*plotW/(n-1));
  const y = v => padT + (1-v/100)*plotH;
  const lineOf = key => data.map((d,i)=> d[key]==null?null:`${x(i)},${y(d[key])}`).filter(Boolean).join(' ');
  const planPts=lineOf('planned'), actPts=lineOf('actual');
  const actLast = data.filter(d=>d.actual!=null).pop();
  const planLast = data[data.length-1];
  return (
    <div>
      <svg viewBox={`0 0 ${W} ${H}`} className="w-full" style={{maxHeight:260}}>
        {[0,25,50,75,100].map(g=>(
          <g key={g}>
            <line x1={padL} y1={y(g)} x2={W-padR} y2={y(g)} stroke="currentColor" className="text-slate-700" strokeWidth="0.5" strokeDasharray={g===0?'':'3 3'} opacity="0.5"/>
            <text x={padL-5} y={y(g)+3} textAnchor="end" className="fill-slate-500" fontSize="9">{g}</text>
          </g>
        ))}
        {data.map((d,i)=> (i===0||i===n-1||n<=8||i%2===0) && (
          <text key={d.ym} x={x(i)} y={H-padB+14} textAnchor="middle" className="fill-slate-500" fontSize="9">{ymLabel(d.ym)}</text>
        ))}
        <polyline points={planPts} fill="none" stroke="#94a3b8" strokeWidth="2" strokeDasharray="5 4" strokeLinecap="round" strokeLinejoin="round"/>
        {actPts && <polyline points={actPts} fill="none" stroke="#3b82f6" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>}
        {data.map((d,i)=> d.actual!=null && <circle key={i} cx={x(i)} cy={y(d.actual)} r="2.6" fill="#3b82f6"/>)}
      </svg>
      <div className="flex items-center justify-center gap-5 mt-1 text-[11px]">
        <span className="flex items-center gap-1.5 text-slate-400"><span style={{display:'inline-block',width:16,height:0,borderTop:'2px dashed #94a3b8'}}/>แผนสะสม {planLast?planLast.planned.toFixed(0):0}%</span>
        <span className="flex items-center gap-1.5 text-slate-400"><span style={{display:'inline-block',width:16,height:3,background:'#3b82f6',borderRadius:2}}/>ทำได้สะสม {actLast?actLast.actual.toFixed(0):0}%</span>
      </div>
    </div>
  );
}

// กราฟแท่งรายเดือน: รับเข้า vs เบิกออก (จาก inventory_moves)
function monthlyInvData(state){
  const m={};
  (state.inventory||[]).forEach(x=>{ const ym=ymOf(x.created_at); if(!ym) return; const r=m[ym]||(m[ym]={ym,inQ:0,outQ:0}); if(x.type==='IN') r.inQ+=num(x.qty); else r.outQ+=num(x.qty); });
  const keys=Object.keys(m).sort(); if(!keys.length) return [];
  return ymList(keys[0], keys[keys.length-1]).map(ym=> m[ym]||{ym,inQ:0,outQ:0});
}
function MonthlyBars({state}){
  const data=monthlyInvData(state);
  const W=540, H=250, padL=34, padR=14, padT=14, padB=30;
  if(!data.length) return <div className="grid place-items-center py-16 text-slate-500 text-sm">ยังไม่มีการเคลื่อนไหวคลัง</div>;
  const max=Math.max(1,...data.map(d=>Math.max(d.inQ,d.outQ)));
  const plotW=W-padL-padR, plotH=H-padT-padB, n=data.length;
  const grp=plotW/n, bw=Math.min(18, grp/2.6), gap=3;
  const y=v=>padT+(1-v/max)*plotH;
  const ticks=[0,0.25,0.5,0.75,1].map(f=>Math.round(max*f));
  return (
    <div>
      <svg viewBox={`0 0 ${W} ${H}`} className="w-full" style={{maxHeight:260}}>
        {ticks.map((t,i)=>(
          <g key={i}>
            <line x1={padL} y1={y(t)} x2={W-padR} y2={y(t)} stroke="currentColor" className="text-slate-700" strokeWidth="0.5" strokeDasharray={i===0?'':'3 3'} opacity="0.5"/>
            <text x={padL-5} y={y(t)+3} textAnchor="end" className="fill-slate-500" fontSize="9">{t}</text>
          </g>
        ))}
        {data.map((d,i)=>{ const cx=padL+grp*i+grp/2; return (
          <g key={d.ym}>
            <rect x={cx-bw-gap/2} y={y(d.inQ)} width={bw} height={Math.max(0,plotH-(y(d.inQ)-padT))} rx="2" fill="#16a34a"/>
            <rect x={cx+gap/2} y={y(d.outQ)} width={bw} height={Math.max(0,plotH-(y(d.outQ)-padT))} rx="2" fill="#f43f5e"/>
            <text x={cx} y={H-padB+14} textAnchor="middle" className="fill-slate-500" fontSize="9">{ymLabel(d.ym)}</text>
          </g>
        );})}
      </svg>
      <div className="flex items-center justify-center gap-5 mt-1 text-[11px]">
        <span className="flex items-center gap-1.5 text-slate-400"><span style={{display:'inline-block',width:12,height:12,background:'#16a34a',borderRadius:2}}/>รับเข้า</span>
        <span className="flex items-center gap-1.5 text-slate-400"><span style={{display:'inline-block',width:12,height:12,background:'#f43f5e',borderRadius:2}}/>เบิกออก</span>
      </div>
    </div>
  );
}

  );

    <div className="space-y-5">
      <div className="flex items-center justify-end gap-2 no-print">

      </div>
      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
        <KPI label="งบประมาณรวม (Total)" value={bahtShort(totalSales)} sub={baht(totalSales)} color="#3b82f6" icon={Icon.pipeline}/>
        <KPI label="กำไรรวมประมาณการ" value={bahtShort(totalProfit)} sub={"เฉลี่ย margin "+(projects.length?(projects.reduce((s,p)=>s+num(p.margin),0)/projects.length).toFixed(1):0)+'%'} color="#16a34a" icon={Icon.chart}/>
        <KPI label="ความคืบหน้ารวม" value={avgProgress+'%'} sub={srPending+" SR รอสร้าง Stock"} color="#f97316" icon={Icon.layers}/>
        <KPI label="Project Stock ทั้งหมด" value={projects.length} sub={"ลูกค้า "+(customers?customers.length:0)+" ราย · ดำเนินการ "+projects.filter(p=>p.current_phase!=='closed').length} color="#8b5cf6" icon={Icon.box}/>
      </div>
      <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
        <Card className="p-5 lg:col-span-2 fade-up">
          <div className="flex items-center justify-between mb-4"><h3 className="text-slate-200 font-semibold">คอขวดระหว่างฝ่าย (Cross-department Bottleneck)</h3><span className="text-[11px] text-slate-500">จำนวน Stock ที่ค้างในแต่ละเฟส</span></div>
          <div className="space-y-3">
            {PHASE_STEPS.map(ph => { const n=bottleneck[ph]; const max=Math.max(1,...Object.values(bottleneck)); return (
              <div key={ph} className="flex items-center gap-3">
                <div className="w-28 text-sm text-slate-300 flex items-center gap-1.5"><span>{DEPT[ph].icon}</span>{PHASE_LABEL[ph]}</div>

                <div className="w-8 text-right text-sm text-slate-400">{n}</div>
              </div>
            );})}
          </div>
          <div className="grid grid-cols-2 gap-3 mt-5 pt-4 border-t border-slate-800">
            <div className="rounded-lg bg-slate-800/40 p-3"><div className="text-xs text-slate-400">รายการรอออก PO (Awaiting PO)</div><div className="text-xl font-bold mt-0.5" style={{color:'#f43f5e'}}>{awaitingPO} <span className="text-sm font-normal text-slate-500">รายการ</span></div></div>

                <div className="flex items-center justify-between"><span className="text-sm text-slate-200 font-medium truncate">{p.name}</span><span className="text-xs font-bold px-2 py-0.5 rounded-full shrink-0" style={{ background:d<=7?'#f43f5e':'#f97316', color:'#0b0f17' }}>{d} วัน</span></div>
                <div className="text-[11px] text-slate-500 mt-0.5 mono">{p.project_stock_no} · ส่ง {p.delivery_date}</div>
              </button>
            ))}</div>
          )}
        </Card>
      </div>
      <Card className="fade-up overflow-hidden">
        <div className="px-5 py-3.5 border-b border-slate-800 flex items-center justify-between"><h3 className="text-slate-200 font-semibold">ภาพรวม Project Stock</h3><button onClick={()=>onNav('project')} className="text-xs text-slate-400 hover:text-slate-200">ไป Project Department →</button></div>

            <th className="px-3 py-2.5 font-medium">PO</th><th className="px-3 py-2.5 font-medium w-40">ความคืบหน้า</th>
            <th className="px-3 py-2.5 font-medium text-right">งบประมาณ</th>
          </tr></thead>
          <tbody>
            {projects.map(p => { const pr=projProgress(tasks,p.id); const poCount=pos.filter(o=>o.project_id===p.id).length; return (
              <tr key={p.id} className="border-b border-slate-800/60 hover:bg-slate-800/30 cursor-pointer" onClick={()=>onSelectProject(p.id)}>

                <td className="px-3 py-3" onClick={e=>{e.stopPropagation(); if(poCount) onOpenPO(p.id);}}>

/* ============================ ADD-TASK inline ============================ */
function AddTask({color, onAdd}){
  const [open,setOpen]=useState(false); const [title,setTitle]=useState(''); const [detail,setDetail]=useState('');
  if(!open) return <button onClick={()=>setOpen(true)} className="w-full flex items-center justify-center gap-1.5 text-xs font-medium rounded-lg py-2 border border-dashed transition hover:bg-slate-800/40" style={{borderColor:color+'55',color}}>{Icon.plus} เพิ่มงาน</button>;
  return (
    <div className="rounded-lg border p-3 space-y-2" style={{borderColor:color+'55',background:color+'0e'}}>
      <Inp value={title} onChange={setTitle} placeholder="ชื่องาน"/><Inp value={detail} onChange={setDetail} placeholder="รายละเอียด"/>
      <div className="flex justify-end gap-2">
        <button onClick={()=>{setOpen(false);setTitle('');setDetail('');}} className="text-xs px-3 py-1 rounded-md border border-slate-700 text-slate-300">ยกเลิก</button>
        <button onClick={()=>{ if(!title.trim())return; onAdd(title.trim(),detail.trim()); setTitle('');setDetail('');setOpen(false); }} className="text-xs px-3 py-1 rounded-md font-medium" style={{background:color,color:'#0b0f17'}}>บันทึก</button>
      </div>
    </div>
  );
}

    <div className="flex items-center gap-2 flex-wrap">
      <span className="text-[11px] text-slate-500">Project Stock:</span>

        <option value="">— เลือก Stock —</option>
        {state.projects.map(p => <option key={p.id} value={p.id}>{p.project_stock_no} · {p.name}</option>)}

  if (!project) return <div className="space-y-4">{picker}<Empty msg="เลือก Project Stock เพื่อดูเวิร์กโฟลว์"/></div>;
  return (
    <div className="space-y-4">

            <div key={dep} className="rounded-xl border border-slate-800 bg-slate-900/50 flex flex-col">
              <div className="px-4 py-3 border-b border-slate-800 flex items-center justify-between" style={{borderTop:'3px solid '+DEPT[dep].c, borderTopLeftRadius:12, borderTopRightRadius:12}}>
                <div className="flex items-center gap-2 text-sm font-semibold text-slate-200"><span>{DEPT[dep].icon}</span>{DEPT[dep].label}</div>
                <span className="text-[11px] text-slate-500">{done}/{list.length}</span>
              </div>
              <div className="p-3 space-y-2.5 flex-1">
                {list.map(t => (
                  <div key={t.id} className="rounded-lg bg-slate-800/50 border border-slate-700/50 p-3">
                    <div className="flex items-start gap-2"><span className="mt-0.5 w-2 h-2 rounded-full shrink-0" style={{background:taskColor(t.status)}}/><div className="flex-1"><div className="text-[13px] text-slate-200 font-medium leading-snug">{t.task_title}</div>{t.task_detail && <div className="text-[11px] text-slate-500 mt-1 leading-relaxed">{t.task_detail}</div>}</div></div>

                        </select>

                  </div>
                ))}

              </div>
            </div>
          );
        })}

function PhaseRibbon({project, state, role, onHandoff, onReject, onAck}){

          <button onClick={()=>onAck(project.id)} className="text-xs font-medium rounded-md px-3 py-1.5" style={{background:DEPT[ph].c,color:'#0b0f17'}}>รับงาน</button>

        <div className="mt-4 pt-3 border-t border-slate-800 flex items-center justify-between gap-2">

        <Card className="overflow-hidden" style={{borderColor:DEPT.project.c+'55'}}>
