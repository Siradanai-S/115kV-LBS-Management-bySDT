<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo } = React;

/* ============================ CONFIG ============================ */
const SUPABASE_URL  = ""; // เช่น https://xxxxx.supabase.co
const SUPABASE_ANON = ""; // anon public key  → ใส่ครบ = LIVE
const LIVE = !!(SUPABASE_URL && SUPABASE_ANON);
const sb = LIVE ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON) : null;
const ok = ({data,error}) => { if(error) throw error; return data; };   // โยน error ให้ UI จับ (แก้ปัญหา fail เงียบ)

/* ============================ CONSTANTS ============================ */
const DEPT = {
  developer:  { label:'ผู้พัฒนา (Developer)', en:'Developer', icon:'⚙️', c:'#38bdf8' },
  sales:      { label:'ฝ่ายขาย',     en:'Sales',      icon:'📋', c:'#6366f1' },
  project:    { label:'ฝ่ายโครงการ',  en:'Project',    icon:'📐', c:'#f59e0b' },
  purchasing: { label:'ฝ่ายจัดซื้อ',  en:'Purchasing', icon:'🛒', c:'#f43f5e' },
  service:    { label:'ฝ่ายบริการ',   en:'Service',    icon:'🛠️', c:'#10b981' },
  executive:  { label:'ผู้บริหาร',    en:'Executive',  icon:'📊', c:'#8b5cf6' },
};
const PHASES = ['project','purchasing','service','closed'];
const PHASE_STEPS = ['project','purchasing','service'];
const PHASE_LABEL = { sales:'ฝ่ายขาย', project:'ฝ่ายโครงการ', purchasing:'ฝ่ายจัดซื้อ', service:'ฝ่ายบริการ', closed:'ปิดงาน' };
const CUSTOMER_TYPE = ['ราชการ','เอกชน','รัฐวิสาหกิจ'];
const WORK_TYPE = ['Supply','Supply & Construction'];
const CONTRACT_STATUS = ['รอ PO/สัญญา','ได้รับ PO แล้ว','ทำสัญญาแล้ว'];
const TASK_STATUS = ['Pending','In Progress','Completed'];
const TASK_TH = { Pending:'รอดำเนินการ', 'In Progress':'กำลังทำ', Completed:'เสร็จแล้ว' };
const CURRENCY = ['THB','USD'];
const BOM_CAT = ['LBS','Accessory'];
const PROJECT_PHASES = ['Phase 1','Phase 2','Phase 3'];
const MONTHS_TH = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

/* permission helpers */
const isDev    = r => r==='developer';
const canDept  = (r,dep) => r==='developer' || r===dep;

const TASK_TEMPLATE = {
  sales: [
    ['เพิ่ม & บันทึกข้อมูลลูกค้า','ชื่อ ประเภทลูกค้า ประเภทงาน ผู้ติดต่อ จำนวน LBS วันที่ต้องการ สถานที่ Scope'],
    ['รวบรวมส่งฝ่ายโครงการ (ออก SR No.)','เลือกลูกค้ารวบรวมเป็น Sales Requisition แล้วส่งฝ่ายโครงการ'],
    ['ติดตาม PO & สัญญาซื้อขาย','ติดตาม PO/สัญญาจากลูกค้า แล้วอัปเดตใน Sales Requisition No.'],
  ],

    ['ส่ง Material List (BOM) ให้จัดซื้อ','ส่ง BOM No. ไปฝ่ายจัดซื้อเพื่อออก PO'],
    ['แจ้งแผนส่งมอบให้ฝ่ายบริการ','ส่งแผนวันส่ง/ติดตั้งให้ฝ่ายบริการตามแผนลูกค้า'],
  ],
  purchasing: [
    ['รับ BOM & ออก PO','ออก PO ตาม Material List (BOM) No.'],
    ['อัปเดต PO แจ้งกลับฝ่ายโครงการ','อัปเดตสถานะ PO ราย BOM แล้วแจ้งกลับ'],

  ],

    ['รับแผนวันส่ง/ติดตั้ง','รับแผนส่งมอบจากฝ่ายโครงการ'],
    ['จัดทีมงาน','มอบหมายทีม + จัดตารางคิวงานรายเดือน'],
    ['ส่งมอบ & ลงนาม DO','ส่งมอบ/ติดตั้ง ลงนามเอกสาร DO ปิดงาน'],
  ],
};

/* ============================ HELPERS ============================ */
const baht = n => '฿' + Number(n||0).toLocaleString('th-TH',{maximumFractionDigits:0});
const bahtShort = n => { n=Number(n||0); if(n>=1e6) return '฿'+(n/1e6).toFixed(2)+'M'; if(n>=1e3) return '฿'+(n/1e3).toFixed(0)+'K'; return '฿'+n; };
const daysUntil = d => d ? Math.ceil((new Date(d) - new Date())/86400000) : null;
const phaseIndex = p => Math.max(0, PHASES.indexOf(p));
const pad2 = n => String(n).padStart(2,'0');
const pad3 = n => String(n).padStart(3,'0');
const pad4 = n => String(n).padStart(4,'0');
const num = v => { const n=Number(v); return isNaN(n)?0:n; };
// บรรทัด BOM → มูลค่ารวมเป็นบาท (USD คูณอัตราแลกเปลี่ยน)
const lineTHB = b => num(b.quantity) * num(b.unit_cost) * (b.currency==='USD' ? num(b.fx_rate)||1 : 1);
// ออกเลขถัดไปจากเลขมากสุดที่มีอยู่ (กัน gap/ลบแล้วชน — แก้บั๊กการนับจาก length)
const nextSeq = (arr, field) => { let mx=0; (arr||[]).forEach(x=>{ const m=String(x[field]||'').match(/(\d+)\s*$/); if(m) mx=Math.max(mx, parseInt(m[1],10)); }); return mx; };

/* ============================ DATA LAYER (DEMO + LIVE) ============================ */
let _id = 1000;
const nid = () => ++_id;
function isoIn(days){ const d=new Date(); d.setDate(d.getDate()+days); return d.toISOString().slice(0,10); }
function curYM(){ return new Date().toISOString().slice(0,7); }

function seedDemo(){
  // ---- ลูกค้า (Sales) — มีจำนวน LBS ที่ต้องการ, ผูกกับ SR ผ่าน sr_id ----
  const customers = [
    { id:1, name:'การไฟฟ้าส่วนภูมิภาค', customer_type:'ราชการ',     work_type:'Supply & Construction', contact:'คุณสมชาย 081-xxx', lbs_qty:6, desired_date:isoIn(9),  location:'บางปะกง ฉะเชิงเทรา', scope:'ปรับปรุงสถานีไฟฟ้า', note:'', sr_id:1 },
    { id:2, name:'บ.อมตะ คอร์ปอเรชัน',  customer_type:'เอกชน',      work_type:'Supply & Construction', contact:'คุณวิภา 089-xxx',  lbs_qty:4, desired_date:isoIn(22), location:'นิคมอมตะนคร ชลบุรี', scope:'ติดตั้ง LBS',        note:'', sr_id:1 },
    { id:3, name:'บ.ปิโตรเคมีไทย',     customer_type:'เอกชน',      work_type:'Supply',                contact:'คุณเอก 086-xxx',   lbs_qty:3, desired_date:isoIn(45), location:'มาบตาพุด ระยอง',    scope:'ขยายเขตจ่ายไฟ',      note:'', sr_id:2 },
    { id:4, name:'เทศบาลนครนนทบุรี',   customer_type:'ราชการ',     work_type:'Supply',                contact:'กองช่าง 02-xxx',   lbs_qty:2, desired_date:null,      location:'นนทบุรี',           scope:'สำรวจงาน LBS',       note:'', sr_id:null },
    // ▼ ลูกค้าที่อยู่ใน SR-2026-003 (ฝ่ายขายรวบรวมส่งมาแล้ว แต่ฝ่ายโครงการยังไม่สร้าง Stock — ใช้ทดสอบ flow ดึงสร้าง Project Stock)
    { id:5, name:'บ.สหวิริยาสตีลอินดัสตรี', customer_type:'เอกชน',  work_type:'Supply & Construction', contact:'คุณมานพ 088-xxx', lbs_qty:5, desired_date:isoIn(35), location:'บางสะพาน ประจวบฯ', scope:'ติดตั้ง LBS โรงเหล็ก', note:'', sr_id:3 },
    { id:6, name:'เทศบาลเมืองมาบตาพุด',  customer_type:'ราชการ',     work_type:'Supply',                contact:'กองช่าง 038-xxx',  lbs_qty:2, desired_date:isoIn(50), location:'มาบตาพุด ระยอง',   scope:'ขยายเขตจ่ายไฟ',       note:'', sr_id:3 },
  ];
  // ---- Sales Requisition (Sales รวบรวมลูกค้า → ส่งฝ่ายโครงการ) — ผูก Stock ผ่าน stock_id ----
  const srs = [
    { id:1, sr_no:'SR-2026-001', cust_po_no:'CPO-115/2569', contract_status:'ทำสัญญาแล้ว', note:'งานภาคตะวันออก 2 ราย', stock_id:1, created_at:new Date().toISOString() },
    { id:2, sr_no:'SR-2026-002', cust_po_no:'',             contract_status:'ได้รับ PO แล้ว', note:'', stock_id:2, created_at:new Date().toISOString() },
    // ▼ SR ที่รอฝ่ายโครงการสร้าง Stock (stock_id:null = โผล่ใน Inbox ของ Project Department)
    { id:3, sr_no:'SR-2026-003', cust_po_no:'PO-SVI-2569/077', contract_status:'ได้รับ PO แล้ว', note:'งานภาคใต้ + ระยอง — รอฝ่ายโครงการสร้าง Stock', stock_id:null, created_at:new Date().toISOString() },
  ];
  // ---- Project Stock (Project รวมหลาย SR) — มี BOM No. + bom_status ----
  const projects = [
    { id:1, project_stock_no:'STK-2026-001', job_no:'JOB-001', bom_no:'BOM-2026-001', bom_status:'Sent to Purchasing', name:'งานตะวันออก รอบ 1', current_phase:'service',    phase_acked:true, total_budget:14700000, margin:18.0, cash_flow_status:'ปกติ',     delivery_date:isoIn(9),  do_signed:false },
    { id:2, project_stock_no:'STK-2026-002', job_no:'JOB-002', bom_no:'BOM-2026-002', bom_status:'Draft',              name:'ขยายเขตจ่ายไฟระยอง', current_phase:'project',    phase_acked:true, total_budget:4100000,  margin:20.0, cash_flow_status:'เฝ้าระวัง', delivery_date:isoIn(45), do_signed:false },
  ];
  const tasks = [];
  // งานฝ่ายขาย → ผูกลูกค้า
  customers.forEach(c => TASK_TEMPLATE.sales.forEach(([title,detail],ti) => {
    const inSr = !!c.sr_id;
    let status = inSr ? (ti<=1 ? 'Completed' : 'In Progress') : (ti===0 ? 'In Progress' : 'Pending');
    tasks.push({ id:nid(), customer_id:c.id, project_id:null, department:'sales', task_title:title, task_detail:detail, sort_order:ti, status, updated_by:'seed', updated_at:new Date().toISOString() });
  }));
  // งานฝ่ายโครงการ/จัดซื้อ/บริการ → ผูก Project Stock
  projects.forEach(p => {
    const reached = PHASE_STEPS.indexOf(p.current_phase);
    PHASE_STEPS.forEach((dep, di) => TASK_TEMPLATE[dep].forEach(([title,detail], ti) => {
      let status = 'Pending';
      if (di < reached) status = 'Completed';
      else if (di === reached) status = ti === 0 ? 'In Progress' : 'Pending';
      tasks.push({ id:nid(), customer_id:null, project_id:p.id, department:dep, task_title:title, task_detail:detail, sort_order:ti, status, updated_by:'seed', updated_at:new Date().toISOString() });
    }));
  });
  // ---- BOM (คอลัมน์ Epicor) ----
  const bom = [
    { id:nid(), project_id:1, epicor_code:'LBS-115-MOT', description:'LBS 115kV 3-Pole Motorized', category:'LBS',       due_date:isoIn(-15), ium:'EA', quantity:6,  currency:'USD', unit_cost:24500, fx_rate:36.5, project_phase:'Phase 1', po_status:'Delivered' },
    { id:nid(), project_id:1, epicor_code:'LBS-115-MAN', description:'LBS 115kV 3-Pole Manual',    category:'LBS',       due_date:isoIn(-10), ium:'EA', quantity:4,  currency:'USD', unit_cost:20000, fx_rate:36.5, project_phase:'Phase 1', po_status:'Delivered' },
    { id:nid(), project_id:1, epicor_code:'ACC-SA-115',  description:'Surge Arrester 115kV',        category:'Accessory', due_date:isoIn(-8),  ium:'EA', quantity:30, currency:'THB', unit_cost:42000, fx_rate:1,    project_phase:'Phase 1', po_status:'Delivered' },
    { id:nid(), project_id:2, epicor_code:'LBS-115-MOT', description:'LBS 115kV 3-Pole Motorized', category:'LBS',       due_date:isoIn(30),  ium:'EA', quantity:3,  currency:'USD', unit_cost:24500, fx_rate:36.5, project_phase:'Phase 1', po_status:'Awaiting PO' },
    { id:nid(), project_id:2, epicor_code:'ACC-CC-01',   description:'Control Cabinet',             category:'Accessory', due_date:isoIn(30),  ium:'EA', quantity:3,  currency:'THB', unit_cost:95000, fx_rate:1,    project_phase:'Phase 1', po_status:'Awaiting PO' },
  ];
  const pos = [
    { id:nid(), project_id:1, po_no:'PO-2026-1001', supplier:'ABB (Thailand)',    status:'รับครบ', expected_date:isoIn(-20), amount:9300000, notified:true },
    { id:nid(), project_id:1, po_no:'PO-2026-1002', supplier:'Schneider Electric', status:'รับครบ', expected_date:isoIn(-12), amount:1260000, notified:true },
  ];
  // ---- ทีม Service + ตารางคิวงานรายเดือน ----
  const team = [
    { id:nid(), name:'อนุชา (หัวหน้าทีม)', role:'Site Supervisor', phone:'081-111-1111', active:true },
    { id:nid(), name:'ธีรพงษ์',           role:'Technician',      phone:'081-222-2222', active:true },
    { id:nid(), name:'กิตติ',             role:'Technician',      phone:'081-333-3333', active:true },
    { id:nid(), name:'สุริยา',            role:'Electrician',     phone:'081-444-4444', active:true },
  ];
  const ym = curYM();
  const schedule = [
    { id:nid(), project_id:1, member_id:team[0].id, start_date:ym+'-05', end_date:ym+'-09', note:'ติดตั้งหลัก' },
    { id:nid(), project_id:1, member_id:team[1].id, start_date:ym+'-05', end_date:ym+'-09', note:'' },
    { id:nid(), project_id:1, member_id:team[3].id, start_date:ym+'-07', end_date:ym+'-12', note:'งานไฟฟ้า' },
  ];
  return { customers, srs, projects, tasks, bom, pos, team, schedule, handoffs:[] };
}

let demo = null;
const db = {
  async loadAll(){
    if (!LIVE){ if(!demo) demo = seedDemo(); return JSON.parse(JSON.stringify(demo)); }
    const [customers,srs,projects,tasks,bom,pos,team,schedule] = await Promise.all([
      sb.from('customers').select('*').order('id').then(ok),
      sb.from('sales_requisitions').select('*').order('id').then(ok),
      sb.from('projects').select('*').order('id').then(ok),
      sb.from('department_tasks').select('*').order('sort_order').then(ok),
      sb.from('bom_items').select('*').order('id').then(ok),
      sb.from('purchase_orders').select('*').order('po_no').then(ok),
      sb.from('service_team').select('*').order('id').then(ok),
      sb.from('service_schedule').select('*').order('id').then(ok),
    ]);
    return { customers:customers||[], srs:srs||[], projects:projects||[], tasks:tasks||[], bom:bom||[], pos:pos||[], team:team||[], schedule:schedule||[], handoffs:[] };
  },

  /* ---- งาน (tasks) ---- */
  async updateTask(id, patch){ if(!LIVE){ Object.assign(demo.tasks.find(x=>x.id===id),patch,{updated_at:new Date().toISOString()}); return; } ok(await sb.from('department_tasks').update({...patch, updated_at:new Date().toISOString()}).eq('id',id)); },
  async addTask(row){ if(!LIVE){ const r={id:nid(),status:'Pending',updated_at:new Date().toISOString(),...row}; demo.tasks.push(r); return r; } return ok(await sb.from('department_tasks').insert(row).select().single()); },

  /* ---- ลูกค้า (Sales) ---- */
  async addCustomer(row){
    if(!LIVE){
      const r={ id:nid(), sr_id:null, note:'', ...row };
      demo.customers.push(r);
      TASK_TEMPLATE.sales.forEach(([title,detail],ti) =>
        demo.tasks.push({ id:nid(), customer_id:r.id, project_id:null, department:'sales', task_title:title, task_detail:detail, sort_order:ti, status:'Pending', updated_by:'system', updated_at:new Date().toISOString() }));
      return r;
    }
    return ok(await sb.from('customers').insert(row).select().single());
  },
  async updateCustomer(id, patch){ if(!LIVE){ Object.assign(demo.customers.find(x=>x.id===id),patch); return; } ok(await sb.from('customers').update(patch).eq('id',id)); },

  /* ---- รวบรวมลูกค้าเป็น Sales Requisition แล้วส่งฝ่ายโครงการ ---- */
  async createSR(customerIds, srNo, note){
    if(!LIVE){
      const r={ id:nid(), sr_no:srNo, cust_po_no:'', contract_status:'รอ PO/สัญญา', note:note||'', stock_id:null, created_at:new Date().toISOString() };
      demo.srs.push(r);
      customerIds.forEach(cid=>{ const c=demo.customers.find(x=>x.id===cid); if(c) c.sr_id=r.id; });
      // ปิดงานฝ่ายขายข้อ "รวบรวมส่ง" ให้ลูกค้าที่อยู่ใน SR
      customerIds.forEach(cid=> demo.tasks.filter(t=>t.customer_id===cid && t.department==='sales' && t.sort_order<=1).forEach(t=>t.status='Completed'));
      demo.handoffs.push({ id:nid(), sr_id:r.id, from_phase:'sales', to_phase:'project', action:'forward', by_dept:'sales', created_at:new Date().toISOString() });
      return r;
    }
    const sr = ok(await sb.from('sales_requisitions').insert({ sr_no:srNo, note:note||'' }).select().single());
    ok(await sb.from('customers').update({ sr_id:sr.id }).in('id', customerIds));
    return sr;
  },
  async updateSR(id, patch){ if(!LIVE){ Object.assign(demo.srs.find(x=>x.id===id),patch); return; } ok(await sb.from('sales_requisitions').update(patch).eq('id',id)); },

  /* ---- สร้าง Project Stock จากหลาย SR (Project) ---- */
  async createStock(srIds, stockNo, jobNo, bomNo, name){
    if(!LIVE){
      const r={ id:nid(), project_stock_no:stockNo, job_no:jobNo, bom_no:bomNo, bom_status:'Draft', name, current_phase:'project', phase_acked:false, total_budget:0, margin:0, cash_flow_status:'ปกติ', delivery_date:null, do_signed:false, updated_at:new Date().toISOString() };
      // วันส่งมอบ = วันที่ต้องการเร็วสุดของลูกค้าใน SR ที่รวมเข้ามา
      const custs = demo.customers.filter(c=> srIds.includes(c.sr_id) && c.desired_date);
      if(custs.length) r.delivery_date = custs.map(c=>c.desired_date).sort()[0];
      demo.projects.push(r);
      srIds.forEach(sid=>{ const s=demo.srs.find(x=>x.id===sid); if(s) s.stock_id=r.id; });
      PHASE_STEPS.forEach(dep => TASK_TEMPLATE[dep].forEach(([title,detail],ti) =>
        demo.tasks.push({ id:nid(), customer_id:null, project_id:r.id, department:dep, task_title:title, task_detail:detail, sort_order:ti, status:'Pending', updated_by:'system', updated_at:new Date().toISOString() })));
      demo.handoffs.push({ id:nid(), project_id:r.id, from_phase:'sales', to_phase:'project', action:'create', by_dept:'project', created_at:new Date().toISOString() });
      return r;
    }
    const newId = ok(await sb.rpc('create_stock_multi', { sr_ids:srIds, p_stock_no:stockNo, p_job_no:jobNo, p_bom_no:bomNo, p_name:name }));
    return { id:newId };
  },
  async updateProject(id, patch){ if(!LIVE){ Object.assign(demo.projects.find(x=>x.id===id),patch,{updated_at:new Date().toISOString()}); return; } ok(await sb.from('projects').update(patch).eq('id',id)); },

  /* ---- BOM ---- */
  async addBom(row){ if(!LIVE){ const r={id:nid(),po_status:'Awaiting PO',...row}; demo.bom.push(r); return r; } return ok(await sb.from('bom_items').insert(row).select().single()); },
  async updateBom(id, patch){ if(!LIVE){ Object.assign(demo.bom.find(x=>x.id===id),patch); return; } ok(await sb.from('bom_items').update(patch).eq('id',id)); },
  async deleteBom(id){ if(!LIVE){ demo.bom = demo.bom.filter(x=>x.id!==id); return; } ok(await sb.from('bom_items').delete().eq('id',id)); },
  async sendBom(projectId){ if(!LIVE){ Object.assign(demo.projects.find(p=>p.id===projectId),{bom_status:'Sent to Purchasing'}); return; } ok(await sb.from('projects').update({bom_status:'Sent to Purchasing'}).eq('id',projectId)); },

  /* ---- PO (Purchasing) ---- */
  async addPO(row){ if(!LIVE){ const r={id:nid(),notified:false,...row}; demo.pos.push(r); return r; } return ok(await sb.from('purchase_orders').insert(row).select().single()); },
  async updatePO(id, patch){ if(!LIVE){ Object.assign(demo.pos.find(x=>x.id===id),patch); return; } ok(await sb.from('purchase_orders').update(patch).eq('id',id)); },

  /* ---- ทีม Service ---- */
  async addMember(row){ if(!LIVE){ const r={id:nid(),active:true,...row}; demo.team.push(r); return r; } return ok(await sb.from('service_team').insert(row).select().single()); },
  async removeMember(id){ if(!LIVE){ demo.team = demo.team.filter(x=>x.id!==id); demo.schedule = demo.schedule.filter(s=>s.member_id!==id); return; } ok(await sb.from('service_team').delete().eq('id',id)); },
  async addSchedule(row){ if(!LIVE){ const r={id:nid(),...row}; demo.schedule.push(r); return r; } return ok(await sb.from('service_schedule').insert(row).select().single()); },
  async removeSchedule(id){ if(!LIVE){ demo.schedule = demo.schedule.filter(x=>x.id!==id); return; } ok(await sb.from('service_schedule').delete().eq('id',id)); },
  async signDO(projectId){ if(!LIVE){ Object.assign(demo.projects.find(p=>p.id===projectId),{do_signed:true}); return; } ok(await sb.from('projects').update({do_signed:true}).eq('id',projectId)); },

  /* ---- Linkage (ส่งงาน/ตีกลับ/รับงาน) ---- */
  async handoff(projectId, fromPhase, toPhase, byDept){
    if(!LIVE){ Object.assign(demo.projects.find(p=>p.id===projectId), { current_phase:toPhase, phase_acked:false, updated_at:new Date().toISOString() });
      demo.handoffs.push({ id:nid(), project_id:projectId, from_phase:fromPhase, to_phase:toPhase, action:'forward', by_dept:byDept, created_at:new Date().toISOString() }); return; }
    ok(await sb.rpc('handoff_project', { p_id:projectId }));
  },
  async reject(projectId, fromPhase, toPhase, byDept, note){
    if(!LIVE){ Object.assign(demo.projects.find(p=>p.id===projectId), { current_phase:toPhase, phase_acked:false, updated_at:new Date().toISOString() });
      demo.handoffs.push({ id:nid(), project_id:projectId, from_phase:fromPhase, to_phase:toPhase, action:'reject', by_dept:byDept, note, created_at:new Date().toISOString() }); return; }
    ok(await sb.rpc('reject_project', { p_id:projectId, p_note:note }));
  },
  async ackPhase(projectId){ if(!LIVE){ Object.assign(demo.projects.find(p=>p.id===projectId), { phase_acked:true }); return; } ok(await sb.rpc('ack_phase', { p_id:projectId })); },
};

function projProgress(tasks, pid){ const t=tasks.filter(x=>x.project_id===pid); return t.length?Math.round(t.filter(x=>x.status==='Completed').length/t.length*100):0; }

/* ===== Linkage: phase flow + gate ===== */
const nextPhase = p => { const i=PHASES.indexOf(p); return (i>=0 && i<3) ? PHASES[i+1] : null; };
const prevPhase = p => { const i=PHASES.indexOf(p); return (i>0 && i<=3) ? PHASES[i-1] : null; };
const phaseDeptDone = (state, pid, dep) => { const t=state.tasks.filter(x=>x.project_id===pid && x.department===dep); return t.length>0 && t.every(x=>x.status==='Completed'); };
// ลูกค้าทั้งหมดที่อยู่ใน Stock นี้ (ผ่าน SR) + จำนวน LBS ที่ต้องการรวม
function stockCustomers(state, pid){ const srIds=state.srs.filter(s=>s.stock_id===pid).map(s=>s.id); return (state.customers||[]).filter(c=>srIds.includes(c.sr_id)); }
function requestedLBS(state, pid){ return stockCustomers(state,pid).reduce((s,c)=>s+num(c.lbs_qty),0); }
function bomLBS(state, pid){ return state.bom.filter(b=>b.project_id===pid && b.category==='LBS').reduce((s,b)=>s+num(b.quantity),0); }

function phaseGate(project, state){
  const pid=project.id, ph=project.current_phase;
  if(ph==='closed') return { ok:false, reason:'โครงการปิดงานแล้ว' };
  if(!phaseDeptDone(state, pid, ph)) return { ok:false, reason:'งานในเฟสนี้ยังไม่ครบทุกข้อ' };
  if(ph==='project'){
    if(!project.job_no) return { ok:false, reason:'ยังไม่มี Job No.' };
    const items=state.bom.filter(b=>b.project_id===pid);
    if(items.length===0) return { ok:false, reason:'ยังไม่มีรายการ BOM' };
    if(project.bom_status!=='Sent to Purchasing') return { ok:false, reason:'ยังไม่ได้ส่ง BOM ให้จัดซื้อ' };
    if(bomLBS(state,pid)!==requestedLBS(state,pid)) return { ok:false, reason:`จำนวน LBS ใน BOM (${bomLBS(state,pid)}) ไม่ตรงกับที่ลูกค้าต้องการ (${requestedLBS(state,pid)})` };
  }
  if(ph==='purchasing'){
    const items=state.bom.filter(b=>b.project_id===pid);
    if(items.length>0 && !items.every(b=>b.po_status==='Delivered')) return { ok:false, reason:'ของยังเข้าไม่ครบ (ต้อง Delivered ทุกรายการ)' };
  }
  if(ph==='service'){
    if(!project.do_signed) return { ok:false, reason:'ยังไม่ได้ลงนาม DO' };
  }
  return { ok:true, reason:'' };
}
// งานเข้าใหม่ของแต่ละฝ่าย
const stockIncoming = (state, dep) => state.projects.filter(p=>p.current_phase===dep && !p.phase_acked).length;
const srInbox = state => state.srs.filter(s=>!s.stock_id).length;        // SR รอสร้าง Stock
const custToGather = state => (state.customers||[]).filter(c=>!c.sr_id).length;  // ลูกค้ารอรวบรวม
const incomingCount = (state, dep) => {
  if(dep==='sales') return custToGather(state);
  if(dep==='project') return stockIncoming(state,'project') + srInbox(state);
  return stockIncoming(state, dep);
};

        <Card className="p-5 fade-up" style={{borderColor: alerts.length?'#f43f5e44':undefined}}>
          <div className="flex items-center gap-2 mb-3"><span style={{color:'#f43f5e'}}>{Icon.bell}</span><h3 className="text-slate-200 font-semibold">เตือนส่งมอบ ≤ 15 วัน</h3></div>
          {alerts.length===0 ? <div className="text-sm text-slate-500 py-6 text-center">ไม่มีโครงการที่ใกล้ครบกำหนด</div> : (

                <div className="flex items-center justify-between"><span className="text-sm text-slate-200 font-medium truncate">{p.name}</span><span className="text-xs font-bold px-2 py-0.5 rounded-full shrink-0" style={{ background:d<=7?'#f43f5e':'#f59e0b', color:'#0b0f17' }}>{d} วัน</span></div>

              </button>

      </div>
      <Card className="fade-up overflow-hidden">
        <div className="px-5 py-3.5 border-b border-slate-800 flex items-center justify-between"><h3 className="text-slate-200 font-semibold">ภาพรวม Project Stock</h3><button onClick={()=>onNav('project')} className="text-xs text-slate-400 hover:text-slate-200">ไป Project Department →</button></div>
        <table className="w-full text-sm">
          <thead><tr className="text-left text-[11px] uppercase tracking-wide text-slate-500 border-b border-slate-800">

          </tr></thead>
          <tbody>
            {projects.map(p => { const pr=projProgress(tasks,p.id); const poCount=pos.filter(o=>o.project_id===p.id).length; return (
              <tr key={p.id} className="border-b border-slate-800/60 hover:bg-slate-800/30 cursor-pointer" onClick={()=>onSelectProject(p.id)}>

                <td className="px-3 py-3"><div className="text-slate-200">{p.name}</div><div className="text-[11px] text-slate-500">{stockCustomers(state,p.id).length} ลูกค้า</div></td>
                <td className="px-3 py-3"><Pill color={bomStatusColor(p.bom_status)}>{p.bom_no||'—'}</Pill></td>

                <td className="px-3 py-3" onClick={e=>{e.stopPropagation(); if(poCount) onOpenPO(p.id);}}>
                  {poCount>0 ? <button className="inline-flex items-center gap-1 text-xs font-medium rounded-md px-2 py-1 hover:brightness-125" style={{background:'#6366f122',color:'#818cf8'}}>{poCount} PO →</button> : <span className="text-slate-600 text-xs">—</span>}
                </td>
                <td className="px-3 py-3"><div className="flex items-center gap-2"><div className="flex-1 h-1.5 rounded-full bg-slate-800"><div className="h-full rounded-full" style={{width:pr+'%',background:DEPT[p.current_phase]?.c||'#38bdf8'}}/></div><span className="text-[11px] text-slate-400 w-8 text-right">{pr}%</span></div></td>

/* ============================ ADD-TASK inline ============================ */
function AddTask({color, onAdd}){
  const [open,setOpen]=useState(false); const [title,setTitle]=useState(''); const [detail,setDetail]=useState('');
  if(!open) return <button onClick={()=>setOpen(true)} className="w-full flex items-center justify-center gap-1.5 text-xs font-medium rounded-lg py-2 border border-dashed transition hover:bg-slate-800/40" style={{borderColor:color+'55',color}}>{Icon.plus} เพิ่มงาน</button>;
  return (
    <div className="rounded-lg border p-3 space-y-2" style={{borderColor:color+'55',background:color+'0e'}}>
      <Inp value={title} onChange={setTitle} placeholder="ชื่องาน"/><Inp value={detail} onChange={setDetail} placeholder="รายละเอียด"/>
      <div className="flex justify-end gap-2">
        <button onClick={()=>{setOpen(false);setTitle('');setDetail('');}} className="text-xs px-3 py-1 rounded-md border border-slate-700 text-slate-300">ยกเลิก</button>
        <button onClick={()=>{ if(!title.trim())return; onAdd(title.trim(),detail.trim()); setTitle('');setDetail('');setOpen(false); }} className="text-xs px-3 py-1 rounded-md font-medium" style={{background:color,color:'#0b0f17'}}>บันทึก</button>
      </div>
    </div>
  );
}

/* ============================ WORKFLOW BOARD ============================ */
function WorkflowBoard({state, project, role, onTask, onAddTask, onHandoff, onReject, onAck}){
  if (!project) return <Empty msg="เลือก Project Stock จากแถบด้านบนเพื่อดูเวิร์กโฟลว์"/>;
  return (
    <div className="space-y-4">
      <PhaseRibbon project={project} state={state} role={role} onHandoff={onHandoff} onReject={onReject} onAck={onAck}/>
      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
        {PHASE_STEPS.map(dep => {
          const list = state.tasks.filter(t=>t.project_id===project.id && t.department===dep).sort((a,b)=>a.sort_order-b.sort_order);
          const done = list.filter(t=>t.status==='Completed').length;
          const editable = canDept(role, dep);
          return (
            <div key={dep} className="rounded-xl border border-slate-800 bg-slate-900/50 flex flex-col">
              <div className="px-4 py-3 border-b border-slate-800 flex items-center justify-between" style={{borderTop:'3px solid '+DEPT[dep].c, borderTopLeftRadius:12, borderTopRightRadius:12}}>
                <div className="flex items-center gap-2 text-sm font-semibold text-slate-200"><span>{DEPT[dep].icon}</span>{DEPT[dep].label}</div>
                <span className="text-[11px] text-slate-500">{done}/{list.length}</span>
              </div>
              <div className="p-3 space-y-2.5 flex-1">
                {list.map(t => (
                  <div key={t.id} className="rounded-lg bg-slate-800/50 border border-slate-700/50 p-3">
                    <div className="flex items-start gap-2"><span className="mt-0.5 w-2 h-2 rounded-full shrink-0" style={{background:taskColor(t.status)}}/><div className="flex-1"><div className="text-[13px] text-slate-200 font-medium leading-snug">{t.task_title}</div>{t.task_detail && <div className="text-[11px] text-slate-500 mt-1 leading-relaxed">{t.task_detail}</div>}</div></div>
                    <div className="mt-2.5">
                      {editable ? (
                        <select value={t.status} onChange={e=>onTask(t.id, e.target.value)} className="w-full text-xs rounded-md px-2 py-1.5 border bg-slate-900 focus:outline-none" style={{borderColor:taskColor(t.status)+'66', color:taskColor(t.status)}}>
                          {TASK_STATUS.map(s=><option key={s} value={s} className="bg-slate-800 text-slate-100">{TASK_TH[s]}</option>)}
                        </select>
                      ) : <Pill color={taskColor(t.status)}>{TASK_TH[t.status]}</Pill>}
                    </div>
                  </div>
                ))}
                {editable && <AddTask color={DEPT[dep].c} onAdd={(title,detail)=>onAddTask(project.id, dep, title, detail)}/>}
              </div>
            </div>
          );
        })}
      </div>
      {!isDev(role) && <p className="text-[11px] text-slate-500">บทบาท <b style={{color:DEPT[role].c}}>{DEPT[role].label}</b> — แก้/เพิ่มงานได้เฉพาะคอลัมน์ฝ่ายตนเอง (จำลองสิทธิ์ RLS) · Developer ทำได้ทุกฝ่าย</p>}
    </div>
  );
}
function PhaseRibbon({project, state, role, onHandoff, onReject, onAck}){
  const cur = phaseIndex(project.current_phase); const pr = projProgress(state.tasks, project.id);
  const ph = project.current_phase;
  const owner = canDept(role, ph) && ph!=='closed';
  const gate = phaseGate(project, state);
  const nxt = nextPhase(ph), prev = prevPhase(ph);
  const nxtLabel = nxt==='closed' ? 'ปิดงาน' : (DEPT[nxt]?DEPT[nxt].label:'');
  const needAck = owner && !project.phase_acked;
  const [rejOpen,setRejOpen]=useState(false); const [reason,setReason]=useState('');
  return (
    <Card className="p-4">
      <div className="flex items-center justify-between mb-3"><div><div className="text-slate-100 font-semibold">{project.name}</div><div className="text-[11px] text-slate-500 mono">{project.project_stock_no||'(ยังไม่ออก Stock No.)'}{project.job_no?' · '+project.job_no:''} · {project.bom_no}</div></div><div className="text-right"><div className="text-2xl font-bold text-slate-50">{pr}%</div><div className="text-[11px] text-slate-500">ความคืบหน้า</div></div></div>
      {needAck && (
        <div className="mb-3 flex items-center justify-between gap-3 rounded-lg p-3 border" style={{background:DEPT[ph].c+'14', borderColor:DEPT[ph].c+'55'}}>
          <div className="text-[13px]" style={{color:DEPT[ph].c}}>📥 งานเข้าใหม่ — ส่งต่อมายัง <b>{DEPT[ph].label}</b></div>
          <button onClick={()=>onAck(project.id)} className="text-xs font-medium rounded-md px-3 py-1.5" style={{background:DEPT[ph].c,color:'#0b0f17'}}>รับงาน</button>
        </div>
      )}
      <div className="flex items-center">
        {PHASE_STEPS.map((ph2,i)=>(
          <React.Fragment key={ph2}>
            <div className="flex flex-col items-center gap-1"><div className="w-9 h-9 rounded-full grid place-items-center text-sm font-bold border-2" style={ i<=cur ? {background:DEPT[ph2].c,borderColor:DEPT[ph2].c,color:'#0b0f17'} : {borderColor:'#334155',color:'#475569'} }>{i<cur?'✓':i+1}</div><span className="text-[10px]" style={{color:i<=cur?DEPT[ph2].c:'#475569'}}>{DEPT[ph2].label}</span></div>
            {i<PHASE_STEPS.length-1 && <div className="flex-1 h-0.5 mx-1 rounded" style={{background:i<cur?DEPT[ph2].c:'#334155'}}/>}
          </React.Fragment>
        ))}
      </div>
      {owner && nxt && (
        <div className="mt-4 pt-3 border-t border-slate-800 flex items-center justify-between gap-2">
          <div>{prev && <button onClick={()=>setRejOpen(o=>!o)} className="text-xs font-medium rounded-md px-3 py-1.5 border border-slate-700 text-slate-300 hover:bg-slate-800/60">← ตีกลับ</button>}</div>
          <div className="flex items-center gap-2.5">
            {!gate.ok && <span className="text-[11px] text-slate-500">⚠ {gate.reason}</span>}
            <button onClick={()=>onHandoff(project)} disabled={!gate.ok} title={gate.ok?'':gate.reason}
              className="inline-flex items-center gap-1.5 text-xs font-semibold rounded-lg px-4 py-1.5 transition"
              style={ gate.ok ? {background:DEPT[ph].c,color:'#0b0f17'} : {background:'#1e293b',color:'#475569',cursor:'not-allowed'} }>
              {Icon.send} ส่งงานต่อ → {nxtLabel}
            </button>
          </div>
        </div>
      )}
      {rejOpen && (
        <div className="mt-3 rounded-lg border border-slate-700 p-3 space-y-2">
          <Lbl>เหตุผลที่ตีกลับ (ส่งกลับไป {DEPT[prev]?DEPT[prev].label:''})</Lbl>
          <Inp value={reason} onChange={setReason}/>
          <div className="flex justify-end gap-2">
            <button onClick={()=>{setRejOpen(false);setReason('');}} className="text-xs px-3 py-1 rounded-md border border-slate-700 text-slate-300">ยกเลิก</button>
            <button onClick={()=>{ if(!reason.trim())return; onReject(project, reason.trim()); setRejOpen(false); setReason(''); }} className="text-xs px-3 py-1 rounded-md font-medium" style={{background:'#f43f5e',color:'#0b0f17'}}>ยืนยันตีกลับ</button>
          </div>
        </div>
      )}
    </Card>
  );
}

/* ============================ SALES DEPARTMENT ============================ */
const SALES_BLANK = { name:'', customer_type:'ราชการ', work_type:'Supply', contact:'', lbs_qty:1, desired_date:'', location:'', scope:'' };
function SalesPipeline({state, role, onAddCustomer, onUpdateCustomer, onCreateSR, onUpdateSR, onTask}){
  const canEdit = role==='developer' || role==='sales';
  const [open,setOpen]=useState(false); const [f,setF]=useState(SALES_BLANK);
  const [sel,setSel]=useState([]);                 // ลูกค้าที่เลือกเพื่อรวบรวม
  const srOf = id => state.srs.find(s=>s.id===id);
  const toggle = id => setSel(s => s.includes(id) ? s.filter(x=>x!==id) : [...s,id]);
  const submitSR = () => { if(!sel.length) return; onCreateSR(sel); setSel([]); };
  return (
    <div className="space-y-4">
      {/* แถบรวบรวม SR */}
      {canEdit && (
        <div className="flex flex-wrap items-center justify-between gap-2">
          <div className="text-[11px] text-slate-500">เลือกลูกค้า (ติ๊ก) แล้วรวบรวมเป็น Sales Requisition เพื่อส่งฝ่ายโครงการ — 1 SR รวมได้หลายลูกค้า</div>
          <div className="flex items-center gap-2">
            {sel.length>0 && <span className="text-[11px] text-slate-400">เลือกแล้ว {sel.length} ราย</span>}
            <button onClick={submitSR} disabled={!sel.length} className="inline-flex items-center gap-1.5 text-xs font-semibold rounded-lg px-3 py-1.5" style={sel.length?{background:DEPT.sales.c,color:'#0b0f17'}:{background:'#1e293b',color:'#475569',cursor:'not-allowed'}}>{Icon.send} รวบรวมส่งฝ่ายโครงการ</button>
            <button onClick={()=>setOpen(o=>!o)} className="inline-flex items-center gap-1.5 text-xs font-medium rounded-lg px-3 py-1.5" style={{background:DEPT.sales.c+'22',color:DEPT.sales.c}}>{Icon.plus} เพิ่มลูกค้า</button>
          </div>
        </div>
      )}
      {canEdit && open && (
        <Card className="p-4">
          <h3 className="text-slate-200 font-semibold mb-3 flex items-center gap-2">{Icon.plus} เพิ่มลูกค้าใหม่</h3>
          <div className="grid grid-cols-1 md:grid-cols-4 gap-3">
            <div className="md:col-span-2"><Lbl>ชื่อลูกค้า</Lbl><Inp value={f.name} onChange={v=>setF({...f,name:v})}/></div>
            <div><Lbl>ประเภทลูกค้า</Lbl><Sel value={f.customer_type} onChange={v=>setF({...f,customer_type:v})} options={CUSTOMER_TYPE}/></div>
            <div><Lbl>ประเภทงาน</Lbl><Sel value={f.work_type} onChange={v=>setF({...f,work_type:v})} options={WORK_TYPE}/></div>
            <div className="md:col-span-2"><Lbl>ผู้ติดต่อ</Lbl><Inp value={f.contact} onChange={v=>setF({...f,contact:v})}/></div>
            <div><Lbl>จำนวน LBS ที่ต้องการ</Lbl><Inp type="number" value={f.lbs_qty} onChange={v=>setF({...f,lbs_qty:num(v)})}/></div>
            <div><Lbl>วันที่ต้องการสินค้า</Lbl><Inp type="date" value={f.desired_date} onChange={v=>setF({...f,desired_date:v})}/></div>
            <div className="md:col-span-2"><Lbl>สถานที่ติดตั้ง</Lbl><Inp value={f.location} onChange={v=>setF({...f,location:v})}/></div>
            <div className="md:col-span-2"><Lbl>หมายเหตุ / ขอบเขตงาน (Scope)</Lbl><Inp value={f.scope} onChange={v=>setF({...f,scope:v})}/></div>
          </div>
          <div className="flex justify-end gap-2 mt-3">
            <button onClick={()=>{setOpen(false);setF(SALES_BLANK);}} className="text-xs px-3 py-1.5 rounded-lg border border-slate-700 text-slate-300">ยกเลิก</button>
            <button onClick={()=>{ if(!f.name.trim())return; onAddCustomer({...f, name:f.name.trim(), desired_date:f.desired_date||null}); setF(SALES_BLANK); setOpen(false); }} className="text-xs px-3 py-1.5 rounded-lg font-medium" style={{background:DEPT.sales.c,color:'#0b0f17'}}>บันทึกลูกค้า</button>
          </div>
        </Card>
      )}

      {/* ลูกค้า แยกตามประเภท */}
      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
        {CUSTOMER_TYPE.map(ct => { const list=(state.customers||[]).filter(c=>c.customer_type===ct); return (
          <div key={ct} className="rounded-xl border border-slate-800 bg-slate-900/50">
            <div className="px-4 py-3 border-b border-slate-800 flex items-center justify-between" style={{borderTop:'3px solid '+ctypeColor(ct), borderTopLeftRadius:12,borderTopRightRadius:12}}><span className="text-sm font-semibold text-slate-200">{ct}</span><span className="text-[11px] text-slate-500">{list.length}</span></div>

                      <div className="flex flex-wrap gap-1 mt-1"><Pill color={c.work_type==='Supply'?'#64748b':'#10b981'}>{c.work_type}</Pill><Pill color="#f59e0b">LBS {c.lbs_qty}</Pill></div>

                  <div className="text-[11px] text-slate-500 leading-relaxed">{c.location||'—'} · {c.contact||'—'}<br/>{c.scope||''} {c.desired_date?'· ต้องการ '+c.desired_date:''}</div>
                  <div className="pt-1 border-t border-slate-700/50">
                    {sr ? <span className="text-[10px] font-medium" style={{color:sr.stock_id?'#10b981':'#f59e0b'}}>{sr.stock_id?'✓ สร้าง Stock แล้ว · ':'✓ ส่งแล้ว · รอสร้าง Stock · '}{sr.sr_no}</span>
                      : <span className="text-[10px] text-slate-500">ยังไม่ได้รวบรวมส่งฝ่ายโครงการ</span>}
                  </div>
                </div>
              );})}
              {list.length===0 && <div className="text-center text-slate-600 text-xs py-6">—</div>}
            </div>
          </div>
        );})}
      </div>

      {/* Sales Requisition + ติดตาม PO/สัญญา */}
      <Card className="overflow-hidden">
        <div className="px-5 py-3.5 border-b border-slate-800 flex items-center gap-2"><span style={{color:DEPT.sales.c}}>{Icon.doc}</span><h3 className="text-slate-200 font-semibold">Sales Requisition — ติดตาม PO & สัญญาซื้อขาย</h3></div>
        <table className="w-full text-sm">
          <thead><tr className="text-left text-[11px] uppercase tracking-wide text-slate-500 border-b border-slate-800">

          <tbody>
            {state.srs.length===0 && <tr><td colSpan="6" className="px-5 py-8 text-center text-slate-500">ยังไม่มี Sales Requisition</td></tr>}
            {state.srs.map(sr => { const custs=(state.customers||[]).filter(c=>c.sr_id===sr.id); const lbs=custs.reduce((s,c)=>s+num(c.lbs_qty),0); return (
              <tr key={sr.id} className="border-b border-slate-800/60 align-top">
                <td className="px-5 py-3 mono text-slate-200">{sr.sr_no}<div className="text-[10px] text-slate-500">{sr.note}</div></td>
                <td className="px-3 py-3 text-slate-300 text-[12px]">{custs.map(c=>c.name).join(', ')||'—'}</td>
                <td className="px-3 py-3 text-right mono font-semibold" style={{color:'#f59e0b'}}>{lbs}</td>
                <td className="px-3 py-3 w-40">{canEdit ? <Inp value={sr.cust_po_no||''} onChange={v=>onUpdateSR(sr.id,{cust_po_no:v})} placeholder="—"/> : <span className="text-slate-300">{sr.cust_po_no||'—'}</span>}</td>
                <td className="px-3 py-3 w-44">{canEdit ? <Sel value={sr.contract_status} onChange={v=>onUpdateSR(sr.id,{contract_status:v})} options={CONTRACT_STATUS}/> : <Pill color={sr.contract_status==='ทำสัญญาแล้ว'?'#10b981':'#f59e0b'}>{sr.contract_status}</Pill>}</td>
                <td className="px-3 py-3">{sr.stock_id ? <Pill color="#10b981">{state.projects.find(p=>p.id===sr.stock_id)?.project_stock_no||'มีแล้ว'}</Pill> : <Pill color="#64748b">รอสร้าง</Pill>}</td>
              </tr>
            );})}
          </tbody>
        </table>
      </Card>
    </div>
  );
}

/* ============================ PROJECT DEPARTMENT ============================ */
const Field = ({label, value, color, mono}) => (
  <div><div className="text-[11px] text-slate-500">{label}</div><div className={"text-lg font-semibold mt-0.5 "+(mono?'mono ':'')} style={color?{color}:{color:'#e2e8f0'}}>{value}</div></div>
);
function ProjectDept({state, project, role, onCreateStock, onAddBom, onUpdateBom, onDeleteBom, onSendBom, onUpdateProject}){
  const canEdit = role==='developer' || role==='project';
  const inbox = state.srs.filter(s=>!s.stock_id);              // SR รอสร้าง Stock
  const [sel,setSel]=useState([]);
  const toggle = id => setSel(s => s.includes(id) ? s.filter(x=>x!==id) : [...s,id]);
  const create = () => { if(!sel.length) return; onCreateStock(sel); setSel([]); };
  const srCusts = sr => (state.customers||[]).filter(c=>c.sr_id===sr.id);
  return (
    <div className="space-y-4">
      {/* Inbox: SR รอสร้าง Stock */}
      {inbox.length>0 && (
        <Card className="overflow-hidden" style={{borderColor:DEPT.project.c+'55'}}>
          <div className="px-5 py-3 border-b border-slate-800 flex items-center justify-between flex-wrap gap-2" style={{background:DEPT.project.c+'12'}}>
            <div className="flex items-center gap-2"><span style={{color:DEPT.project.c}}>📥</span><h3 className="text-slate-200 font-semibold">Sales Requisition ที่ฝ่ายขายส่งมา — เลือกหลายใบเพื่อสร้าง 1 Project Stock</h3><span className="text-[11px] text-slate-500">({inbox.length} ใบ)</span></div>
            {canEdit && <button onClick={create} disabled={!sel.length} className="inline-flex items-center gap-1.5 text-xs font-semibold rounded-lg px-3 py-1.5" style={sel.length?{background:DEPT.project.c,color:'#0b0f17'}:{background:'#1e293b',color:'#475569',cursor:'not-allowed'}}>{Icon.plus} สร้าง Project Stock ({sel.length})</button>}
          </div>
          <div className="p-3 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
            {inbox.map(sr => { const custs=srCusts(sr); const lbs=custs.reduce((s,c)=>s+num(c.lbs_qty),0); const selected=sel.includes(sr.id); const dd=custs.map(c=>c.desired_date).filter(Boolean).sort()[0]; return (
              <div key={sr.id} className="rounded-lg border p-3 space-y-2" style={selected?{borderColor:DEPT.project.c,background:DEPT.project.c+'12'}:{borderColor:'#33415580',background:'#1e293b80'}}>
                <div className="flex items-start gap-2">
                  {canEdit && <input type="checkbox" checked={selected} onChange={()=>toggle(sr.id)} className="mt-1 accent-amber-500"/>}
                  <div className="flex-1"><div className="text-[13px] text-slate-200 font-medium mono">{sr.sr_no}</div><div className="text-[11px] text-slate-500">{custs.length} ลูกค้า · {sr.contract_status}</div></div>
                  <Pill color="#f59e0b">LBS {lbs}</Pill>
                </div>
                <div className="text-[11px] text-slate-400 leading-relaxed">{custs.map(c=>`${c.name} (${c.work_type}, ${c.location||'—'})`).join(' · ')}</div>
                {dd && <div className="text-[10px] text-slate-500">เร็วสุดต้องการ {dd}</div>}
              </div>
            );})}
          </div>
        </Card>
      )}
      {!project ? <Card className="p-8 text-center text-slate-500">เลือก Project Stock จากแถบด้านบน หรือสร้างใหม่จาก SR ด้านบน เพื่อจัดการ Budget & BOM</Card>
        : <ProjectBom state={state} project={project} canEdit={canEdit} onAddBom={onAddBom} onUpdateBom={onUpdateBom} onDeleteBom={onDeleteBom} onSendBom={onSendBom} onUpdateProject={onUpdateProject}/>}
    </div>
  );
}
const BOM_BLANK = { epicor_code:'', description:'', category:'LBS', due_date:'', ium:'EA', quantity:1, currency:'THB', unit_cost:0, fx_rate:36.5, project_phase:'Phase 1' };
function ProjectBom({state, project, canEdit, onAddBom, onUpdateBom, onDeleteBom, onSendBom, onUpdateProject}){
  const items = state.bom.filter(b=>b.project_id===project.id);
  const matValue = items.reduce((s,b)=>s+lineTHB(b),0);
  const reqLBS = requestedLBS(state, project.id);
  const curLBS = bomLBS(state, project.id);
  const lbsOK = curLBS===reqLBS;
  const sent = project.bom_status==='Sent to Purchasing';
  const [form, setForm] = useState(BOM_BLANK);

  const custs = stockCustomers(state, project.id);
  return (
    <div className="space-y-4">
      {/* Budget & Flow */}

          <h3 className="text-slate-200 font-semibold mb-4 flex items-center gap-2">{Icon.layers} Project Budget & Flow</h3>
          <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
            <div><Lbl>งบประมาณรวม (฿)</Lbl>{canEdit ? <Inp type="number" value={project.total_budget} onChange={v=>onUpdateProject(project.id,{total_budget:num(v)})}/> : <div className="text-lg font-semibold" style={{color:'#6366f1'}}>{baht(project.total_budget)}</div>}</div>
            <div><Lbl>กำไร Margin (%)</Lbl>{canEdit ? <Inp type="number" value={project.margin} onChange={v=>onUpdateProject(project.id,{margin:num(v)})}/> : <div className="text-lg font-semibold" style={{color:'#10b981'}}>{project.margin}%</div>}</div>
            <Field label="กำไรเป็นเงิน" value={baht(project.total_budget*project.margin/100)} color="#8b5cf6"/>
            <div><Lbl>กระแสเงินสด</Lbl>{canEdit ? <Sel value={project.cash_flow_status} onChange={v=>onUpdateProject(project.id,{cash_flow_status:v})} options={['ปกติ','เฝ้าระวัง','วิกฤติ']}/> : <div className="text-lg font-semibold" style={{color:project.cash_flow_status==='ปกติ'?'#10b981':'#f59e0b'}}>{project.cash_flow_status}</div>}</div>
          </div>
          <div className="mt-4 pt-4 border-t border-slate-800 grid grid-cols-2 sm:grid-cols-4 gap-4">
            <Field label="Project Stock No." value={project.project_stock_no} mono/><Field label="Job No." value={project.job_no||'—'} mono/>
            <Field label="BOM No." value={project.bom_no} mono/><Field label="มูลค่าวัสดุ BOM (฿)" value={baht(matValue)} color="#f59e0b"/>
          </div>
        </Card>
        {/* LBS reconcile */}
        <Card className="p-5" style={{borderColor:lbsOK?'#10b98155':'#f43f5e55'}}>
          <h3 className="text-slate-200 font-semibold mb-3">ตรวจสอบจำนวน LBS</h3>
          <div className="grid grid-cols-2 gap-3 text-center">
            <div><div className="text-[11px] text-slate-500">ลูกค้าต้องการ</div><div className="text-3xl font-bold" style={{color:'#6366f1'}}>{reqLBS}</div></div>
            <div><div className="text-[11px] text-slate-500">ใน BOM</div><div className="text-3xl font-bold" style={{color:'#f59e0b'}}>{curLBS}</div></div>
          </div>
          <div className="mt-3 text-center text-sm font-medium rounded-lg py-2" style={lbsOK?{background:'#10b98118',color:'#10b981'}:{background:'#f43f5e18',color:'#f43f5e'}}>
            {lbsOK ? '✓ จำนวนตรงกัน' : (curLBS<reqLBS ? `⚠ ขาดอีก ${reqLBS-curLBS} ชุด` : `⚠ เกิน ${curLBS-reqLBS} ชุด`)}
          </div>
          <div className="text-[10px] text-slate-500 mt-2 leading-relaxed border-t border-slate-800 pt-2">ลูกค้าใน Stock: {custs.map(c=>c.name).join(', ')||'—'}</div>
        </Card>
      </div>

      {/* BOM table */}
      <Card className="overflow-hidden">
        <div className="px-5 py-3.5 border-b border-slate-800 flex items-center justify-between flex-wrap gap-2">
          <h3 className="text-slate-200 font-semibold flex items-center gap-2">{Icon.box} Material List (BOM) · {project.bom_no} <Pill color={bomStatusColor(project.bom_status)}>{project.bom_status==='Sent to Purchasing'?'ส่งจัดซื้อแล้ว':'ร่าง'}</Pill></h3>
          <div className="flex items-center gap-2">
            {canEdit && !sent && items.length>0 && <button onClick={()=>onSendBom(project.id)} className="inline-flex items-center gap-1.5 text-xs font-semibold rounded-lg px-3 py-1.5" style={{background:'#10b981',color:'#0b0f17'}}>{Icon.send} ส่ง BOM ให้จัดซื้อ</button>}
            {canEdit && !sent && <button onClick={()=>setOpen(o=>!o)} className="inline-flex items-center gap-1.5 text-xs font-medium rounded-lg px-3 py-1.5" style={{background:'#f59e0b22',color:'#f59e0b'}}>{Icon.plus} เพิ่มรายการ</button>}
          </div>
        </div>
        {open && canEdit && !sent && (
          <div className="px-5 py-4 bg-slate-800/30 border-b border-slate-800 grid grid-cols-2 md:grid-cols-6 gap-3 items-end">
            <div><Lbl>Epicor Code</Lbl><Inp value={form.epicor_code} onChange={v=>setForm({...form,epicor_code:v})}/></div>
            <div className="col-span-2"><Lbl>Description</Lbl><Inp value={form.description} onChange={v=>setForm({...form,description:v})}/></div>
            <div><Lbl>Category</Lbl><Sel value={form.category} onChange={v=>setForm({...form,category:v})} options={BOM_CAT}/></div>
            <div><Lbl>Due Date</Lbl><Inp type="date" value={form.due_date} onChange={v=>setForm({...form,due_date:v})}/></div>
            <div><Lbl>IUM</Lbl><Inp value={form.ium} onChange={v=>setForm({...form,ium:v})}/></div>
            <div><Lbl>Qty</Lbl><Inp type="number" value={form.quantity} onChange={v=>setForm({...form,quantity:num(v)})}/></div>
            <div><Lbl>Currency</Lbl><Sel value={form.currency} onChange={v=>setForm({...form,currency:v})} options={CURRENCY}/></div>
            <div><Lbl>Cost/unit</Lbl><Inp type="number" value={form.unit_cost} onChange={v=>setForm({...form,unit_cost:num(v)})}/></div>
            {form.currency==='USD' && <div><Lbl>FX (฿/USD)</Lbl><Inp type="number" value={form.fx_rate} onChange={v=>setForm({...form,fx_rate:num(v)})}/></div>}
            <div><Lbl>Project Phase</Lbl><Sel value={form.project_phase} onChange={v=>setForm({...form,project_phase:v})} options={PROJECT_PHASES}/></div>
            <div className="col-span-2 md:col-span-6 flex justify-end gap-2">
              <button onClick={()=>setOpen(false)} className="text-xs px-3 py-1.5 rounded-lg border border-slate-700 text-slate-300">ยกเลิก</button>
              <button onClick={()=>{ if(!form.description)return; onAddBom({project_id:project.id, ...form, fx_rate:form.currency==='USD'?(num(form.fx_rate)||1):1, po_status:'Awaiting PO'}); setForm(BOM_BLANK); setOpen(false); }} className="text-xs px-3 py-1.5 rounded-lg font-medium" style={{background:'#f59e0b',color:'#0b0f17'}}>บันทึก</button>
            </div>
          </div>
        )}
        <div className="overflow-x-auto">
        <table className="w-full text-sm whitespace-nowrap">
          <thead><tr className="text-left text-[11px] uppercase tracking-wide text-slate-500 border-b border-slate-800">

            <th className="px-3 py-2.5 font-medium text-right">Cost/unit</th><th className="px-3 py-2.5 font-medium text-right">Total (฿)</th>
            <th className="px-3 py-2.5 font-medium">Phase</th><th className="px-3 py-2.5 font-medium">PO</th>{canEdit && !sent && <th className="px-3 py-2.5"/>}
          </tr></thead>
          <tbody>
            {items.length===0 && <tr><td colSpan="11" className="px-5 py-8 text-center text-slate-500">ยังไม่มีรายการ BOM</td></tr>}
            {items.map(b => (
              <tr key={b.id} className="border-b border-slate-800/60">
                <td className="px-4 py-3 mono text-slate-300">{b.epicor_code||'—'}</td>
                <td className="px-3 py-3 text-slate-200">{b.description}</td>
                <td className="px-3 py-3"><Pill color={b.category==='LBS'?'#f59e0b':'#64748b'}>{b.category}</Pill></td>
                <td className="px-3 py-3 mono text-slate-400">{b.due_date||'—'}</td>
                <td className="px-3 py-3 text-slate-400">{b.ium}</td>
                <td className="px-3 py-3 text-right mono text-slate-300">{b.quantity}</td>
                <td className="px-3 py-3 text-right mono text-slate-400">{b.currency==='USD'?'$':'฿'}{num(b.unit_cost).toLocaleString()}{b.currency==='USD'?<span className="text-[10px] text-slate-600"> @{b.fx_rate}</span>:''}</td>
                <td className="px-3 py-3 text-right mono text-slate-200">{baht(lineTHB(b))}</td>
                <td className="px-3 py-3 text-slate-400 text-[12px]">{b.project_phase}</td>
                <td className="px-3 py-3"><Pill color={poColor(b.po_status)}>{b.po_status}</Pill></td>
                {canEdit && !sent && <td className="px-3 py-3 text-right"><button onClick={()=>onDeleteBom(b.id)} className="text-slate-500 hover:text-rose-400">{Icon.trash}</button></td>}
              </tr>
            ))}
          </tbody>
          {items.length>0 && <tfoot><tr className="border-t border-slate-700"><td colSpan="7" className="px-4 py-3 text-right text-slate-400 text-xs">มูลค่าวัสดุรวม (฿)</td><td className="px-3 py-3 text-right font-bold text-slate-100 mono">{baht(matValue)}</td><td colSpan="3"/></tr></tfoot>}
        </table>
        </div>
        {!canEdit && <p className="px-5 py-3 text-[11px] text-slate-500 border-t border-slate-800">ดูอย่างเดียว — การจัดการ BOM/ส่งจัดซื้อ สงวนให้ฝ่ายโครงการ และ Developer</p>}
        {sent && canEdit && <p className="px-5 py-3 text-[11px] text-emerald-400/80 border-t border-slate-800">BOM นี้ส่งให้จัดซื้อแล้ว — แก้ไขรายการไม่ได้ (ฝ่ายจัดซื้อจะอัปเดตสถานะ PO กลับมา)</p>}
      </Card>
    </div>
  );
}

/* ============================ PURCHASING DEPARTMENT ============================ */
const PO_BLANK = { supplier:'', amount:0, expected_date:'', status:'ออกแล้ว' };

                <div className="text-[11px] text-slate-500 mt-0.5">ของเข้าแล้ว {delivered}/{items.length} รายการ · กำหนดส่ง {p.delivery_date||'—'}</div></div>

                    <td className="px-3 py-3 text-right mono text-slate-300">{b.quantity} {b.ium}</td>

    </div>
  );
}

function FieldService({state, role, onTask, onAddTask, onAddMember, onRemoveMember, onAddSchedule, onRemoveSchedule, onSignDO}){
  const canEdit = role==='developer' || role==='service';

    <div className="space-y-5">

        {ready.map(p => {
          const tasks = state.tasks.filter(t=>t.project_id===p.id && t.department==='service').sort((a,b)=>a.sort_order-b.sort_order);
          const d = daysUntil(p.delivery_date);

            <Card key={p.id} className="p-5">

              <div className="mt-4 space-y-2">
                {tasks.map(t => (

                ))}
                {canEdit && <AddTask color={DEPT.service.c} onAdd={(title,detail)=>onAddTask(p.id,'service',title,detail)}/>}
              </div>

                <div className="mt-3 pt-3 border-t border-slate-800 flex items-center justify-between">

                  <button onClick={()=>onSignDO(p.id)} disabled={p.do_signed} className="text-xs font-semibold rounded-md px-3 py-1.5 inline-flex items-center gap-1.5" style={p.do_signed?{background:'#1e293b',color:'#475569'}:{background:DEPT.service.c,color:'#0b0f17'}}>{Icon.doc} ลงนาม DO</button>
                </div>

const MEMBER_BLANK = { name:'', role:'Technician', phone:'' };

      )}

/* ============================ LOGIN (LIVE only) ============================ */
function Login(){
  const [mode,setMode]=useState('signin');
  const [email,setEmail]=useState(''); const [pw,setPw]=useState('');
  const [msg,setMsg]=useState(''); const [busy,setBusy]=useState(false);
  const submit = async () => {
    setBusy(true); setMsg('');
    try {
      if(mode==='signin'){ const {error}=await sb.auth.signInWithPassword({email,password:pw}); if(error) throw error; }
      else { const {error}=await sb.auth.signUp({email,password:pw}); if(error) throw error; setMsg('สมัครสำเร็จ — หากเปิด Email Confirmation ให้ยืนยันอีเมลก่อน จากนั้นเข้าสู่ระบบ'); setMode('signin'); }
    } catch(e){ setMsg(e.message||'เกิดข้อผิดพลาด'); } finally { setBusy(false); }
  };
  return (
    <div className="h-screen grid place-items-center bg-[#0b0f17] text-slate-200 grain px-4">
      <div className="w-full max-w-sm rounded-2xl border border-slate-800 bg-slate-900/70 p-7 fade-up">
        <div className="flex items-center gap-2.5 mb-5">
          <div className="grid place-items-center w-10 h-10 rounded-lg text-slate-900" style={{background:'#f59e0b'}}>{Icon.bolt}</div>
          <div><div className="text-slate-100 font-semibold leading-tight">115 kV LBS</div><div className="text-slate-500 text-[11px] tracking-wide">PROJECT WORKFLOW</div></div>
        </div>
        <h2 className="text-slate-100 font-semibold mb-4">{mode==='signin'?'เข้าสู่ระบบ':'สมัครสมาชิก'}</h2>
        <div className="space-y-3">
          <div><Lbl>อีเมล</Lbl><Inp value={email} onChange={setEmail} type="email"/></div>
          <div><Lbl>รหัสผ่าน</Lbl><Inp value={pw} onChange={setPw} type="password"/></div>
        </div>
        {msg && <div className="mt-3 text-[12px] text-amber-400 leading-relaxed">{msg}</div>}
        <button onClick={submit} disabled={busy||!email||!pw} className="mt-4 w-full rounded-lg py-2 text-sm font-semibold" style={ busy||!email||!pw ? {background:'#1e293b',color:'#475569'} : {background:'#f59e0b',color:'#0b0f17'} }>{busy?'กำลังดำเนินการ…':(mode==='signin'?'เข้าสู่ระบบ':'สมัครสมาชิก')}</button>
        <button onClick={()=>{setMode(mode==='signin'?'signup':'signin');setMsg('');}} className="mt-3 w-full text-[12px] text-slate-400 hover:text-slate-200">{mode==='signin'?'ยังไม่มีบัญชี? สมัครสมาชิก':'มีบัญชีแล้ว? เข้าสู่ระบบ'}</button>
        <p className="mt-4 text-[10px] text-slate-600 leading-relaxed text-center">สมัครครั้งแรกแล้วให้ผู้ดูแลกำหนดสิทธิ์ในตาราง <span className="mono">user_roles</span> (ดู README)</p>
      </div>
    </div>
  );
}

/* ============================ APP ============================ */
function App(){
  const [state, setState] = useState({ customers:[], srs:[], projects:[], tasks:[], bom:[], pos:[], team:[], schedule:[], handoffs:[], loading:true });
  const [page, setPage] = useState('dashboard');
  const [role, setRole] = useState('developer');
  const [activeId, setActiveId] = useState('all');
  const [poProject, setPoProject] = useState(null);
  const [err, setErr] = useState('');
  const [session, setSession] = useState(LIVE ? undefined : null);
  const [me, setMe] = useState(null);

  useEffect(()=>{
    if(!LIVE) return;
    sb.auth.getSession().then(({data})=>setSession(data.session));
    const { data:sub } = sb.auth.onAuthStateChange((_e,s)=>setSession(s));
    return ()=>sub.subscription.unsubscribe();
  },[]);

  useEffect(()=>{
    if(!LIVE){ (async()=>{ const d=await db.loadAll(); setState(s=>({...s, ...d, loading:false})); })(); return; }
    if(session===undefined) return;
    if(!session){ setState(s=>({...s, loading:false})); return; }
    (async()=>{
      try{
        const { data:roleRow } = await sb.from('user_roles').select('*').eq('user_id', session.user.id).maybeSingle();
        const dep = roleRow ? (roleRow.is_developer ? 'developer' : roleRow.department) : 'sales';
        setRole(dep);
        setMe({ email:session.user.email, department: roleRow?roleRow.department:null, is_developer: roleRow?!!roleRow.is_developer:false, hasRole: !!roleRow });
        const d = await db.loadAll(); setState(s=>({...s, ...d, loading:false}));
      } catch(e){ setErr(e.message||String(e)); setState(s=>({...s, loading:false})); }
    })();
  },[session]);

  const reload = async () => { try { const d=await db.loadAll(); setState(s=>({...s, ...d})); } catch(e){ setErr(e.message||String(e)); } };
  // ครอบ action ทุกตัว: เรียก db → reload → จับ error แสดงผู้ใช้ (แก้ปัญหา fail เงียบในรีวิว)
  const run = (fn) => async (...args) => { try { setErr(''); const r=await fn(...args); await reload(); return r; } catch(e){ setErr(e.message||String(e)); } };

  const handleSignOut = async () => { if(LIVE) await sb.auth.signOut(); };
  const activeProject = useMemo(()=> activeId==='all'?null:state.projects.find(p=>p.id===activeId), [activeId, state.projects]);

  /* ===== number generators (จากเลขมากสุด ไม่ใช่จำนวน) ===== */
  const year = new Date().getFullYear();
  const genSrNo    = () => `SR-${year}-${pad3(nextSeq(state.srs,'sr_no')+1)}`;
  const genStockNo = () => `STK-${year}-${pad3(nextSeq(state.projects,'project_stock_no')+1)}`;
  const genJobNo   = () => `JOB-${pad3(nextSeq(state.projects,'job_no')+1)}`;
  const genBomNo   = () => `BOM-${year}-${pad3(nextSeq(state.projects,'bom_no')+1)}`;
  const genPoNo    = () => `PO-${year}-${pad4(Math.max(1000, nextSeq(state.pos,'po_no'))+1)}`;

  const handleTask = run(async (taskId, status) => { await db.updateTask(taskId,{status, updated_by:DEPT[role].en}); });
  const handleAddTask = run(async (projectId, dep, title, detail) => {
    const sib=state.tasks.filter(x=>x.project_id===projectId && x.department===dep);
    const sort=sib.length?Math.max(...sib.map(x=>x.sort_order))+1:0;
    await db.addTask({ project_id:projectId, department:dep, task_title:title, task_detail:detail, sort_order:sort, status:'Pending', updated_by:DEPT[role].en });
  });

  /* Sales */
  const handleAddCustomer = run(async (row) => { await db.addCustomer(row); });
  const handleUpdateCustomer = run(async (id, patch) => { await db.updateCustomer(id, patch); });
  const handleCreateSR = run(async (customerIds) => { await db.createSR(customerIds, genSrNo()); });
  const handleUpdateSR = run(async (id, patch) => { await db.updateSR(id, patch); });

  /* Project */
  const handleCreateStock = run(async (srIds) => {
    const custs=(state.customers||[]).filter(c=>srIds.includes(c.sr_id));
    const name = custs[0] ? (custs[0].location || custs[0].name) : 'Project Stock';
    const r=await db.createStock(srIds, genStockNo(), genJobNo(), genBomNo(), name);
    await reload();
    if(r) { setActiveId(r.id); setPage('project'); }
  });
  const handleAddBom = run(async (row) => { await db.addBom(row); });
  const handleUpdateBom = run(async (id, patch) => { await db.updateBom(id, patch); });
  const handleDeleteBom = run(async (id) => { await db.deleteBom(id); });
  const handleSendBom = run(async (projectId) => { await db.sendBom(projectId); });
  const handleUpdateProject = run(async (id, patch) => { await db.updateProject(id, patch); });

  /* Purchasing */
  const handleAddPO = run(async (row) => { await db.addPO({...row, po_no:genPoNo()}); });
  const handleUpdatePO = run(async (id, patch) => { await db.updatePO(id, patch); });

  /* Service */
  const handleAddMember = run(async (row) => { await db.addMember(row); });
  const handleRemoveMember = run(async (id) => { await db.removeMember(id); });
  const handleAddSchedule = run(async (row) => { await db.addSchedule(row); });
  const handleRemoveSchedule = run(async (id) => { await db.removeSchedule(id); });
  const handleSignDO = run(async (projectId) => { await db.signDO(projectId); });

  /* Linkage */
  const handleHandoff = run(async (project) => { const g=phaseGate(project,state); if(!g.ok) return; const nxt=nextPhase(project.current_phase); if(!nxt) return; await db.handoff(project.id, project.current_phase, nxt, role); });
  const handleReject = run(async (project, note) => { const prev=prevPhase(project.current_phase); if(!prev) return; await db.reject(project.id, project.current_phase, prev, role, note); });
  const handleAck = run(async (projectId) => { await db.ackPhase(projectId); });
  const goProject = (id) => { setActiveId(id); setPage('workflow'); };

  if (LIVE && session===undefined) return <div className="h-screen grid place-items-center text-slate-500">กำลังตรวจสอบสิทธิ์…</div>;
  if (LIVE && !session) return <Login/>;
  if (state.loading) return <div className="h-screen grid place-items-center text-slate-500">กำลังโหลดข้อมูล…</div>;
  const poProj = poProject ? state.projects.find(p=>p.id===poProject) : null;

  return (
    <div className="h-screen flex bg-[#0b0f17] text-slate-200">
      <Sidebar page={page} onNav={p=>setPage(p)} state={state}/>
      <div className="flex-1 flex flex-col min-w-0">
        <TopBar projects={state.projects} activeId={activeId} onProject={setActiveId} role={role} onRole={setRole} page={page} me={me} onSignOut={handleSignOut}/>
        {err && <div className="px-6 py-2 bg-rose-500/15 border-b border-rose-500/30 text-rose-300 text-xs flex items-center justify-between"><span>⚠ {err}</span><button onClick={()=>setErr('')} className="text-rose-400 hover:text-rose-200">✕</button></div>}
        <main className="flex-1 overflow-y-auto p-6">
          {page==='dashboard'  && <Dashboard state={state} onNav={setPage} onSelectProject={goProject} onOpenPO={setPoProject}/>}
          {page==='sales'      && <SalesPipeline state={state} role={role} onAddCustomer={handleAddCustomer} onUpdateCustomer={handleUpdateCustomer} onCreateSR={handleCreateSR} onUpdateSR={handleUpdateSR} onTask={handleTask}/>}
          {page==='project'    && <ProjectDept state={state} project={activeProject} role={role} onCreateStock={handleCreateStock} onAddBom={handleAddBom} onUpdateBom={handleUpdateBom} onDeleteBom={handleDeleteBom} onSendBom={handleSendBom} onUpdateProject={handleUpdateProject}/>}
          {page==='purchasing' && <Procurement state={state} role={role} onUpdateBom={handleUpdateBom} onAddPO={handleAddPO} onOpenPO={setPoProject}/>}
          {page==='service'    && <FieldService state={state} role={role} onTask={handleTask} onAddTask={handleAddTask} onAddMember={handleAddMember} onRemoveMember={handleRemoveMember} onAddSchedule={handleAddSchedule} onRemoveSchedule={handleRemoveSchedule} onSignDO={handleSignDO}/>}
          {page==='workflow'   && <WorkflowBoard state={state} project={activeProject} role={role} onTask={handleTask} onAddTask={handleAddTask} onHandoff={handleHandoff} onReject={handleReject} onAck={handleAck}/>}
        </main>
      </div>
      {poProj && <PoModal project={poProj} pos={state.pos} onClose={()=>setPoProject(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
